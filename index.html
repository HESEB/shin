<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>축산구매 서바이벌 월드맵</title><link rel="stylesheet" href="./css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;min-height:100%;background:#101b2a;font-family:Arial,'Noto Sans KR',sans-serif;color:#3b2413}body{overflow-x:hidden}.worldApp{max-width:480px;min-height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:linear-gradient(#86ddff 0 18%,#bff38b 18% 58%,#65b750 58% 78%,#55331d 78%);padding:10px 10px 16px}.skyGlow{position:absolute;left:50%;top:-80px;width:380px;height:220px;transform:translateX(-50%);background:radial-gradient(circle,#fff7a7 0,#fff4 36%,transparent 68%);z-index:0}.hill{position:absolute;left:-80px;right:-80px;border-radius:50%;z-index:0}.h1{top:170px;height:170px;background:#91d86d}.h2{top:230px;height:210px;background:#55a94a}.h3{top:420px;height:220px;background:#376d35}.cloud{position:absolute;z-index:1;font-size:36px;opacity:.8;animation:cloud 20s linear infinite}.c1{top:54px;left:-60px}.c2{top:120px;right:-80px;animation-duration:27s}.c3{top:88px;left:130px;font-size:25px;animation:floatCloud 4s ease-in-out infinite alternate}@keyframes cloud{to{transform:translateX(620px)}}@keyframes floatCloud{to{transform:translateY(8px)}}.sparkle{position:absolute;z-index:1;color:#fff6a6;font-size:18px;animation:sparkle 1.2s ease-in-out infinite alternate}.sp1{left:28px;top:210px}.sp2{right:42px;top:314px;animation-delay:.3s}.sp3{left:64px;top:515px;animation-delay:.55s}@keyframes sparkle{to{opacity:.25;transform:scale(.75)}}.topCard{position:relative;z-index:3;background:linear-gradient(#fffdf2,#ffe3a5);border:5px solid #4b2d1c;border-radius:25px;box-shadow:0 7px 0 #8b4a12,0 0 0 4px #ffffff44 inset;padding:12px}.title{font-size:31px;line-height:.95;font-weight:1000;text-align:center;color:#4b2d1c;text-shadow:0 3px 0 #ffd27b}.title span{color:#e65a20}.sub{text-align:center;font-size:13px;font-weight:900;color:#7b4a1f;margin-top:6px}.saveRow{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}.saveBtn{height:34px;border:3px solid #4b2d1c;border-radius:12px;background:#fff;font-weight:1000;color:#4b2d1c;box-shadow:0 3px 0 #8b4a12}.saveBtn.active{background:linear-gradient(#ffd766,#ff9b20);color:#fff}.statRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:8px}.stat{background:#fff;border:3px solid #4b2d1c;border-radius:12px;box-shadow:0 3px 0 #0002;padding:4px;text-align:center;font-weight:1000;font-size:12px}.stat b{display:block;font-size:15px}.progress{height:14px;background:#4b2d1c;border-radius:999px;padding:3px;margin-top:8px}.progress div{height:100%;width:0;background:linear-gradient(90deg,#38c172,#ffd54a);border-radius:999px}.kingdom{position:relative;z-index:3;margin-top:10px;background:linear-gradient(#fffdf2,#ffe5ae);border:4px solid #4b2d1c;border-radius:19px;box-shadow:0 5px 0 #8b4a12;padding:8px}.kingTitle{font-size:14px;font-weight:1000;margin-bottom:6px}.kingGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.kingBtn{height:38px;border:3px solid #4b2d1c;border-radius:13px;background:#fff;color:#3b2413;font-size:13px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.kingBtn.active{background:linear-gradient(#6ed0ff,#2179e8);color:#fff}.mapCard{position:relative;z-index:2;margin-top:12px;min-height:650px;border:5px solid #4b2d1c;border-radius:30px;box-shadow:0 8px 0 #5c3a15;overflow:hidden;background:linear-gradient(#beeefe 0 13%,#d6f8ad 13% 48%,#75cb60 48% 76%,#5a3722 76%)}.mapCard:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 18% 18%,#fff9 0 3.5%,transparent 7%),radial-gradient(circle at 83% 33%,#fff8 0 3%,transparent 7%),radial-gradient(circle at 20% 66%,#fff4 0 2%,transparent 6%),linear-gradient(90deg,transparent 0 46%,#f8d98d 46% 54%,transparent 54%);opacity:.85;z-index:0}.mapCard:after{content:"🌾   🌳       🏭     🚚      🏪      🌋";position:absolute;left:8px;right:8px;top:18px;bottom:0;z-index:1;white-space:pre-wrap;word-spacing:16px;font-size:23px;line-height:108px;opacity:.55;pointer-events:none}.path{position:absolute;left:50%;top:72px;bottom:76px;width:24px;background:linear-gradient(#ffebad,#d99a3e);border-left:4px solid #7c4a1e;border-right:4px solid #7c4a1e;transform:translateX(-50%);border-radius:999px;z-index:1}.path:before{content:"";position:absolute;left:50%;top:8px;bottom:8px;width:6px;background:linear-gradient(#fff8,#fff0);transform:translateX(-50%);border-radius:999px}.node{position:absolute;z-index:4;width:100%;height:86px;display:flex;align-items:center}.node.left{justify-content:flex-start;padding-left:16px}.node.right{justify-content:flex-end;padding-right:16px}.node.center{justify-content:center}.stage{position:relative;width:214px;min-height:76px;border:4px solid #4b2d1c;border-radius:23px;background:linear-gradient(#fffdf5,#ffe6b3);box-shadow:0 6px 0 #8b4a12,0 0 0 4px #ffffff55 inset;padding:8px 8px 8px 62px;color:#3b2413;text-align:left}.stage.lock{filter:grayscale(.85);opacity:.72}.stage.current{animation:glow .75s infinite alternate}.stage.done{background:linear-gradient(#fffdf5,#dbffd4)}@keyframes glow{to{box-shadow:0 6px 0 #8b4a12,0 0 20px #fff35a,0 0 0 4px #ffffff88 inset;transform:translateY(-2px)}}.stageIcon{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:45px;height:45px;border:3px solid #4b2d1c;border-radius:16px;background:radial-gradient(circle at 35% 25%,#fff,#ffe7b0);display:flex;align-items:center;justify-content:center;font-size:27px;box-shadow:0 3px 0 #0002}.stage b{display:block;font-size:17px;line-height:1.05}.stage small{display:block;font-size:11px;font-weight:900;color:#7b4a1f;margin-top:2px}.starLine{font-size:14px;color:#ffbd1a;text-shadow:0 2px #805000;margin-top:2px}.avatar{position:absolute;left:50%;transform:translate(-50%,-50%);z-index:8;width:54px;height:54px;border:4px solid #4b2d1c;border-radius:50%;background:linear-gradient(#fff8e8,#ffd58a);box-shadow:0 5px 0 #8b4a12;animation:bob .55s infinite alternate}.avatar:before{content:"";position:absolute;left:13px;right:13px;top:12px;height:18px;background:#f7c48c;border:3px solid #4b2d1c;border-radius:50% 50% 45% 45%;box-shadow:inset 0 -3px #e6a76a}.avatar:after{content:"👨‍🍳";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;filter:drop-shadow(0 2px 0 #fff)}@keyframes bob{to{transform:translate(-50%,-57%)}}.gate{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:3;background:#fff8e8;border:4px solid #4b2d1c;border-radius:18px;padding:6px 14px;font-weight:1000;box-shadow:0 5px 0 #8b4a12}.dev{position:relative;z-index:3;margin-top:10px;background:linear-gradient(#fffdf2,#ffe5ae);border:4px solid #4b2d1c;border-radius:18px;box-shadow:0 5px 0 #8b4a12;padding:8px}.devGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.dev button{height:44px;border:0;border-radius:15px;background:linear-gradient(#59bdff,#2575e8);color:#fff;font-weight:1000;font-size:16px;box-shadow:0 4px 0 #0d4b99}.story{position:fixed;inset:0;background:#0009;z-index:60;display:none;align-items:center;justify-content:center;padding:18px}.storyCard{width:100%;max-width:370px;background:linear-gradient(#fffdf2,#ffe1a0);color:#3b2413;border:5px solid #4b2d1c;border-radius:24px;box-shadow:0 8px 0 #8b4a12;padding:18px;text-align:center}.speaker{width:76px;height:76px;margin:0 auto;border:4px solid #4b2d1c;border-radius:24px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 5px 0 #8b4a12}.storyText{font-weight:1000;line-height:1.45;font-size:17px;margin:12px 0}.storyBtn{width:100%;height:44px;border:0;border-radius:16px;background:linear-gradient(#ffbd37,#ff8b00);color:#fff;font-size:19px;font-weight:1000;box-shadow:0 5px 0 #9b4f00}@media(max-height:760px){.mapCard{min-height:570px}.node{height:74px}.stage{width:196px;min-height:64px;padding-left:54px}.stageIcon{width:39px;height:39px}.stage b{font-size:15px}.stage small{font-size:10px}.avatar{width:46px;height:46px}.title{font-size:26px}.mapCard:after{font-size:20px;line-height:94px}}</style></head><body><div class="worldApp"><div class="skyGlow"></div><div class="hill h1"></div><div class="hill h2"></div><div class="hill h3"></div><div class="cloud c1">☁️</div><div class="cloud c2">☁️</div><div class="cloud c3">☁️</div><div class="sparkle sp1">✦</div><div class="sparkle sp2">✦</div><div class="sparkle sp3">✦</div><section class="topCard"><div class="title">축산구매<br><span>서바이벌!</span></div><div class="sub">왕국을 돌파하고 최종 구매마왕을 격파하세요</div><div class="saveRow"><button class="saveBtn" id="save1" onclick="switchSlot(1)">SAVE 1</button><button class="saveBtn" id="save2" onclick="switchSlot(2)">SAVE 2</button><button class="saveBtn" id="save3" onclick="switchSlot(3)">SAVE 3</button></div><div class="statRow"><div class="stat">진행률<b id="pText">0%</b></div><div class="stat">별<b id="starText">0</b></div><div class="stat">현재<b id="nowText">농장</b></div></div><div class="progress"><div id="progressFill"></div></div></section><section class="kingdom"><div class="kingTitle">왕국 선택</div><div class="kingGrid"><button class="kingBtn" id="k_chicken" onclick="setKingdom('chicken')">🐔 계육</button><button class="kingBtn" id="k_pig" onclick="setKingdom('pig')">🐷 돈육</button><button class="kingBtn" id="k_cow" onclick="setKingdom('cow')">🐮 우육</button><button class="kingBtn" id="k_demon" onclick="setKingdom('demon')">👑 마왕</button></div></section><section class="mapCard" id="map"><div class="path"></div><div class="gate">START</div></section><section class="dev"><div class="devGrid"><button onclick="openSettings()">⚙ 개발자모드</button><button onclick="resetWorld()">초기화</button></div></section></div><div class="story" id="story"><div class="storyCard"><div class="speaker" id="speaker">👨‍💼</div><div class="storyText" id="storyText">스테이지 시작</div><button class="storyBtn" id="storyBtn">시작</button></div></div><script src="./js/save.js"></script><script>const meta={farm:{place:'농장',desc:'농장 출하 동선을 정리하자',story:['농장주','오늘 출하 물량이 많습니다.','🚜']},bid:{place:'경매시장',desc:'시세를 보고 적정가를 잡자',story:['팀장','이번 계약은 타이밍이 핵심이다.','💰']},butcher:{place:'도축공장',desc:'필요 부위만 빠르게 정형하자',story:['공장장','주문 부위만 정확히 잡아주세요.','🔪']},packing:{place:'물류센터',desc:'박스를 맞춰 출차시키자',story:['물류팀','냉장차 출발 시간이 얼마 안 남았습니다.','📦']},sales:{place:'대형마트',desc:'고객 주문을 빠르게 처리하자',story:['영업팀','행사 매대가 터질 것 같습니다!','🏪']},boss:{place:'마왕성',desc:'최종 구매마왕을 격파하자',story:['구매마왕','여기까지 온 걸 후회하게 해주마.','👑']}};function switchSlot(n){setActiveSlot(n);render()}function setKingdom(w){var d=loadWorldSave();d.world=w;d.kingdoms[w]=true;saveWorld(d);render()}function stageStatus(d,s,i){var ok=d.unlocked[s.id]||d.devMode||i===0;var st=d.stars[s.id]||0;var done=st>0;return{ok:ok,st:st,done:done,current:ok&&!done&&firstOpen(d)===s.id}}function firstOpen(d){for(var i=0;i<SHIN_STAGE_FLOW.length;i++){var s=SHIN_STAGE_FLOW[i];if((d.unlocked[s.id]||d.devMode||i===0)&&!(d.stars[s.id]>0))return s.id}return'boss'}function goStage(s,ok){if(!ok){alert('이전 단계를 먼저 클리어해야 합니다.');return}var m=meta[s.id]||{story:['팀장','준비됐으면 시작하자.',s.icon]};speaker.textContent=m.story[2];storyText.innerHTML='<b>'+m.story[0]+'</b><br>'+m.story[1];story.style.display='flex';storyBtn.onclick=function(){location.href=s.url+'?stage='+s.id}}function render(){var d=loadWorldSave();[1,2,3].forEach(function(n){document.getElementById('save'+n).classList.toggle('active',activeSlot()===n)});var pct=progressPercent(d),stars=totalStars(d),cur=firstOpen(d);progressFill.style.width=pct+'%';pText.textContent=pct+'%';starText.textContent=stars+'개';nowText.textContent=(meta[cur]&&meta[cur].place)||'완료';['chicken','pig','cow','demon'].forEach(function(w){document.getElementById('k_'+w).classList.toggle('active',(d.world||'chicken')===w)});map.innerHTML='<div class="path"></div><div class="gate">START</div>';var flow=[...SHIN_STAGE_FLOW].reverse();var top=58,step=88;if(innerHeight<760){top=50;step=76}flow.forEach(function(s,ri){var i=SHIN_STAGE_FLOW.findIndex(x=>x.id===s.id),st=stageStatus(d,s,i),m=meta[s.id]||{};var node=document.createElement('div');var align=ri%2===0?'right':'left';if(s.id==='boss')align='center';node.className='node '+align;node.style.top=(top+ri*step)+'px';var btn=document.createElement('button');btn.className='stage '+(st.ok?'':'lock')+' '+(st.done?'done':'')+' '+(st.current?'current':'');btn.innerHTML='<div class="stageIcon">'+(st.ok?s.icon:'🔒')+'</div><b>'+s.label+'</b><small>'+((m.place||'지역')+' · '+(st.ok?(m.desc||'플레이 가능'):'잠김'))+'</small><div class="starLine">'+('★'.repeat(st.st))+('☆'.repeat(3-st.st))+'</div>';btn.onclick=function(){goStage(s,st.ok)};node.appendChild(btn);map.appendChild(node)});var idx=SHIN_STAGE_FLOW.findIndex(s=>s.id===cur);if(idx<0)idx=SHIN_STAGE_FLOW.length-1;var revIdx=SHIN_STAGE_FLOW.length-1-idx;var av=document.createElement('div');av.className='avatar';av.style.top=(top+revIdx*step+43)+'px';map.appendChild(av)}function openSettings(){if(confirm('개발자모드를 켜고 전체 해금합니다.')){setDevMode(true);devUnlockAll();render()}}function resetWorld(){if(confirm('현재 세이브를 초기화할까요?')){localStorage.removeItem('shin_save_'+activeSlot());render()}}render();</script></body></html>
