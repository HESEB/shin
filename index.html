<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>shin</title><link rel="stylesheet" href="./css/common.css"></head><body><div class="shin-app"><section class="shin-panel"><div class="shin-logo">축산구매<br><span>서바이벌!</span></div><p class="center strong">shin v1.0.2 실행 복구</p><p class="center strong">정식 게임 폴더 연결 / 저장·해금 유지</p><div class="save-row"><button class="save-btn" id="save1" onclick="switchSlot(1)">SAVE 1</button><button class="save-btn" id="save2" onclick="switchSlot(2)">SAVE 2</button><button class="save-btn" id="save3" onclick="switchSlot(3)">SAVE 3</button></div><div class="progress"><div id="progressFill"></div></div><p id="progressText" class="center strong"></p></section><section class="shin-panel mt10"><b>왕국 선택</b><div class="grid2 mt8"><button class="shin-btn" onclick="setKingdom('chicken')">계육</button><button class="shin-btn" onclick="setKingdom('pig')">돈육</button><button class="shin-btn" onclick="setKingdom('cow')">우육</button><button class="shin-btn" onclick="setKingdom('demon')">대마왕</button></div><p id="worldText" class="center strong"></p></section><section class="map" id="map"></section><section class="shin-panel mt10"><div class="grid2"><button class="shin-btn" onclick="openSettings()">⚙ 개발자모드</button><button class="shin-btn" onclick="resetWorld()">초기화</button></div></section></div><script src="./js/save.js"></script><script>function switchSlot(n){setActiveSlot(n);render()}function setKingdom(w){var d=loadWorldSave();d.world=w;d.kingdoms[w]=true;saveWorld(d);render()}function render(){var d=loadWorldSave();[1,2,3].forEach(function(n){document.getElementById('save'+n).classList.toggle('active',activeSlot()===n)});progressFill.style.width=progressPercent(d)+'%';progressText.textContent='진행률 '+progressPercent(d)+'% · 별 '+totalStars(d)+'개';worldText.textContent='현재 왕국: '+({chicken:'계육',pig:'돈육',cow:'우육',demon:'대마왕'}[d.world||'chicken']);map.innerHTML='';SHIN_STAGE_FLOW.forEach(function(s,i){var ok=d.unlocked[s.id]||d.devMode;var st=d.stars[s.id]||0;var node=document.createElement('div');node.className='node '+(s.id==='boss'?'boss':'');node.innerHTML='<div class="stars">'+('★'.repeat(st))+('☆'.repeat(3-st))+'</div><button class="stageBtn '+(ok?'':'lock')+'"><b>'+(i+1)+'. '+s.label+'</b><small>'+(ok?'플레이 가능':'잠김')+'</small></button><div class="icon">'+(ok?s.icon:'🔒')+'</div>';node.querySelector('button').onclick=function(){if(!ok){alert('이전 단계를 먼저 클리어해야 합니다.');return;}location.href=s.url+'?stage='+s.id};map.appendChild(node)})}function openSettings(){if(confirm('개발자모드를 켜고 전체 해금합니다.')){setDevMode(true);devUnlockAll();render()}}render();</script></body></html>
