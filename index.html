<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>축산구매 서바이벌</title><link rel="stylesheet" href="./css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;min-height:100%;background:#10151f;font-family:Arial,'Noto Sans KR',sans-serif;color:#3b2413}body{overflow-x:hidden}.app{max-width:480px;min-height:100dvh;margin:0 auto;padding:10px;background:linear-gradient(#86ddff 0 18%,#a6e77a 18% 58%,#5fa64a 58% 78%,#4a2b19 78%);position:relative;overflow:hidden}.sky{position:absolute;inset:0;pointer-events:none}.sky:before{content:'';position:absolute;left:50%;top:-72px;width:360px;height:220px;transform:translateX(-50%);background:radial-gradient(circle,#fff4a8 0,#fff7 34%,transparent 68%)}.cloud{position:absolute;font-size:34px;opacity:.75;animation:cloud 24s linear infinite}.c1{left:-80px;top:70px}.c2{right:-80px;top:130px;animation-duration:30s}@keyframes cloud{to{transform:translateX(620px)}}.hero{position:relative;z-index:2;border:5px solid #432313;border-radius:26px;background:linear-gradient(#fffdf4,#ffe5a9);box-shadow:0 8px 0 #8b4a12,inset 0 0 0 4px #fff7;overflow:hidden}.heroArt{height:128px;background:url('./assets/art/hero.svg') center/cover no-repeat}.saveRow{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px}.saveBtn,.worldBtn,.playBtn,.devBtn{border:3px solid #432313;border-radius:14px;background:linear-gradient(#ffe783,#ff8b00);color:#fff;font-weight:1000;box-shadow:0 4px 0 #8b4a12,inset 0 0 0 3px #fff5;height:36px}.saveBtn.active,.worldBtn.active{background:linear-gradient(#7bd6ff,#1962d5)}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:0 8px 9px}.stat{border:3px solid #432313;border-radius:13px;background:#fff8e8;box-shadow:0 3px 0 #0002;text-align:center;font-size:11px;font-weight:900;padding:4px}.stat b{display:block;font-size:15px}.worlds{position:relative;z-index:2;margin-top:10px;border:4px solid #432313;border-radius:20px;background:linear-gradient(#fffdf4,#ffe8b4);box-shadow:0 6px 0 #8b4a12;padding:8px}.worldTitle{font-size:15px;font-weight:1000;margin-bottom:7px}.worldGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.worldBtn{height:42px;font-size:13px}.campaign{position:relative;z-index:2;margin-top:12px;border:5px solid #432313;border-radius:30px;box-shadow:0 8px 0 #5c3518;overflow:hidden;min-height:660px;background:#99db69}.campaign.chicken{background:linear-gradient(#b9f2ff 0 16%,#d8f6a7 16% 56%,#77c65d 56%)}.campaign.pig{background:linear-gradient(#ffd6e2 0 16%,#f4c087 16% 58%,#b77747 58%)}.campaign.cow{background:linear-gradient(#b9f2ff 0 15%,#c9f7a7 15% 54%,#67b85b 54%)}.campaign.demon{background:linear-gradient(#35194e 0 16%,#6b2441 16% 56%,#23111b 56%);color:#fff}.campaign:before{content:'';position:absolute;left:50%;top:72px;bottom:64px;width:28px;transform:translateX(-50%);background:linear-gradient(#ffe9a3,#d99338);border-left:4px solid #714018;border-right:4px solid #714018;border-radius:999px;z-index:1}.campaign.demon:before{background:linear-gradient(#77515f,#2b1b22);border-color:#c96b3f}.banner{position:relative;z-index:3;margin:12px;border:4px solid #432313;border-radius:22px;background:linear-gradient(#fffdf4,#ffe5aa);box-shadow:0 5px 0 #8b4a12;padding:10px 12px;color:#3b2413}.banner h2{margin:0;font-size:24px;line-height:1;font-weight:1000}.banner p{margin:5px 0 0;font-size:12px;font-weight:900;color:#7b4a1f}.demon .banner{background:linear-gradient(#fff2d6,#d9b3ff)}.node{position:absolute;z-index:4;width:100%;height:82px;display:flex;align-items:center}.node.left{justify-content:flex-start;padding-left:15px}.node.right{justify-content:flex-end;padding-right:15px}.node.center{justify-content:center}.place{position:relative;width:218px;min-height:74px;border:4px solid #432313;border-radius:23px;background:linear-gradient(#fffdf4,#ffe1a0);box-shadow:0 6px 0 #8b4a12,inset 0 0 0 4px #fff6;padding:7px 8px 7px 67px;text-align:left;color:#3b2413}.place.done{background:linear-gradient(#fffdf4,#d9ffd0)}.place.lock{filter:grayscale(.9);opacity:.62}.place.current{animation:pulse .75s infinite alternate}@keyframes pulse{to{transform:translateY(-3px);box-shadow:0 6px 0 #8b4a12,0 0 20px #fff35a,inset 0 0 0 4px #fff8}}.badge{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:50px;height:50px;border:3px solid #432313;border-radius:17px;background:#fff center/cover no-repeat;box-shadow:0 4px 0 #8b4a12}.place b{display:block;font-size:17px;line-height:1.05;font-weight:1000}.place small{display:block;font-size:11px;font-weight:900;color:#7b4a1f;margin-top:2px}.demon .place small{color:#5d3348}.star{font-size:13px;color:#ffbf1d;text-shadow:0 2px 0 #805000;margin-top:2px}.avatar{position:absolute;left:50%;transform:translate(-50%,-50%);z-index:8;width:52px;height:52px;border:4px solid #432313;border-radius:50%;background:linear-gradient(#fff0c8,#ffca73);box-shadow:0 5px 0 #8b4a12;animation:bob .55s infinite alternate}@keyframes bob{to{transform:translate(-50%,-57%)}}.avatar:before{content:'';position:absolute;left:12px;top:9px;width:26px;height:28px;border:3px solid #3b2214;border-radius:50% 50% 44% 44%;background:linear-gradient(#ffd3a0,#e99c61)}.avatar:after{content:'';position:absolute;left:9px;top:2px;width:32px;height:18px;border:3px solid #3b2214;border-radius:14px 14px 10px 10px;background:#fff;box-shadow:0 8px 0 -3px #fff}.gate{position:absolute;left:50%;bottom:13px;transform:translateX(-50%);z-index:3;border:4px solid #432313;border-radius:18px;background:#fff8e8;box-shadow:0 5px 0 #8b4a12;padding:6px 14px;font-weight:1000}.dev{position:relative;z-index:2;margin-top:10px;border:4px solid #432313;border-radius:18px;background:#fff8e8;box-shadow:0 5px 0 #8b4a12;padding:8px}.dev summary{font-weight:1000;cursor:pointer}.devGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}.devBtn{height:42px;background:linear-gradient(#7bd6ff,#1962d5)}.story{position:fixed;inset:0;background:#000a;z-index:60;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(2px)}.storyCard{width:100%;max-width:370px;border:5px solid #432313;border-radius:24px;background:linear-gradient(#fffdf4,#ffe1a0);box-shadow:0 8px 0 #8b4a12;padding:16px;text-align:center}.speaker{width:100%;height:132px;border:4px solid #432313;border-radius:20px;background:center/cover no-repeat #fff;box-shadow:0 5px 0 #8b4a12}.storyText{font-size:17px;font-weight:1000;line-height:1.45;margin:12px 0}.playBtn{width:100%;height:46px;font-size:19px}.farmArt{background-image:url('./assets/art/stage-farm.svg')}.bidArt{background-image:url('./assets/art/stage-bid.svg')}.butcherArt{background-image:url('./assets/art/stage-butcher.svg')}.packingArt{background-image:url('./assets/art/stage-packing.svg')}.salesArt{background-image:url('./assets/art/stage-sales.svg')}.bossArt{background-image:url('./assets/art/boss.svg')}@media(max-height:760px){.heroArt{height:92px}.campaign{min-height:575px}.banner{margin:9px;padding:8px}.banner h2{font-size:21px}.node{height:72px}.place{width:200px;min-height:64px;padding-left:58px}.badge{width:42px;height:42px}.place b{font-size:15px}.place small{font-size:10px}.avatar{width:44px;height:44px}}</style></head><body><div class="app"><div class="sky"><div class="cloud c1">☁️</div><div class="cloud c2">☁️</div></div><section class="hero"><div class="heroArt"></div><div class="saveRow"><button class="saveBtn" id="save1" onclick="switchSlot(1)">SAVE 1</button><button class="saveBtn" id="save2" onclick="switchSlot(2)">SAVE 2</button><button class="saveBtn" id="save3" onclick="switchSlot(3)">SAVE 3</button></div><div class="stats"><div class="stat">진행률<b id="pText">0%</b></div><div class="stat">별<b id="starText">0</b></div><div class="stat">현재<b id="nowText">-</b></div></div></section><section class="worlds"><div class="worldTitle">월드 선택</div><div class="worldGrid"><button class="worldBtn" id="w_chicken" onclick="setKingdom('chicken')">🐔 계육</button><button class="worldBtn" id="w_pig" onclick="setKingdom('pig')">🐷 돈육</button><button class="worldBtn" id="w_cow" onclick="setKingdom('cow')">🐮 우육</button><button class="worldBtn" id="w_demon" onclick="setKingdom('demon')">🏰 마왕</button></div></section><section class="campaign chicken" id="campaign"></section><details class="dev"><summary>⚙ 개발자/테스트 메뉴</summary><div class="devGrid"><button class="devBtn" onclick="openSettings()">전체 해금</button><button class="devBtn" onclick="resetWorld()">초기화</button></div></details></div><div class="story" id="story"><div class="storyCard"><div class="speaker" id="speaker"></div><div class="storyText" id="storyText">스테이지 시작</div><button class="playBtn" id="storyBtn">시작</button></div></div><script src="./js/save.js"></script><script>const WORLDS={chicken:{title:'계육왕국',icon:'🐔',boss:'병아리킹',theme:'밝은 농장과 황금창고를 지나 병아리성으로 향합니다.',places:['병아리마을','경매광장','정육공방','황금창고','미식시장','병아리성'],bossStage:'chicken'},pig:{title:'돈육왕국',icon:'🐷',boss:'돼지왕',theme:'양돈목장과 비딩거리를 넘어 돼지왕궁으로 진격합니다.',places:['양돈목장','비딩거리','정육성','물류항','바비큐시장','돼지왕궁'],bossStage:'pig'},cow:{title:'우육왕국',icon:'🐮',boss:'황소장군',theme:'초원목장과 냉장요새를 지나 황소요새를 공략합니다.',places:['초원목장','거래회관','장인정육소','냉장요새','미식광장','황소요새'],bossStage:'cow'},demon:{title:'마왕성',icon:'🏰',boss:'구매대마왕',theme:'모든 스테이지가 최종 난이도로 변하는 암흑 캠페인입니다.',places:['혼돈농장','시세미궁','암흑도축장','검은물류기지','독점시장','구매대마왕성'],bossStage:'demon'}};const TYPES=[['farm','출하','farmArt'],['bid','입찰','bidArt'],['butcher','도축','butcherArt'],['packing','물류','packingArt'],['sales','판매','salesArt'],['boss','보스전','bossArt']];function switchSlot(n){setActiveSlot(n);render()}function setKingdom(w){var d=loadWorldSave();d.world=w;d.kingdoms[w]=true;saveWorld(d);render()}function status(d,id,i){var ok=d.unlocked[id]||d.devMode||i===0;var st=d.stars[id]||0;var cur=firstOpen(d);return{ok,st,done:st>0,current:ok&&!st&&cur===id}}function firstOpen(d){for(var i=0;i<TYPES.length;i++){var id=TYPES[i][0];if((d.unlocked[id]||d.devMode||i===0)&&!(d.stars[id]>0))return id}return'boss'}function go(t,ok){if(!ok){alert('이전 지역을 먼저 클리어해야 합니다.');return}var d=loadWorldSave(),w=d.world||'chicken',info=WORLDS[w],url=t[0]==='boss'?'./games/boss/index.html?stage='+info.bossStage:'./games/'+t[0]+'/index.html?stage='+t[0]+'&world='+w;speaker.className='speaker '+t[2];storyText.innerHTML='<b>'+info.places[TYPES.indexOf(t)]+'</b><br>'+t[1]+' 임무를 시작합니다.<br><small>'+info.title+' · '+(t[0]==='boss'?info.boss:'캠페인')+'</small>';story.style.display='flex';storyBtn.onclick=function(){location.href=url}}function render(){var d=loadWorldSave(),w=d.world||'chicken',info=WORLDS[w];campaign.className='campaign '+w;['chicken','pig','cow','demon'].forEach(k=>document.getElementById('w_'+k).classList.toggle('active',k===w));[1,2,3].forEach(n=>document.getElementById('save'+n).classList.toggle('active',activeSlot()===n));pText.textContent=progressPercent(d)+'%';starText.textContent=totalStars(d)+'개';nowText.textContent=info.title;campaign.innerHTML='<div class="banner"><h2>'+info.icon+' '+info.title+'</h2><p>'+info.theme+'</p></div><div class="gate">START</div>';var top=112,step=86;if(innerHeight<760){top=92;step=74}TYPES.slice().reverse().forEach(function(t,ri){var i=TYPES.findIndex(x=>x[0]===t[0]),s=status(d,t[0],i),node=document.createElement('div');var align=ri%2?'left':'right';if(t[0]==='boss')align='center';node.className='node '+align;node.style.top=(top+ri*step)+'px';var b=document.createElement('button');b.className='place '+(s.done?'done ':'')+(s.ok?'':'lock ')+(s.current?'current':'');b.innerHTML='<div class="badge '+t[2]+'"></div><b>'+info.places[i]+'</b><small>'+t[1]+' · '+(t[0]==='boss'?info.boss:'임무')+'</small><div class="star">'+('★'.repeat(s.st))+('☆'.repeat(3-s.st))+'</div>';b.onclick=function(){go(t,s.ok)};node.appendChild(b);campaign.appendChild(node)});var idx=TYPES.findIndex(x=>x[0]===firstOpen(d));if(idx<0)idx=5;var rev=5-idx,av=document.createElement('div');av.className='avatar';av.style.top=(top+rev*step+41)+'px';campaign.appendChild(av)}function openSettings(){if(confirm('개발자모드를 켜고 전체 해금합니다.')){setDevMode(true);devUnlockAll();render()}}render();</script></body></html>
