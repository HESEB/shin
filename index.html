<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>shin · 축산구매의 신</title>
<link rel="stylesheet" href="./css/common.css">
</head>
<body>
<div class="shin-app">
  <header class="shin-topbar">
    <div class="shin-profile">👨‍💼 김대리</div>
    <div class="shin-currency">🪙 <span id="coins">0</span></div>
    <div class="shin-currency">🧪 <span id="points">0</span>P</div>
    <button class="shin-icon" onclick="openSettings()">⚙️</button>
  </header>

  <section class="shin-panel">
    <div class="shin-logo">축산구매<br><span>서바이벌!</span></div>
    <p class="center strong">shin v1.0-1 · 프로젝트 구조 리팩터링</p>
    <div class="save-row">
      <button class="save-btn" id="save1" onclick="switchSlot(1)">SAVE 1</button>
      <button class="save-btn" id="save2" onclick="switchSlot(2)">SAVE 2</button>
      <button class="save-btn" id="save3" onclick="switchSlot(3)">SAVE 3</button>
    </div>
    <div class="progress"><div id="progressFill"></div></div>
    <p id="progressText" class="center strong"></p>
  </section>

  <section class="map" id="map"></section>

  <section class="shin-panel mt10">
    <b>🧪 구매연구소</b>
    <div class="grid2 mt8">
      <button class="shin-btn" onclick="openLab()">⚔ 연구</button>
      <button class="shin-btn" onclick="openHelp()">⌨️ 조작</button>
    </div>
  </section>
</div>

<div class="popup" id="popup">
  <div class="shin-panel popup-card">
    <h2 id="popTitle">안내</h2>
    <p id="popText"></p>
    <div id="popExtra"></div>
    <button class="shin-btn full mt8" id="popAction">확인</button>
    <button class="shin-btn full mt8 blue" onclick="closePopup()">닫기</button>
  </div>
</div>

<script src="./js/save.js"></script>
<script src="./js/world.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/engine.js"></script>
<script>
let world;
function switchSlot(n){ setActiveSlot(n); render(); }
function render(){
  const save=loadWorldSave();
  coins.textContent=save.coins.toLocaleString();
  points.textContent=save.points.toLocaleString();
  [1,2,3].forEach(n=>document.getElementById('save'+n).classList.toggle('active',activeSlot()===n));
  const pct=progressPercent(save);
  progressFill.style.width=pct+'%';
  progressText.textContent=`진행률 ${pct}% · 별 ${totalStars(save)}개`;
  world=new ShinWorld('map');
  world.render();
}
function popup(t,txt,extra,act,fn){
  popTitle.innerHTML=t; popText.innerHTML=txt; popExtra.innerHTML=extra||''; popAction.textContent=act; popAction.onclick=fn; document.getElementById('popup').style.display='flex';
}
function closePopup(){ document.getElementById('popup').style.display='none'; }
function openHelp(){ popup('조작 안내','WASD/방향키 이동<br>Space 시작/확인/공격<br>Q 폐기/회복<br>E 스킬<br>1~5 영업판매 메뉴<br><br>보스전은 왼쪽 터치 조이스틱을 사용합니다.','','확인',closePopup); }
function openLab(){
  const save=loadWorldSave(), r=save.research;
  const extra=`<div class="left strong">
  <button class="shin-btn full mt8" onclick="buyResearch('atk')">⚔ 공격 Lv.${r.atk} 강화</button>
  <button class="shin-btn full mt8" onclick="buyResearch('def')">🛡 방어 Lv.${r.def} 강화</button>
  <button class="shin-btn full mt8" onclick="buyResearch('speed')">💨 이동 Lv.${r.speed} 강화</button>
  <button class="shin-btn full mt8" onclick="buyResearch('bomb')">💣 전체공격 Lv.${r.bomb} 강화</button></div>`;
  popup('구매연구소','현재 구매포인트: '+save.points+'P',extra,'확인',closePopup);
}
function buyResearch(type){ if(addResearch(type)){closePopup();render();openLab()} else alert('구매포인트가 부족합니다.'); }
function openSettings(){
  const save=loadWorldSave();
  const extra=`<div class="left strong">
  <label><input type="checkbox" id="devToggle" ${save.devMode?'checked':''}> 개발자모드 ON</label>
  <select id="devStage" class="dev-select">${SHIN_STAGE_FLOW.map(s=>`<option value="${s.id}">${s.icon} ${s.label}</option>`).join('')}</select>
  <button class="shin-btn full mt8" onclick="applyDevStage()">선택 스테이지까지 해금</button>
  <button class="shin-btn full mt8" onclick="applyDevStars()">선택 스테이지 ★★★ 처리</button>
  <button class="shin-btn full mt8" onclick="unlockAllDev()">전체 해금</button>
  <button class="shin-btn full mt8 red" onclick="resetWorld()">현재 SAVE 초기화</button></div>`;
  popup('설정 / 개발자모드','테스트용으로 진행도를 수동 변경할 수 있습니다.',extra,'적용',()=>{setDevMode(devToggle.checked);closePopup();render()});
}
function applyDevStage(){ setDevMode(devToggle.checked); devUnlockTo(devStage.value); closePopup(); render(); }
function applyDevStars(){ setDevMode(devToggle.checked); devUnlockTo(devStage.value); devSetStars(devStage.value,3); closePopup(); render(); }
function unlockAllDev(){ setDevMode(true); devUnlockAll(); closePopup(); render(); }
ShinEngine.boot();
render();
</script>
</body>
</html>
