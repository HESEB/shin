<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>축산구매 서바이벌</title><link rel="stylesheet" href="./css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;min-height:100%;background:#07111f;font-family:Arial,'Noto Sans KR',sans-serif;color:#fff}body{overflow-x:hidden}.homeApp{max-width:480px;min-height:100dvh;margin:0 auto;background:linear-gradient(#58c8ff 0 35%,#8bd46c 35% 74%,#263b20 74%);position:relative;overflow:hidden;padding:8px 8px 88px}.homeApp:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 75% 9%,#fff5a6 0 6%,transparent 14%),radial-gradient(circle at 20% 28%,#fff7 0 5%,transparent 14%);pointer-events:none}.topHud{position:relative;z-index:5;display:grid;grid-template-columns:88px 1fr 1fr 42px;gap:6px;align-items:center}.profile,.cash,.gem,.miniBtn{height:42px;border:4px solid #3b2214;border-radius:15px;background:linear-gradient(#fffdf4,#ffe1a0);color:#3b2413;box-shadow:0 4px 0 #7b4217,inset 0 0 0 3px #fff8;font-weight:1000}.profile{display:grid;grid-template-columns:34px 1fr;align-items:center;padding:2px 4px;font-size:11px;line-height:1}.face{width:31px;height:31px;border:3px solid #3b2214;border-radius:11px;background:url('./assets/art/hero.svg') 48% 52%/430% no-repeat}.lvbar{height:7px;border:2px solid #3b2214;border-radius:999px;background:#593018;margin-top:3px;overflow:hidden}.lvbar i{display:block;height:100%;width:68%;background:linear-gradient(90deg,#ffdd3d,#ff8b00)}.cash,.gem{display:flex;align-items:center;justify-content:center;gap:4px;font-size:16px}.miniBtn{font-size:22px}.splash{position:relative;z-index:3;height:385px;margin-top:8px;border:5px solid #3b2214;border-radius:25px;background:url('./assets/art/hero.svg') center/cover no-repeat;box-shadow:0 8px 0 #203b23,0 0 0 4px #fff5 inset;overflow:hidden}.splash:before{content:'';position:absolute;inset:0;background:linear-gradient(#0000 0 55%,#0008 100%)}.bossRow{position:absolute;left:8px;right:8px;bottom:118px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.bossCard{height:78px;border:4px solid #3b2214;border-radius:18px;background:#fff8e8 center/cover no-repeat;box-shadow:0 5px 0 #0007;position:relative;overflow:hidden}.bossCard b{position:absolute;left:5px;right:5px;bottom:4px;background:#0009;border-radius:9px;padding:2px;color:#fff;text-align:center;font-size:12px;text-shadow:0 2px #000}.bossChicken{background-image:url('./assets/art/stage-farm.svg')}.bossCow{background-image:url('./assets/art/stage-butcher.svg')}.bossDemon{background-image:url('./assets/art/boss.svg')}.mainStart{position:absolute;left:50%;bottom:42px;transform:translateX(-50%);width:235px;height:66px;border:5px solid #3b2214;border-radius:24px;background:linear-gradient(#ffe36a,#ff8b00);box-shadow:0 7px 0 #7b4217,inset 0 0 0 4px #fff7;color:#fff;font-size:28px;font-weight:1000;text-shadow:0 3px 0 #7b4217}.eventBar{position:absolute;left:10px;right:10px;bottom:8px;height:28px;border:3px solid #3b2214;border-radius:14px;background:#0009;color:#ffef8a;font-weight:1000;font-size:12px;display:flex;align-items:center;justify-content:center}.worldPanel{position:relative;z-index:4;margin-top:10px;border:5px solid #3b2214;border-radius:22px;background:linear-gradient(#fffdf4,#ffe5aa);box-shadow:0 7px 0 #7b4217;color:#3b2413;padding:9px}.panelTitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:16px;font-weight:1000}.saveTiny{display:flex;gap:3px}.saveTiny button{width:38px;height:26px;border:2px solid #3b2214;border-radius:9px;background:#fff;font-weight:1000;color:#3b2413}.saveTiny button.active{background:linear-gradient(#7bd6ff,#1962d5);color:#fff}.worldGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.worldBtn{height:78px;border:4px solid #3b2214;border-radius:18px;background:linear-gradient(#fff,#dfffd5);box-shadow:0 4px 0 #7b4217;color:#3b2413;font-weight:1000;padding:4px;font-size:12px;position:relative}.worldBtn span{display:block;font-size:25px}.worldBtn.active{background:linear-gradient(#ffe36a,#ff8b00);color:#fff;text-shadow:0 2px #7b4217}.worldBtn.lock{filter:grayscale(.8);opacity:.55}.campaign{position:relative;z-index:3;margin-top:10px;border:5px solid #3b2214;border-radius:28px;box-shadow:0 8px 0 #111;overflow:hidden;min-height:630px;color:#3b2413}.campaign.chicken{background:linear-gradient(#c2f5ff 0 17%,#e4f6ac 17% 55%,#7ac95c 55%)}.campaign.pig{background:linear-gradient(#ffd5e3 0 17%,#f6c18b 17% 55%,#b97948 55%)}.campaign.cow{background:linear-gradient(#c2f5ff 0 17%,#d9ffc2 17% 55%,#67b85b 55%)}.campaign.demon{background:linear-gradient(#2c1548 0 17%,#77364c 17% 56%,#180c16 56%)}.kingBanner{margin:10px;border:4px solid #3b2214;border-radius:20px;background:linear-gradient(#fffdf4,#ffe5aa);box-shadow:0 5px 0 #7b4217;padding:9px 10px;position:relative;z-index:3}.kingBanner h2{margin:0;font-size:24px;line-height:1;font-weight:1000}.kingBanner p{margin:5px 0 0;font-size:12px;color:#7b4a1f;font-weight:900}.route{position:absolute;left:50%;top:80px;bottom:54px;width:24px;transform:translateX(-50%);border-left:4px solid #714018;border-right:4px solid #714018;background:linear-gradient(#ffe9a3,#d99338);border-radius:999px;z-index:1}.campaign.demon .route{background:linear-gradient(#81606e,#2b1b22);border-color:#d98250}.node{position:absolute;z-index:4;width:100%;height:76px;display:flex;align-items:center}.node.left{justify-content:flex-start;padding-left:13px}.node.right{justify-content:flex-end;padding-right:13px}.node.center{justify-content:center}.place{position:relative;width:214px;min-height:68px;border:4px solid #3b2214;border-radius:22px;background:linear-gradient(#fffdf4,#ffe1a0);box-shadow:0 6px 0 #7b4217,inset 0 0 0 4px #fff6;padding:7px 8px 7px 64px;text-align:left;color:#3b2413}.place.done{background:linear-gradient(#fffdf4,#d9ffd0)}.place.lock{filter:grayscale(.9);opacity:.6}.place.current{animation:glow .72s infinite alternate}@keyframes glow{to{transform:translateY(-3px);box-shadow:0 6px 0 #7b4217,0 0 20px #fff35a,inset 0 0 0 4px #fff8}}.badge{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:48px;height:48px;border:3px solid #3b2214;border-radius:16px;background:#fff center/cover no-repeat;box-shadow:0 4px 0 #7b4217}.place b{font-size:16px;font-weight:1000}.place small{display:block;font-size:10px;font-weight:900;color:#7b4a1f}.star{font-size:13px;color:#ffbf1d;text-shadow:0 2px 0 #805000}.runner{position:absolute;left:50%;transform:translate(-50%,-50%);z-index:8;width:50px;height:50px;border:4px solid #3b2214;border-radius:50%;background:url('./assets/art/hero.svg') 49% 50%/540% no-repeat #fff;box-shadow:0 5px 0 #7b4217;animation:bob .55s infinite alternate}@keyframes bob{to{transform:translate(-50%,-57%)}}.farmArt{background-image:url('./assets/art/stage-farm.svg')}.bidArt{background-image:url('./assets/art/stage-bid.svg')}.butcherArt{background-image:url('./assets/art/stage-butcher.svg')}.packingArt{background-image:url('./assets/art/stage-packing.svg')}.salesArt{background-image:url('./assets/art/stage-sales.svg')}.bossArt{background-image:url('./assets/art/boss.svg')}.bottomNav{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);width:min(464px,calc(100% - 16px));height:68px;z-index:50;border:4px solid #3b2214;border-radius:24px;background:#17212dcc;backdrop-filter:blur(6px);display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:6px;box-shadow:0 6px 0 #0008}.navBtn{border:0;border-radius:17px;background:linear-gradient(#fffdf4,#ffe1a0);color:#3b2413;font-weight:1000;font-size:11px;box-shadow:0 4px 0 #7b4217}.navBtn b{display:block;font-size:21px}.story{position:fixed;inset:0;background:#000a;z-index:80;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(2px)}.storyCard{width:100%;max-width:370px;border:5px solid #3b2214;border-radius:24px;background:linear-gradient(#fffdf4,#ffe1a0);box-shadow:0 8px 0 #7b4217;padding:15px;text-align:center;color:#3b2413}.speaker{height:142px;border:4px solid #3b2214;border-radius:20px;background:center/cover no-repeat #fff;box-shadow:0 5px 0 #7b4217}.storyText{font-size:17px;font-weight:1000;line-height:1.45;margin:12px 0}.playBtn{width:100%;height:48px;border:4px solid #3b2214;border-radius:18px;background:linear-gradient(#ffe36a,#ff8b00);box-shadow:0 5px 0 #7b4217;color:#fff;font-size:20px;font-weight:1000}.dev{position:relative;z-index:4;margin-top:10px;color:#3b2413;background:#fff8e8;border:4px solid #3b2214;border-radius:18px;padding:8px;box-shadow:0 5px 0 #7b4217}.dev summary{font-weight:1000}.dev button{height:36px;margin-top:6px;border:3px solid #3b2214;border-radius:12px;background:#5fb8ff;color:#fff;font-weight:1000}@media(max-height:760px){.splash{height:300px}.bossRow{bottom:100px}.mainStart{bottom:36px;height:56px}.eventBar{display:none}.worldBtn{height:62px}.campaign{min-height:560px}.node{height:66px}.place{width:198px;min-height:60px;padding-left:56px}.badge{width:40px;height:40px}.place b{font-size:14px}.place small{font-size:9px}}</style></head><body><div class="homeApp"><div class="topHud"><div class="profile"><div class="face"></div><div>김대리<br><small>Lv.25</small><div class="lvbar"><i></i></div></div></div><div class="cash">🪙 <b id="coinText">0</b></div><div class="gem">💎 <b id="gemText">0</b></div><button class="miniBtn" onclick="document.querySelector('.dev').open=!document.querySelector('.dev').open">⚙</button></div><section class="splash"><div class="bossRow"><div class="bossCard bossChicken"><b>병아리킹</b></div><div class="bossCard bossCow"><b>황소장군</b></div><div class="bossCard bossDemon"><b>구매대마왕</b></div></div><button class="mainStart" onclick="continueGame()">🥩 게임 시작</button><div class="eventBar">🎁 매일 접속 보상 · 구매대마왕의 습격 이벤트 진행 중!</div></section><section class="worldPanel"><div class="panelTitle">월드 선택<div class="saveTiny"><button id="s1" onclick="switchSlot(1)">1</button><button id="s2" onclick="switchSlot(2)">2</button><button id="s3" onclick="switchSlot(3)">3</button></div></div><div class="worldGrid"><button class="worldBtn" id="w_chicken" onclick="setKingdom('chicken')"><span>🐔</span>계육왕국</button><button class="worldBtn" id="w_pig" onclick="setKingdom('pig')"><span>🐷</span>돈육왕국</button><button class="worldBtn" id="w_cow" onclick="setKingdom('cow')"><span>🐮</span>우육왕국</button><button class="worldBtn" id="w_demon" onclick="setKingdom('demon')"><span>🏰</span>마왕성</button></div></section><section class="campaign chicken" id="campaign"></section><details class="dev"><summary>개발자/테스트 메뉴</summary><button onclick="openSettings()">전체 해금</button> <button onclick="resetWorld()">초기화</button></details></div><div class="bottomNav"><button class="navBtn" onclick="render()"><b>🗺️</b>월드맵</button><button class="navBtn" onclick="alert('상점은 v1.1에서 열립니다.')"><b>🏪</b>상점</button><button class="navBtn" onclick="alert('도감은 v1.1에서 열립니다.')"><b>📖</b>도감</button><button class="navBtn" onclick="alert('업적은 v1.1에서 열립니다.')"><b>🏆</b>업적</button><button class="navBtn" onclick="document.querySelector('.dev').open=!document.querySelector('.dev').open"><b>⚙️</b>설정</button></div><div class="story" id="story"><div class="storyCard"><div class="speaker" id="speaker"></div><div class="storyText" id="storyText"></div><button class="playBtn" id="storyBtn">시작</button></div></div><script src="./js/save.js"></script><script>const WORLDS={chicken:{title:'계육왕국',icon:'🐔',boss:'병아리킹',theme:'병아리마을에서 미식시장까지 돌파하고 병아리성을 공략하세요.',places:['병아리마을','경매광장','정육공방','황금창고','미식시장','병아리성'],bossStage:'chicken',unlock:true},pig:{title:'돈육왕국',icon:'🐷',boss:'돼지왕',theme:'양돈목장과 바비큐시장을 지나 돼지왕궁으로 진격합니다.',places:['양돈목장','비딩거리','정육성','물류항','바비큐시장','돼지왕궁'],bossStage:'pig'},cow:{title:'우육왕국',icon:'🐮',boss:'황소장군',theme:'초원목장과 냉장요새를 거쳐 황소요새를 점령합니다.',places:['초원목장','거래회관','장인정육소','냉장요새','미식광장','황소요새'],bossStage:'cow'},demon:{title:'마왕성',icon:'🏰',boss:'구매대마왕',theme:'모든 임무가 최종 난이도로 변하는 암흑 캠페인입니다.',places:['혼돈농장','시세미궁','암흑도축장','검은물류기지','독점시장','구매대마왕성'],bossStage:'demon'}};const TYPES=[['farm','출하','farmArt'],['bid','입찰','bidArt'],['butcher','도축','butcherArt'],['packing','물류','packingArt'],['sales','판매','salesArt'],['boss','보스전','bossArt']];function switchSlot(n){setActiveSlot(n);render()}function setKingdom(w){let d=loadWorldSave();if(!d.kingdoms[w]&&!d.devMode&&w!=='chicken'){alert('이전 왕국 보스를 먼저 클리어하세요.');return}d.world=w;saveWorld(d);render()}function firstOpen(d){for(let i=0;i<TYPES.length;i++){let id=TYPES[i][0];if((d.unlocked[id]||d.devMode||i===0)&&!(d.stars[id]>0))return id}return'boss'}function status(d,id,i){let ok=d.unlocked[id]||d.devMode||i===0,st=d.stars[id]||0;return{ok,st,done:st>0,current:ok&&!st&&firstOpen(d)===id}}function continueGame(){let d=loadWorldSave(),id=firstOpen(d),t=TYPES.find(x=>x[0]===id)||TYPES[0];go(t,true)}function go(t,ok){if(!ok){alert('이전 지역을 먼저 클리어해야 합니다.');return}let d=loadWorldSave(),w=d.world||'chicken',info=WORLDS[w],idx=TYPES.findIndex(x=>x[0]===t[0]);let url=t[0]==='boss'?'./games/boss/index.html?stage='+info.bossStage:'./games/'+t[0]+'/index.html?stage='+t[0]+'&world='+w;speaker.className='speaker '+t[2];storyText.innerHTML='<b>'+info.places[idx]+'</b><br>'+info.title+'의 '+t[1]+' 임무를 시작합니다.<br><small>'+(t[0]==='boss'?info.boss:'캠페인 스테이지')+'</small>';story.style.display='flex';storyBtn.onclick=()=>location.href=url}function render(){let d=loadWorldSave(),w=d.world||'chicken',info=WORLDS[w];coinText.textContent=(d.coins||0).toLocaleString();gemText.textContent=(d.gems||0).toLocaleString();[1,2,3].forEach(n=>document.getElementById('s'+n).classList.toggle('active',activeSlot()===n));['chicken','pig','cow','demon'].forEach(k=>{let b=document.getElementById('w_'+k);b.classList.toggle('active',k===w);b.classList.toggle('lock',!d.kingdoms[k]&&!d.devMode&&k!=='chicken')});campaign.className='campaign '+w;campaign.innerHTML='<div class="kingBanner"><h2>'+info.icon+' '+info.title+'</h2><p>'+info.theme+'</p></div><div class="route"></div>';let top=102,step=78;if(innerHeight<760){top=92;step=68}TYPES.slice().reverse().forEach((t,ri)=>{let i=TYPES.findIndex(x=>x[0]===t[0]),s=status(d,t[0],i),node=document.createElement('div'),align=ri%2?'left':'right';if(t[0]==='boss')align='center';node.className='node '+align;node.style.top=(top+ri*step)+'px';let b=document.createElement('button');b.className='place '+(s.done?'done ':'')+(s.ok?'':'lock ')+(s.current?'current':'');b.innerHTML='<div class="badge '+t[2]+'"></div><b>'+info.places[i]+'</b><small>'+t[1]+' · '+(t[0]==='boss'?info.boss:'임무')+'</small><div class="star">'+('★'.repeat(s.st))+('☆'.repeat(3-s.st))+'</div>';b.onclick=()=>go(t,s.ok);node.appendChild(b);campaign.appendChild(node)});let idx=TYPES.findIndex(x=>x[0]===firstOpen(d));if(idx<0)idx=5;let av=document.createElement('div');av.className='runner';av.style.top=(top+(5-idx)*step+38)+'px';campaign.appendChild(av)}function openSettings(){if(confirm('개발자모드를 켜고 전체 해금합니다.')){setDevMode(true);devUnlockAll();render()}}render();</script></body></html>
