<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>입찰전쟁 모바일 패치</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,'Noto Sans KR',sans-serif;color:#fff}#app{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:linear-gradient(#74d8ff 0 34%,#ffe39a 34% 73%,#6b3b1d 73%)}#app.theme-pig{background:linear-gradient(#ffbad1 0 34%,#ffd89a 34% 73%,#8b4a28 73%)}#app.theme-cow{background:linear-gradient(#94e9ff 0 34%,#b8ee91 34% 73%,#3e7a3a 73%)}#app.theme-boss{background:linear-gradient(#2b1247 0 34%,#573277 34% 73%,#15091f 73%)}#app:before{content:"📈 시황판   💰 최저가 추적";position:absolute;left:9%;right:9%;top:58px;height:58px;border:5px solid #4a2a14;border-radius:18px;background:linear-gradient(#263447,#101820);box-shadow:0 6px 0 #8b5a24;color:#8dffb0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:1000;text-shadow:0 0 8px #28ff70}.top{position:relative;z-index:2;height:50px;display:flex;align-items:center;gap:7px;padding:6px 8px}.icon{width:40px;height:40px;border:3px solid #4a2a14;border-radius:14px;background:#fff8e8;color:#4a2a14;font-size:21px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.pill{flex:1;height:40px;display:flex;align-items:center;justify-content:center;background:#fff8e8;color:#4a2a14;border:3px solid #4a2a14;border-radius:14px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.content{position:relative;z-index:1;height:calc(100dvh - 50px);padding:70px 10px 98px;display:flex;flex-direction:column;min-height:0}.title{text-align:center;font-size:26px;font-weight:1000;text-shadow:0 5px 0 #8b4a12,0 0 12px #000;margin:0}.sub{text-align:center;font-weight:1000;color:#fff3c4;text-shadow:0 2px 0 #5a2d00;margin:0 0 5px;font-size:13px}.panel{background:rgba(35,25,16,.9);border:4px solid #8b5a24;border-radius:24px;padding:8px;box-shadow:0 6px 0 #5b2e0a;display:flex;flex-direction:column;min-height:0}.stageRow{display:grid;grid-template-columns:1fr 82px;gap:6px}select{width:100%;height:38px;border-radius:14px;border:3px solid #7b480d;font-size:15px;font-weight:1000;padding:0 6px;background:#fff4c4;color:#4a2a14}.badge{height:38px;border-radius:14px;border:3px solid #7b480d;background:#ffe39a;color:#4a2a14;display:flex;align-items:center;justify-content:center;font-weight:1000}.vendor{display:flex;align-items:center;gap:8px;background:#fff3c422;border:3px solid #9a620a;border-radius:18px;padding:6px;margin:6px 0}.face{width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:#fff8e8;border:3px solid #4a2a14;border-radius:15px;font-size:31px}.vendor b{font-size:18px}.vendor span{font-size:12px;color:#ffd9a0;font-weight:900}.hud{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px}.box{border:2px solid #9a4f05;background:rgba(53,37,3,.92);border-radius:13px;padding:4px;text-align:center}.box .l{font-size:10px;color:#ffd09a;font-weight:900}.box .v{font-size:16px;font-weight:1000}.progress{height:13px;background:#2a160b;border:2px solid #9a4f05;border-radius:999px;margin:5px 0;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#30d158,#ffd54a);border-radius:999px}.starsTop{text-align:center;font-size:24px;color:#ffca28;text-shadow:0 3px #6f4200;line-height:1}.priceBoard{margin:5px 0;background:#170909;border:4px solid #7b480d;border-radius:18px;text-align:center;padding:6px}.grade{font-size:14px;font-weight:1000;color:#ffd15f}.currentPrice{font-size:34px;font-weight:1000;color:#26d66f;text-shadow:0 4px 0 #06481d}#gauge{position:relative;height:110px;border:4px solid #7b480d;border-radius:22px;overflow:hidden;background:linear-gradient(90deg,#b50000 0%,#d66b00 23%,#d89c00 37%,#13a03f 50%,#d89c00 63%,#d66b00 77%,#b50000 100%);box-shadow:inset 0 7px 12px #0007,0 5px 0 #743b0b}#zone{position:absolute;top:0;height:100%;background:#00ff6044;border-left:5px solid #18ff78;border-right:5px solid #18ff78;box-shadow:0 0 24px #00ff73}#line{position:absolute;top:0;width:5px;height:100%;background:#fff;box-shadow:0 0 15px #fff;transform:translateX(-2px)}.marker{position:absolute;top:7px;transform:translateX(-50%);padding:3px 6px;border:2px solid #fff8;border-radius:999px;font-weight:1000;font-size:11px;white-space:nowrap}.high{background:#b91c1c}.mid{background:#eab308;color:#351a00}.best{background:#16a34a}.num{position:absolute;bottom:7px;transform:translateX(-50%);font-size:11px;font-weight:1000;text-shadow:0 2px #000}#pointer{position:absolute;top:30px;font-size:40px;transform:translateX(-50%);filter:drop-shadow(0 5px 0 #0009)}#pointer:after{content:"";display:block;margin:2px auto 0;width:26px;height:38px;background:#141414;border:4px solid #fff;border-radius:14px}.msg{height:28px;margin-top:6px;text-align:center;font-size:17px;font-weight:1000;color:#80ffa5;text-shadow:0 3px #082b10}.msg.bad{color:#ff948f}.msg.mid{color:#ffe16f}.start{width:100%;height:42px;border:0;border-radius:16px;background:linear-gradient(#ffbf36,#ff8400);box-shadow:0 5px 0 #9b4800;color:#fff;font-size:18px;font-weight:1000;margin-top:4px}.tip{font-size:11px;text-align:center;color:#ffd9a0;font-weight:900;margin-top:3px}.controls{position:absolute;left:10px;right:10px;bottom:8px;display:flex;gap:12px;z-index:3}.ctrl{flex:1;height:84px;border:0;border-radius:26px;background:linear-gradient(#5bbdff,#2379f2);box-shadow:0 7px 0 #0f4da2;color:#fff;font-size:44px;font-weight:1000}.ctrl.pressed,.ctrl:active{transform:translateY(5px);box-shadow:0 2px 0 #0f4da2}.fx{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:1000;opacity:0;z-index:5;text-align:center;text-shadow:0 5px #4a2500,0 0 14px #fff;pointer-events:none}.fx.show{animation:pop .7s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-20%) scale(.6)}35%{opacity:1;transform:translate(-50%,-55%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-90%) scale(1)}}.shake{animation:shake .22s ease}@keyframes shake{25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-3px)}}.overlay{position:absolute;inset:0;background:#000b;display:none;align-items:center;justify-content:center;z-index:9;padding:16px}.result{background:#fff;color:#4a2a14;border:5px solid #4a2a14;border-radius:24px;padding:18px;text-align:center;box-shadow:0 8px 0 #9b590d;width:100%}.result h2{font-size:27px;margin:0 0 7px}.result .s,.stars{font-size:44px;color:#ffca28;text-shadow:0 4px #805000}.result p{font-size:19px;font-weight:900;line-height:1.5}@media(max-height:700px){#app:before{display:none}.content{padding-top:2px}.title{font-size:22px}.sub,.tip{display:none}.vendor{display:none}.ctrl{height:74px}.currentPrice{font-size:28px}#gauge{height:96px}.hud{grid-template-columns:1fr 1fr}.box .v{font-size:14px}}</style></head><body><div id="app" class="theme-chicken"><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="pill">2스테이지 · 입찰전쟁</div><button class="icon" onclick="startGame()">▶</button></div><div class="content"><div class="title">입찰전쟁</div><div class="sub">좌우 밸런스로 계약존 추적</div><div class="panel"><div class="stageRow"><select id="stage"><option value="chicken">🐔 계육왕국</option><option value="pig">🐷 돈육왕국</option><option value="cow">🐮 우육왕국</option><option value="boss">👑 구매대전쟁</option></select><div class="badge" id="stageBadge">계육</div></div><div class="vendor"><div class="face" id="face">🐔</div><div><b id="vendorName">하닭 · 계육 입찰</b><br><span id="desc">복날 대비 계육 물량 확보</span></div></div><div class="hud"><div class="box"><div class="l">시간</div><div class="v" id="time">0.0초</div></div><div class="box"><div class="l">물량</div><div class="v" id="tons">0.0/20톤</div></div><div class="box"><div class="l">최저가</div><div class="v" id="bestPrice">4,800원</div></div><div class="box"><div class="l">평균</div><div class="v" id="avg">0원</div></div></div><div class="progress"><div class="fill" id="fill"></div></div><div class="starsTop" id="liveStars">☆☆☆</div><div class="priceBoard"><div class="grade" id="grade">계약 대기</div><div class="currentPrice" id="price">0원</div></div><div id="gauge"><div id="zone"></div><div id="line"></div><div class="marker high" id="lh">고가</div><div class="marker mid" id="lm">적정</div><div class="marker best" id="bm">최저가</div><div class="marker mid" id="rm">적정</div><div class="marker high" id="rh">고가</div><div class="num" id="n1">6000</div><div class="num" id="n2">5300</div><div class="num" id="n3">4800</div><div class="num" id="n4">5300</div><div class="num" id="n5">6000</div><div id="pointer">🐥</div></div><div class="msg" id="msg">좌우 버튼으로 계약존을 따라가세요</div><button class="start" id="startBtn">게임 시작</button><div class="tip">초록 계약존에 오래 있을수록 물량 확보가 빨라집니다.</div></div></div><div class="controls"><button class="ctrl" id="left">◀</button><button class="ctrl" id="right">▶</button></div><div class="fx" id="fx">계약체결!</div><div class="overlay" id="overlay"><div class="result"><h2>입찰 결과</h2><div class="s" id="resultStars">★☆☆</div><p id="resultText"></p><button class="start" onclick="hideResult();startGame()">다시 입찰</button><button class="start" onclick="location.href='../../index.html'">월드맵</button></div></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id);const app=$('app'),ptr=$('pointer'),zone=$('zone'),line=$('line'),msg=$('msg'),fx=$('fx');const stages={chicken:{cls:'theme-chicken',badge:'계육',face:'🐔',ptr:'🐥',name:'하닭 · 계육 입찰',desc:'복날 대비 계육 물량 확보',best:4800,width:15,target:20,event:5.7,move:'jump',jitter:7,baseMove:0,goal2:5200,goal3:5000},pig:{cls:'theme-pig',badge:'돈육',face:'🐷',ptr:'🐷',name:'돈돈팜 · 돈육 입찰',desc:'추석 대비 돈육 물량 확보',best:5100,width:11,target:25,event:4.4,move:'mix',jitter:11,baseMove:5,goal2:5450,goal3:5200},cow:{cls:'theme-cow',badge:'우육',face:'🐮',ptr:'🐮',name:'황소유통 · 우육 입찰',desc:'설 명절 우육 물량 확보',best:5600,width:8,target:25,event:3.5,move:'move',jitter:14,baseMove:9,goal2:6000,goal3:5750},boss:{cls:'theme-boss',badge:'최종',face:'👑',ptr:'💼',name:'구매대전쟁 · 최종 입찰',desc:'빠르게 움직이는 계약존 추적',best:5800,width:6,target:30,event:2.7,move:'boss',jitter:19,baseMove:16,goal2:6200,goal3:5950}};let st,run=false,last=0,t=0,tonsValue=0,weighted=0,pos=50,vel=0,zc=50,zw=15,best=4800,eventT=0,hold=0,dir=1,L=false,R=false,raf=0;function stageCfg(){return stages[stage.value]}function applyTheme(){st=stageCfg();app.className=st.cls;face.textContent=st.face;ptr.textContent=st.ptr;vendorName.textContent=st.name;desc.textContent=st.desc;stageBadge.textContent=st.badge;zc=50;zw=st.width;best=st.best;update(priceAt(pos))}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function priceAt(x){return Math.round(clamp(best+Math.abs(x-zc)*34,best,best+1200))}function stars(av){if(tonsValue<st.target)return 0;if(av<=st.goal3)return 3;if(av<=st.goal2)return 2;return 1}function labels(){[['lh',zc-zw*2.25],['lm',zc-zw*1.15],['bm',zc],['rm',zc+zw*1.15],['rh',zc+zw*2.25],['n1',zc-zw*2.25],['n2',zc-zw*1.15],['n3',zc],['n4',zc+zw*1.15],['n5',zc+zw*2.25]].forEach(a=>$(a[0]).style.left=clamp(a[1],7,93)+'%');n3.textContent=best;n2.textContent=Math.round(best+zw*1.15*34);n4.textContent=n2.textContent;n1.textContent=Math.round(best+zw*2.25*34);n5.textContent=n1.textContent}function grade(){const d=Math.abs(pos-zc);if(d<=zw/2)return ['최저가 계약중',''];if(d<=zw*1.15)return ['적정가 협상','mid'];return ['고가 구간','bad']}function update(pr){zone.style.left=(zc-zw/2)+'%';zone.style.width=zw+'%';line.style.left=zc+'%';ptr.style.left=pos+'%';labels();const av=tonsValue>0?Math.round(weighted/tonsValue):0;time.textContent=t.toFixed(1)+'초';tons.textContent=tonsValue.toFixed(1)+'/'+st.target+'톤';bestPrice.textContent=best.toLocaleString()+'원';avg.textContent=av.toLocaleString()+'원';price.textContent=pr.toLocaleString()+'원';fill.style.width=Math.min(100,tonsValue/st.target*100)+'%';const gc=grade();document.getElementById('grade').textContent=gc[0];msg.className='msg '+gc[1];const s=stars(av);liveStars.textContent='★'.repeat(s)+'☆'.repeat(3-s)}function pop(x){fx.textContent=x;fx.classList.remove('show');void fx.offsetWidth;fx.classList.add('show')}function shake(){app.classList.remove('shake');void app.offsetWidth;app.classList.add('shake')}function marketEvent(){const r=Math.random();shake();if(st.move==='boss'){zc=18+Math.random()*64;pop('계약존 급이동!');return}if(r<.35){zc=18+Math.random()*64;pop('시황변동!')}else if(r<.6){zw=Math.max(5,zw-2);pop('계약존 축소!')}else if(r<.82){zw=Math.min(22,zw+2);pop('계약존 확대!')}else{best=clamp(best+120,st.best,st.best+500);pop('최저가 상승!')}}function loop(ts){if(!run)return;if(!last)last=ts;const dt=Math.min((ts-last)/1000,.035);last=ts;t+=dt;eventT+=dt;const input=(R?1:0)-(L?1:0);vel+=input*5.8*dt;vel+=(Math.random()-.5)*st.jitter*dt;vel*=.955;pos+=vel;if(pos<0){pos=0;vel=Math.abs(vel)*.25}if(pos>100){pos=100;vel=-Math.abs(vel)*.25}if(st.move==='move'||st.move==='boss'){zc+=dir*st.baseMove*dt;if(zc<12||zc>88){dir*=-1;zc=clamp(zc,12,88)}if(st.move==='boss')zc+=Math.sin(ts/320)*7*dt}const pr=priceAt(pos),d=Math.abs(pos-zc),inZ=d<=zw/2,near=d<=zw*1.15;let gain=0;if(inZ){gain=1.15*dt;hold+=dt;msg.textContent='계약 진행중';if(hold>3){tonsValue+=1.2;weighted+=pr*1.2;hold=0;pop('장기계약 +1.2톤')}}else if(near){gain=.45*dt;hold=0;msg.textContent='적정가 협상중'}else{gain=.12*dt;hold=0;msg.textContent='긴급매입'}tonsValue+=gain;weighted+=pr*gain;if(eventT>st.event){marketEvent();eventT=0}update(pr);if(tonsValue>=st.target){end();return}raf=requestAnimationFrame(loop)}function startGame(){st=stageCfg();run=true;last=0;t=0;tonsValue=0;weighted=0;pos=50;vel=0;zc=50;zw=st.width;best=st.best;eventT=0;hold=0;dir=1;hideResult();update(priceAt(pos));cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}function end(){run=false;cancelAnimationFrame(raf);const av=tonsValue>0?Math.round(weighted/tonsValue):0,s=stars(av);try{clearStage('bid',s)}catch(e){}let n=typeof nextStageOf==='function'?nextStageOf('bid'):null;overlay.innerHTML='<div class="result"><h2>입찰 결과</h2><div class="stars">'+'★'.repeat(s)+'☆'.repeat(3-s)+'</div><p>확보물량 '+tonsValue.toFixed(1)+'톤<br>평균단가 '+av.toLocaleString()+'원<br>소요시간 '+t.toFixed(1)+'초<br>'+(s===3?'신의 입찰자':s===2?'중수 입찰자':'초보 입찰자')+'</p><button class="start" id="nextBtn">'+(n?'다음 스테이지':'월드맵')+'</button><button class="start" onclick="startGame()">다시 입찰</button><button class="start" onclick="location.href=\'../../index.html\'">월드맵</button></div>';overlay.style.display='flex';document.getElementById('nextBtn').onclick=()=>{if(n)location.href='../../'+n.url.replace('./','')+'?stage='+n.id;else location.href='../../index.html'}}function hideResult(){overlay.style.display='none'}function bind(id,d,u){const b=$(id);b.addEventListener('pointerdown',e=>{e.preventDefault();b.setPointerCapture(e.pointerId);d();b.classList.add('pressed')});['pointerup','pointercancel','lostpointercapture','pointerleave'].forEach(ev=>b.addEventListener(ev,()=>{u();b.classList.remove('pressed')}))}bind('left',()=>L=true,()=>L=false);bind('right',()=>R=true,()=>R=false);startBtn.onclick=startGame;stage.onchange=applyTheme;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')L=true;if(e.key==='ArrowRight')R=true});document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')L=false;if(e.key==='ArrowRight')R=false});applyTheme();</script></body></html>
