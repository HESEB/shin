<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>입찰전쟁</title><link rel="stylesheet" href="../../css/common.css"><style>.gauge{height:170px;position:relative;border:5px solid #4b2d1c;border-radius:24px;background:linear-gradient(90deg,#b50000,#d89c00,#13a03f,#d89c00,#b50000);overflow:hidden}.zone{position:absolute;top:0;height:100%;background:#00ff6844;border-left:5px solid #14ff72;border-right:5px solid #14ff72}.p{position:absolute;top:55px;font-size:50px;transform:translateX(-50%)}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}.box{background:#fff;border:3px solid #4b2d1c;border-radius:14px;padding:8px;text-align:center;font-weight:900}</style></head><body><div class="shin-app"><header class="shin-topbar"><button class="shin-icon" onclick="location.href='../../index.html'">🏠</button><div class="shin-currency">2. 입찰전쟁</div><div class="shin-currency">Space 계약</div><button class="shin-icon" onclick="start()">▶</button></header><section class="shin-panel"><div class="hud"><div class="box">확보 <span id="tons">0</span>/20</div><div class="box">평균 <span id="avg">0</span></div><div class="box">가격 <span id="price">0</span></div></div><div class="gauge"><div class="zone" id="zone"></div><div class="p" id="p">🐔</div></div><button class="shin-btn" style="width:100%;height:60px;margin-top:12px" onclick="bid()">계약</button></section></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>var pos=50,zc=50,tonsValue=0,total=0,run=false;function start(){pos=50;tonsValue=0;total=0;run=true;loop()}function update(){zone.style.left=(zc-8)+'%';zone.style.width='16%';p.style.left=pos+'%';var d=Math.abs(pos-zc),pr=Math.round(4800+d*30);price.textContent=pr;tons.textContent=tonsValue.toFixed(1);avg.textContent=tonsValue?Math.round(total/tonsValue):0}function bid(){if(!run)return;var d=Math.abs(pos-zc),add=d<8?4:d<16?2:0.8,pr=Number(price.textContent||4800);tonsValue+=add;total+=pr*add;update();if(tonsValue>=20){run=false;ShinResult.complete('bid',Number(avg.textContent)<5200?3:2)}}function loop(){if(!run)return;var t=Date.now()/600;zc=50+Math.sin(t)*28;pos=50+Math.sin(t*1.7)*42;update();requestAnimationFrame(loop)}window.onkeydown=function(e){if(e.code==='Space')bid()};start();</script></body></html>
