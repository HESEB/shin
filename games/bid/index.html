<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>입찰전쟁 UX 리마스터</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,'Noto Sans KR',sans-serif;color:#fff;background:#111}#app{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:linear-gradient(#74d8ff,#ffe08a)}#bg{position:absolute;inset:0;z-index:0;background:linear-gradient(#74d8ff 0 34%,#ffe39a 34% 72%,#6b3b1d 72%)}#bg:before{content:"";position:absolute;left:7%;right:7%;top:12%;height:23%;border:6px solid #4a2a14;border-radius:22px;background:linear-gradient(#263447,#101820);box-shadow:0 8px 0 #8b5a24}#bg:after{content:"📈  시황판   🚚 계약 현황   💰 최저가 추적";position:absolute;left:10%;right:10%;top:17%;text-align:center;color:#8dffb0;font-size:15px;font-weight:1000;text-shadow:0 0 8px #28ff70}.theme-pig #bg{background:linear-gradient(#ffbad1 0 34%,#ffd89a 34% 72%,#8b4a28 72%)}.theme-cow #bg{background:linear-gradient(#94e9ff 0 34%,#b8ee91 34% 72%,#3e7a3a 72%)}.theme-boss #bg{background:linear-gradient(#2b1247 0 34%,#573277 34% 72%,#15091f 72%)}.top{position:relative;z-index:2;display:flex;align-items:center;gap:8px;padding:8px}.icon{width:42px;height:42px;border:0;border-radius:15px;background:#fff8e8;color:#4a2a14;font-size:22px;font-weight:1000;border:3px solid #4a2a14;box-shadow:0 4px 0 #8b4a12}.pill{flex:1;height:42px;display:flex;align-items:center;justify-content:center;background:#fff8e8;color:#4a2a14;border:3px solid #4a2a14;border-radius:15px;font-weight:1000;box-shadow:0 4px 0 #8b4a12}.content{position:relative;z-index:1;height:calc(100% - 58px);padding:4px 12px 132px;overflow-y:auto}.title{text-align:center;font-weight:1000;font-size:30px;line-height:1.05;text-shadow:0 5px 0 #8b4a12,0 0 12px #000}.sub{text-align:center;font-weight:1000;color:#fff3c4;text-shadow:0 2px 0 #5a2d00;margin:3px 0 8px}.panel{background:rgba(35,25,16,.9);border:5px solid #8b5a24;border-radius:28px;padding:11px;box-shadow:0 8px 0 #5b2e0a,inset 0 0 0 4px #fff1}.stageRow{display:grid;grid-template-columns:1fr 96px;gap:8px}select{width:100%;height:45px;border-radius:16px;border:3px solid #7b480d;font-size:17px;font-weight:1000;padding:0 8px;background:#fff4c4;color:#4a2a14}.badge{height:45px;border-radius:16px;border:3px solid #7b480d;background:#ffe39a;color:#4a2a14;display:flex;align-items:center;justify-content:center;font-weight:1000}.vendor{display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#fff3c422,#ffb52b22);border:4px solid #9a620a;border-radius:22px;padding:10px;margin:9px 0}.face{width:58px;height:58px;display:flex;align-items:center;justify-content:center;background:#fff8e8;border:3px solid #4a2a14;border-radius:18px;font-size:38px;filter:drop-shadow(0 4px 0 #0005)}.vendor b{font-size:22px}.vendor span{font-size:13px;color:#ffd9a0;font-weight:900}.hud{display:grid;grid-template-columns:1fr 1fr;gap:8px}.box{border:3px solid #9a4f05;background:rgba(53,37,3,.92);border-radius:18px;padding:8px;text-align:center;box-shadow:inset 0 -4px 0 #ffb20022}.box .l{font-size:12px;color:#ffd09a;font-weight:900}.box .v{font-size:22px;font-weight:1000}.progress{height:16px;background:#2a160b;border:3px solid #9a4f05;border-radius:999px;margin:8px 0 6px;overflow:hidden}.fill{height:100%;width:0%;background:linear-gradient(90deg,#30d158,#ffd54a);border-radius:999px;transition:width .15s}.starsTop{text-align:center;font-size:28px;color:#ffca28;text-shadow:0 3px #6f4200}.priceBoard{margin:8px 0;background:#170909;border:5px solid #7b480d;border-radius:22px;text-align:center;padding:9px;box-shadow:inset 0 5px 0 #ffffff12}.grade{font-size:15px;font-weight:1000;color:#ffd15f}.currentPrice{font-size:42px;font-weight:1000;color:#26d66f;text-shadow:0 4px 0 #06481d}#gauge{position:relative;height:122px;border:5px solid #7b480d;border-radius:26px;overflow:hidden;background:linear-gradient(90deg,#b50000 0%,#d66b00 23%,#d89c00 37%,#13a03f 50%,#d89c00 63%,#d66b00 77%,#b50000 100%);box-shadow:inset 0 7px 12px #0007,0 6px 0 #743b0b}#zone{position:absolute;top:0;height:100%;background:#00ff6044;border-left:5px solid #18ff78;border-right:5px solid #18ff78;box-shadow:0 0 24px #00ff73;transition:left .14s,width .14s}#line{position:absolute;top:0;width:5px;height:100%;background:#fff;box-shadow:0 0 15px #fff;transform:translateX(-2px)}.marker{position:absolute;top:8px;transform:translateX(-50%);padding:4px 8px;border:2px solid #fff8;border-radius:999px;font-weight:1000;font-size:12px;white-space:nowrap}.high{background:#b91c1c}.mid{background:#eab308;color:#351a00}.best{background:#16a34a}.num{position:absolute;bottom:8px;transform:translateX(-50%);font-size:12px;font-weight:1000;text-shadow:0 2px #000}#pointer{position:absolute;top:30px;font-size:44px;transform:translateX(-50%);filter:drop-shadow(0 5px 0 #0009);transition:left .05s}#pointer:after{content:"";display:block;margin:2px auto 0;width:28px;height:43px;background:#141414;border:4px solid #fff;border-radius:15px}.msg{height:36px;margin-top:8px;text-align:center;font-size:21px;font-weight:1000;color:#80ffa5;text-shadow:0 3px #082b10}.msg.bad{color:#ff948f}.msg.mid{color:#ffe16f}.start{width:100%;height:54px;border:0;border-radius:20px;background:linear-gradient(#ffbf36,#ff8400);box-shadow:0 7px 0 #9b4800;color:#fff;font-size:22px;font-weight:1000;margin-top:6px}.tip{font-size:12px;text-align:center;color:#ffd9a0;font-weight:900;margin-top:6px}.controls{position:absolute;left:12px;right:12px;bottom:14px;display:flex;gap:13px;z-index:3}.ctrl{flex:1;height:104px;border:0;border-radius:30px;background:linear-gradient(#5bbdff,#2379f2);box-shadow:0 9px 0 #0f4da2;color:#fff;font-size:52px;font-weight:1000}.ctrl.pressed,.ctrl:active{transform:translateY(6px);box-shadow:0 3px 0 #0f4da2}.fx{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:34px;font-weight:1000;opacity:0;z-index:5;text-align:center;text-shadow:0 5px #4a2500,0 0 14px #fff;pointer-events:none}.fx.show{animation:pop .7s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-20%) scale(.6)}35%{opacity:1;transform:translate(-50%,-55%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-90%) scale(1)}}.shake{animation:shake .22s ease}@keyframes shake{25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-3px)}}.overlay{position:absolute;inset:0;background:#000b;display:none;align-items:center;justify-content:center;z-index:9;padding:20px}.result{background:#fff;color:#4a2a14;border:5px solid #4a2a14;border-radius:28px;padding:24px;text-align:center;box-shadow:0 9px 0 #9b590d;width:100%}.result h2{font-size:30px;margin:0 0 8px}.result .s{font-size:50px;color:#ffca28;text-shadow:0 4px #805000}.result p{font-size:21px;font-weight:900;line-height:1.55}</style></head><body><div id="app" class="theme-chicken"><div id="bg"></div><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="pill">2스테이지 · 입찰전쟁</div><button class="icon" onclick="startGame()">▶</button></div><div class="content"><div class="title">입찰전쟁</div><div class="sub">좌우 밸런스로 계약존 추적</div><div class="panel"><div class="stageRow"><select id="stage"><option value="chicken">🐔 계육왕국</option><option value="pig">🐷 돈육왕국</option><option value="cow">🐮 우육왕국</option><option value="boss">👑 구매대전쟁</option></select><div class="badge" id="stageBadge">구매 2</div></div><div class="vendor"><div class="face" id="face">🐔</div><div><b id="vendorName">하닭 · 계육 입찰</b><br><span id="desc">계약존을 따라가며 목표 물량 확보</span></div></div><div class="hud"><div class="box"><div class="l">소요 시간</div><div class="v" id="time">0.0초</div></div><div class="box"><div class="l">확보 물량</div><div class="v" id="tons">0.0/20톤</div></div><div class="box"><div class="l">현재 최저가</div><div class="v" id="bestPrice">4,800원</div></div><div class="box"><div class="l">평균 단가</div><div class="v" id="avg">0원</div></div></div><div class="progress"><div class="fill" id="fill"></div></div><div class="starsTop" id="liveStars">☆☆☆</div><div class="priceBoard"><div class="grade" id="grade">계약 대기</div><div class="currentPrice" id="price">0원</div></div><div id="gauge"><div id="zone"></div><div id="line"></div><div class="marker high" id="lh">고가</div><div class="marker mid" id="lm">적정</div><div class="marker best" id="bm">최저가</div><div class="marker mid" id="rm">적정</div><div class="marker high" id="rh">고가</div><div class="num" id="n1">6000</div><div class="num" id="n2">5300</div><div class="num" id="n3">4800</div><div class="num" id="n4">5300</div><div class="num" id="n5">6000</div><div id="pointer">🐥</div></div><div class="msg" id="msg">좌우 버튼을 누르고 계약존을 따라가세요</div><button class="start" id="startBtn">게임 시작</button><div class="tip">가운데 초록 계약존에 오래 있을수록 물량 확보가 빨라집니다.</div></div></div><div class="controls"><button class="ctrl" id="left">◀</button><button class="ctrl" id="right">▶</button></div><div class="fx" id="fx">계약체결!</div><div class="overlay" id="overlay"><div class="result"><h2>입찰 결과</h2><div class="s" id="resultStars">★☆☆</div><p id="resultText"></p><button class="start" onclick="hideResult();startGame()">다시 입찰</button><button class="start" onclick="location.href='../../index.html'">월드맵</button></div></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id);const app=$('app'),ptr=$('pointer'),zone=$('zone'),line=$('line'),msg=$('msg'),fx=$('fx');const stages={chicken:{cls:'theme-chicken',face:'🐔',ptr:'🐥',name:'하닭 · 계육 입찰',desc:'복날 대비 계육 물량 확보',best:4800,width:15,target:20,event:5.7,move:'jump',jitter:7,baseMove:0,goal2:5200,goal3:5000},pig:{cls:'theme-pig',face:'🐷',ptr:'🐷',name:'돈돈팜 · 돈육 입찰',desc:'추석 대비 돈육 물량 확보',best:5100,width:11,target:25,event:4.4,move:'mix',jitter:11,baseMove:5,goal2:5450,goal3:5200},cow:{cls:'theme-cow',face:'🐮',ptr:'🐮',name:'황소유통 · 우육 입찰',desc:'설 명절 우육 물량 확보',best:5600,width:8,target:25,event:3.5,move:'move',jitter:14,baseMove:9,goal2:6000,goal3:5750},boss:{cls:'theme-boss',face:'👑',ptr:'💼',name:'구매대전쟁 · 최종 입찰',desc:'빠르게 움직이는 계약존 추적',best:5800,width:6,target:30,event:2.7,move:'boss',jitter:19,baseMove:16,goal2:6200,goal3:5950}};let st,run=false,last=0,time=0,tons=0,weighted=0,pos=50,vel=0,zc=50,zw=15,best=4800,eventT=0,hold=0,dir=1,L=false,R=false,raf=0;function stage(){return stages[$('stage').value]}function applyTheme(){st=stage();app.className=st.cls;face.textContent=st.face;ptr.textContent=st.ptr;vendorName.textContent=st.name;desc.textContent=st.desc;zc=50;zw=st.width;best=st.best;update(priceAt(pos))}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function priceAt(x){return Math.round(clamp(best+Math.abs(x-zc)*34,best,best+1200))}function stars(avg){if(tons<st.target)return 0;if(avg<=st.goal3)return 3;if(avg<=st.goal2)return 2;return 1}function labels(){[['lh',zc-zw*2.25],['lm',zc-zw*1.15],['bm',zc],['rm',zc+zw*1.15],['rh',zc+zw*2.25],['n1',zc-zw*2.25],['n2',zc-zw*1.15],['n3',zc],['n4',zc+zw*1.15],['n5',zc+zw*2.25]].forEach(a=>$(a[0]).style.left=clamp(a[1],7,93)+'%');n3.textContent=best;n2.textContent=Math.round(best+zw*1.15*34);n4.textContent=n2.textContent;n1.textContent=Math.round(best+zw*2.25*34);n5.textContent=n1.textContent}function grade(){const d=Math.abs(pos-zc);if(d<=zw/2)return ['최저가 계약중',''];if(d<=zw*1.15)return ['적정가 협상','mid'];return ['고가 구간','bad']}function update(price){zone.style.left=(zc-zw/2)+'%';zone.style.width=zw+'%';line.style.left=zc+'%';ptr.style.left=pos+'%';labels();const av=tons>0?Math.round(weighted/tons):0;time.textContent=window.time.toFixed(1)+'초';document.getElementById('tons').textContent=tons.toFixed(1)+'/'+st.target+'톤';bestPrice.textContent=best.toLocaleString()+'원';avg.textContent=av.toLocaleString()+'원';document.getElementById('price').textContent=price.toLocaleString()+'원';fill.style.width=Math.min(100,tons/st.target*100)+'%';const gc=grade();document.getElementById('grade').textContent=gc[0];msg.className='msg '+gc[1];const s=stars(av);liveStars.textContent='★'.repeat(s)+'☆'.repeat(3-s)}function pop(t){fx.textContent=t;fx.classList.remove('show');void fx.offsetWidth;fx.classList.add('show')}function shake(){app.classList.remove('shake');void app.offsetWidth;app.classList.add('shake')}function event(){const r=Math.random();shake();if(st.move==='boss'){pop('계약존 급이동!');zc=18+Math.random()*64;return}if(r<.35){zc=18+Math.random()*64;pop('시황변동!');msg.textContent='계약존 이동'}else if(r<.6){zw=Math.max(5,zw-2);pop('계약존 축소!');msg.textContent='물량 부족'}else if(r<.82){zw=Math.min(22,zw+2);pop('계약존 확대!');msg.textContent='공급 여유'}else{best=clamp(best+120,st.best,st.best+500);pop('최저가 상승!');msg.textContent='단가 변동'}}function loop(ts){if(!run)return;if(!last)last=ts;const dt=Math.min((ts-last)/1000,.035);last=ts;window.time+=dt;eventT+=dt;const input=(R?1:0)-(L?1:0);vel+=input*5.8*dt;vel+=(Math.random()-.5)*st.jitter*dt;vel*=.955;pos+=vel;if(pos<0){pos=0;vel=Math.abs(vel)*.25}if(pos>100){pos=100;vel=-Math.abs(vel)*.25}if(st.move==='move'||st.move==='boss'){zc+=dir*st.baseMove*dt;if(zc<12||zc>88){dir*=-1;zc=clamp(zc,12,88)}if(st.move==='boss')zc+=Math.sin(ts/320)*7*dt}const pr=priceAt(pos),d=Math.abs(pos-zc),inZ=d<=zw/2,near=d<=zw*1.15;let gain=0;if(inZ){gain=1.15*dt;hold+=dt;msg.textContent='계약 진행중';if(hold>3){tons+=1.2;weighted+=pr*1.2;hold=0;pop('장기계약 +1.2톤')}}else if(near){gain=.45*dt;hold=0;msg.textContent='적정가 협상중'}else{gain=.12*dt;hold=0;msg.textContent='긴급매입'}tons+=gain;weighted+=pr*gain;if(eventT>st.event){event();eventT=0}update(pr);if(tons>=st.target){end();return}raf=requestAnimationFrame(loop)}function startGame(){st=stage();run=true;last=0;window.time=0;tons=0;weighted=0;pos=50;vel=0;zc=50;zw=st.width;best=st.best;eventT=0;hold=0;dir=1;hideResult();update(priceAt(pos));cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}function end(){run=false;cancelAnimationFrame(raf);const av=tons>0?Math.round(weighted/tons):0,s=stars(av);try{clearStage('bid',s)}catch(e){}resultStars.textContent='★'.repeat(s)+'☆'.repeat(3-s);resultText.innerHTML='확보물량 '+tons.toFixed(1)+'톤<br>평균단가 '+av.toLocaleString()+'원<br>소요시간 '+window.time.toFixed(1)+'초<br>'+(s===3?'신의 입찰자':s===2?'중수 입찰자':'초보 입찰자');overlay.style.display='flex'}function hideResult(){overlay.style.display='none'}function bind(id,d,u){const b=$(id);b.addEventListener('pointerdown',e=>{e.preventDefault();b.setPointerCapture(e.pointerId);d();b.classList.add('pressed')});['pointerup','pointercancel','lostpointercapture','pointerleave'].forEach(ev=>b.addEventListener(ev,()=>{u();b.classList.remove('pressed')}))}bind('left',()=>L=true,()=>L=false);bind('right',()=>R=true,()=>R=false);startBtn.onclick=startGame;stage.onchange=applyTheme;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')L=true;if(e.key==='ArrowRight')R=true});document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')L=false;if(e.key==='ArrowRight')R=false});applyTheme();</script></body></html>
