<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>영업판매 v2.1</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,'Noto Sans KR',sans-serif;color:#3b2413}#app{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:linear-gradient(#9bdcff 0 34%,#ffe6a4 34% 72%,#7b4a25 72%)}#app.pig{background:linear-gradient(#ffd4e2 0 34%,#ffd1a6 34% 72%,#7b4a25 72%)}#app.cow{background:linear-gradient(#bff7ff 0 34%,#dfffd1 34% 72%,#456f35 72%)}#app.boss{background:linear-gradient(#d8c2ff 0 34%,#6b4aa2 34% 72%,#1d0d2e 72%)}.top{position:absolute;left:8px;right:8px;top:6px;z-index:30;display:flex;gap:7px;align-items:center}.icon{width:38px;height:38px;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-size:20px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stagePill{flex:1;height:38px;display:flex;align-items:center;justify-content:center;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stageSelect{position:absolute;right:8px;top:50px;z-index:30;width:130px;height:31px;border:2px solid #4b2d1c;border-radius:12px;background:#fff8e8;color:#3a2418;font-size:13px;font-weight:1000}.hud{position:absolute;left:8px;right:146px;top:50px;z-index:30;display:flex;gap:4px;flex-wrap:wrap}.chip{min-width:54px;padding:4px 6px;background:#fff8e8;color:#3a2418;border:2px solid #4b2d1c;border-radius:12px;font-weight:1000;text-align:center;font-size:11px;box-shadow:0 2px 0 #0003}.chip b{font-size:16px;display:block;line-height:1}.salesBar{position:absolute;left:8px;right:8px;top:86px;height:13px;background:#4b2d1c;border-radius:999px;padding:3px;z-index:30}.salesFill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#38c172,#ffd54a)}#toast{position:absolute;left:10px;right:150px;top:102px;z-index:40;background:#fff8e8;color:#d9480f;border:2px solid #4b2d1c;border-radius:12px;text-align:center;font-size:14px;font-weight:1000;padding:4px;display:none;pointer-events:none;box-shadow:0 3px 0 #0003}#shop{position:absolute;left:8px;right:8px;top:104px;bottom:104px;background:linear-gradient(#b8ecff,#fff3bd);border:5px solid #4b2d1c;border-radius:22px;overflow:hidden;box-shadow:inset 0 0 0 5px #84c7ff}#shop.pig{background:linear-gradient(#ffe0ec,#ffd1a6)}#shop.cow{background:linear-gradient(#dfffd1,#fff6cf)}#shop.boss{background:linear-gradient(#d8c2ff,#35204f)}.signboard{position:absolute;left:12px;right:12px;top:8px;background:#fff8e8;border:3px solid #4b2d1c;border-radius:16px;text-align:center;font-size:16px;font-weight:1000;color:#8b3f19;padding:4px;z-index:2}.queueLine{position:absolute;left:10px;right:10px;bottom:44px;height:4px;background:#4b2d1c;border-radius:999px;opacity:.45}.counter{position:absolute;left:0;right:0;bottom:0;height:44px;background:linear-gradient(#ffc333,#ff9900);border-top:4px solid #4b2d1c;text-align:center;font-size:20px;font-weight:1000;line-height:36px}.customer{position:absolute;width:62px;height:72px;font-size:38px;text-align:center;transition:.15s;animation:walkin .25s ease}.customer.sel{transform:scale(1.16);filter:drop-shadow(0 0 10px #fff)}.customer.vip{filter:drop-shadow(0 0 10px gold)}.customer.group{filter:drop-shadow(0 0 10px #38c172)}@keyframes walkin{from{transform:translateY(20px);opacity:.2}to{transform:translateY(0);opacity:1}}.customer.ok{animation:saleOk .35s ease forwards}.customer.no{animation:saleNo .35s ease}@keyframes saleOk{to{transform:translateY(-35px) scale(.25);opacity:0}}@keyframes saleNo{25%{transform:translateX(-10px)}50%{transform:translateX(10px)}75%{transform:translateX(-8px)}}.bubble{position:absolute;left:-5px;top:-24px;background:#fff;border:3px solid #4b2d1c;border-radius:12px;padding:2px 7px;font-size:17px;font-weight:900;white-space:nowrap}.bar{position:absolute;left:6px;right:6px;bottom:0;height:7px;background:#4b2d1c;border-radius:999px;overflow:hidden}.fill{height:100%;background:#38c172;width:100%}.msg{position:absolute;left:8px;right:8px;bottom:74px;z-index:30;height:24px;text-align:center;font-size:18px;font-weight:1000;color:#0c8a3d;text-shadow:0 2px #fff}.menu{position:absolute;left:8px;right:8px;bottom:8px;z-index:30;display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:7px}.menu button{height:60px;border:0;border-radius:18px;background:linear-gradient(#ffcf62,#ff8a2d);box-shadow:0 6px 0 #9b4f00;color:#3b2413;font-size:23px;font-weight:1000;line-height:1.05}.menu button:active{transform:translateY(5px);box-shadow:0 1px 0 #9b4f00}.overlay{position:absolute;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}.result{background:white;border:5px solid #4b2d1c;border-radius:24px;padding:18px;text-align:center;width:100%;box-shadow:0 8px 0 #9a5b17}.stars{font-size:42px;color:#ffca28;text-shadow:0 4px #805000}.start{width:100%;height:44px;margin-top:6px;border:0;border-radius:16px;background:linear-gradient(#59bdff,#2575e8);color:#fff;font-size:19px;font-weight:900;box-shadow:0 5px 0 #0d4b99}.fx{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);font-size:32px;font-weight:1000;color:#fff;text-shadow:0 5px #5b2a00,0 0 12px #fff;opacity:0;z-index:40;text-align:center;pointer-events:none}.fx.show{animation:pop .75s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-10%) scale(.6)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}.confetti{position:absolute;pointer-events:none;font-size:22px;z-index:7;animation:conf .8s ease forwards}@keyframes conf{to{transform:translateY(-80px) rotate(180deg);opacity:0}}@media(max-height:700px){.stageSelect{top:46px;height:28px}.hud{top:46px}.salesBar{top:80px}#toast{top:95px;right:140px;font-size:12px;padding:3px}#shop{top:94px;bottom:94px}.menu button{height:52px;font-size:20px}.msg{bottom:64px;font-size:16px}.signboard{font-size:14px}.counter{height:36px;font-size:18px;line-height:28px}.customer{font-size:34px;width:58px}.chip{font-size:10px;padding:3px 5px}.chip b{font-size:14px}.result{padding:14px}.start{height:40px}}</style></head><body><div id="app"><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="stagePill">5스테이지 · 영업판매</div><button class="icon" onclick="startGame()">▶</button></div><select id="stage" class="stageSelect"><option value="chicken">🐔 계육</option><option value="pig">🐷 돈육</option><option value="cow">🐮 우육</option><option value="boss">👑 최종</option></select><div class="hud"><div class="chip">🎯<b id="goal">0</b></div><div class="chip">💰<b id="money">0</b></div><div class="chip">🔥<b id="combo">0</b></div><div class="chip">👥<b id="miss">0</b></div></div><div class="salesBar"><div class="salesFill" id="salesFill"></div></div><div id="toast">이벤트</div><div id="shop"><div class="signboard" id="signboard">오늘의 행사</div><div class="queueLine"></div><div class="counter">🏪 판매대</div></div><div class="msg" id="msg">손님을 선택하고 상품 버튼을 누르세요</div><div class="menu" id="menu"></div><div class="fx" id="fx">판매 성공!</div></div><div class="overlay" id="overlay"><div class="result"><h2>영업판매</h2><div class="stars">☆☆☆</div><p>주문 말풍선을 보고 맞는 상품을 판매하세요.</p><button class="start" onclick="startGame()">시작</button><button class="start" onclick="location.href='../../index.html'">월드맵</button></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id);const cfg={chicken:{cls:'chicken',title:'🐔 복날대란',goal:30000,menus:[['🍗','후라이드'],['🌶️','양념'],['🐔','순살']],spawn:1350,max:4,event:'복날 치킨 행사'},pig:{cls:'pig',title:'🐷 추석대란',goal:50000,menus:[['🥓','삼겹'],['🍖','목살'],['🐷','갈비'],['🍲','보쌈']],spawn:1150,max:5,event:'추석 고기 선물세트'},cow:{cls:'cow',title:'🐮 설날대란',goal:70000,menus:[['🥩','등심'],['🍖','안심'],['🐮','채끝'],['🍲','갈비'],['✨','육회']],spawn:980,max:6,event:'설날 프리미엄 한우전'},boss:{cls:'boss',title:'👑 대매출전쟁',goal:100000,menus:[['🍗','치킨'],['🥓','삼겹'],['🥩','등심'],['❄️','특송'],['✨','VIP']],spawn:820,max:7,event:'전국 통합 대행사'}};let st,customers=[],moneyVal=0,comboVal=0,bestCombo=0,missVal=0,sel=null,run=false,lastSpawn=0,raf=0,perfect=true,eventT=0,buzzT=0,rushT=0,sold=0;function apply(){st=cfg[stage.value];app.className=st.cls;shop.className=st.cls;signboard.textContent=st.event;goal.textContent=(st.goal/10000)+'만';renderMenu();update()}function renderMenu(){menu.innerHTML='';st.menus.forEach((a,i)=>{let b=document.createElement('button');b.innerHTML=a[0]+'<br><span style="font-size:11px">'+a[1]+'</span>';b.onclick=()=>sell(i);menu.appendChild(b)})}function startGame(){overlay.style.display='none';apply();customers.forEach(c=>c.el.remove());customers=[];moneyVal=0;comboVal=0;bestCombo=0;missVal=0;sold=0;sel=null;run=true;lastSpawn=0;perfect=true;eventT=0;buzzT=0;rushT=0;hideToast();update();showToast(st.event+' 시작');cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}function showToast(t){toast.textContent=t;toast.style.display='block';clearTimeout(showToast.timer);showToast.timer=setTimeout(hideToast,900)}function hideToast(){toast.style.display='none'}function spawn(type='normal'){if(customers.length>=st.max)return;let i=Math.floor(Math.random()*st.menus.length),el=document.createElement('div'),isVip=type==='vip'||Math.random()<0.08,isGroup=type==='group'||Math.random()<0.11;el.className='customer'+(isVip?' vip':'')+(isGroup?' group':'');let idx=customers.length,x=18+(idx%4)*78+Math.random()*5,y=76+Math.floor(idx/4)*74+Math.random()*8;el.style.left=x+'px';el.style.top=y+'px';let face=isVip?'🤑':isGroup?'👨‍👩‍👧':'😀',orderText=isGroup?st.menus[i][0]+'x3':st.menus[i][0];el.innerHTML=face+'<div class="bubble">'+orderText+'</div><div class="bar"><div class="fill"></div></div>';let c={el,order:i,life:isVip?1.25:1,isVip,isGroup};el.onclick=()=>{if(sel)sel.el.classList.remove('sel');sel=c;el.classList.add('sel');msg.textContent=(isVip?'VIP ':'')+(isGroup?'단체 ':'')+'주문: '+st.menus[i][1]};shop.appendChild(el);customers.push(c)}function loop(ts){if(!run)return;if(!lastSpawn)lastSpawn=ts;eventT+=16;if(buzzT>0)buzzT-=16;if(rushT>0)rushT-=16;let spawnGap=rushT>0?Math.max(430,st.spawn*.55):st.spawn;if(ts-lastSpawn>spawnGap){spawn();lastSpawn=ts}if(eventT>8500){randomEvent();eventT=0}customers.forEach(c=>{c.life-=0.00255*(st.max/4)*(c.isVip?0.7:1);let f=c.el.querySelector('.fill');if(f)f.style.width=Math.max(0,c.life*100)+'%'});customers.filter(c=>c.life<=0).forEach(c=>{missVal++;perfect=false;if(sel===c)sel=null;c.el.remove();msg.textContent='손님 이탈!'});customers=customers.filter(c=>c.life>0);reflowCustomers();update();if(moneyVal>=st.goal){end(true);return}raf=requestAnimationFrame(loop)}function reflowCustomers(){customers.forEach((c,idx)=>{c.el.style.left=(18+(idx%4)*78)+'px';c.el.style.top=(76+Math.floor(idx/4)*74)+'px'})}function randomEvent(){let r=Math.random();if(r<.34){buzzT=5000;showToast('🔥 입소문 x2')}else if(r<.67){rushT=5000;showToast('🏃 손님 러시');spawn('group');spawn('group')}else{showToast('👑 VIP 방문');spawn('vip')}}function sell(i){if(!run||!sel)return;if(sel.order===i){comboVal++;bestCombo=Math.max(bestCombo,comboVal);sold++;let qty=sel.isGroup?3:1,earn=(5000+comboVal*500)*qty;if(sel.isVip)earn*=3;if(buzzT>0)earn*=2;moneyVal+=earn;pop(sel.isVip?'👑 VIP 대량주문!':sel.isGroup?'👨‍👩‍👧 단체예약 성공!':comboVal>=5?'🔥 콤보!':'판매 성공!');sel.el.classList.add('ok');confetti();let target=sel;setTimeout(()=>target.el.remove(),220);customers=customers.filter(c=>c!==sel);sel=null;msg.textContent='매출 +'+earn.toLocaleString()+'원';if(navigator.vibrate)navigator.vibrate(18)}else{comboVal=0;missVal++;perfect=false;if(sel){sel.el.classList.add('no');setTimeout(()=>sel&&sel.el.classList.remove('no'),300)}msg.textContent='주문 오류'}update()}function update(){money.textContent=Math.round(moneyVal/1000)+'k';combo.textContent=comboVal;miss.textContent=missVal;salesFill.style.width=Math.min(100,moneyVal/st.goal*100)+'%'}function end(clear){run=false;cancelAnimationFrame(raf);let stars=clear?1:0;if(clear&&missVal<=2)stars=2;if(clear&&perfect)stars=3;if(perfect)moneyVal+=1000;try{clearStage('sales',stars)}catch(e){}let n=typeof nextStageOf==='function'?nextStageOf('sales'):null;overlay.innerHTML='<div class="result"><h2>영업판매 정산</h2><div class="stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div><p>매출 '+moneyVal.toLocaleString()+' / '+st.goal.toLocaleString()+'원<br>판매 '+sold+'건 · 콤보 '+bestCombo+' · 이탈 '+missVal+'</p><button class="start" id="nextBtn">'+(n?'다음 스테이지':'월드맵')+'</button><button class="start" id="mapBtn">월드맵</button><button class="start" onclick="startGame()">다시 판매</button></div>';overlay.style.display='flex';mapBtn.onclick=()=>location.href='../../index.html';nextBtn.onclick=()=>{if(n)location.href='../../'+n.url.replace('./','')+'?stage='+n.id;else location.href='../../index.html'}}function confetti(){for(let i=0;i<8;i++){let d=document.createElement('div');d.className='confetti';d.textContent=['🎉','✨','💰','🔥'][i%4];d.style.left=(40+Math.random()*340)+'px';d.style.top=(100+Math.random()*180)+'px';shop.appendChild(d);setTimeout(()=>d.remove(),850)}}function pop(t){fx.textContent=t;fx.classList.remove('show');void fx.offsetWidth;fx.classList.add('show')}stage.onchange=()=>{apply();if(run)startGame()};apply();update();</script></body></html>
