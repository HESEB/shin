<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>영업판매</title><link rel="stylesheet" href="../../css/common.css"><style>.shop{min-height:360px;background:linear-gradient(#ffe0a3,#fff8e8);border:5px solid #4b2d1c;border-radius:24px;padding:12px}.cust{font-size:46px;text-align:center}.order{font-size:34px;text-align:center;margin:12px}.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}.box{background:#fff;border:3px solid #4b2d1c;border-radius:14px;padding:8px;text-align:center;font-weight:900}</style></head><body><div class="shin-app"><header class="shin-topbar"><button class="shin-icon" onclick="location.href='../../index.html'">🏠</button><div class="shin-currency">5. 영업판매</div><div class="shin-currency">주문처리</div><button class="shin-icon" onclick="start()">▶</button></header><section class="shin-panel"><div class="hud"><div class="box">판매 <span id="ok">0</span>/12</div><div class="box">실수 <span id="miss">0</span></div><div class="box">시간 <span id="time">40</span></div></div><div class="shop"><div class="cust" id="cust">🙂</div><div class="order" id="order">🥩</div><div class="menu"><button class="shin-btn" onclick="serve('🥩')">🥩</button><button class="shin-btn" onclick="serve('🍖')">🍖</button><button class="shin-btn" onclick="serve('🥓')">🥓</button></div></div></section></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>var target='🥩',good=0,bad=0,t=40,timer=null;function next(){target=['🥩','🍖','🥓'][Math.random()*3|0];order.textContent=target;cust.textContent=['🙂','😋','🧑‍🍳','👨‍👩‍👧'][Math.random()*4|0]}function start(){good=0;bad=0;t=40;draw();next();clearInterval(timer);timer=setInterval(function(){t--;draw();if(t<=0)finish()},1000)}function draw(){ok.textContent=good;miss.textContent=bad;time.textContent=t}function serve(x){if(x===target){good++;next()}else bad++;draw();if(good>=12)finish()}function finish(){clearInterval(timer);ShinResult.complete('sales',bad==0?3:bad<=2?2:1)}window.onkeydown=function(e){if(e.key==='1')serve('🥩');if(e.key==='2')serve('🍖');if(e.key==='3')serve('🥓')};start();</script></body></html>
