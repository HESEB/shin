<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>영업판매 UX 리마스터</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,'Noto Sans KR',sans-serif;color:#3b2413}#app{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;padding:0 10px 10px;background:linear-gradient(#9bdcff,#ffe28a)}#app:before{content:"";position:absolute;inset:0;background:linear-gradient(#9bdcff 0 35%,#ffe6a4 35% 72%,#7b4a25 72%);z-index:0}.top{position:relative;z-index:3;display:flex;align-items:center;gap:8px;padding:8px 0}.icon{width:42px;height:42px;border:0;border-radius:15px;background:#fff8e8;color:#4a2a14;font-size:22px;font-weight:1000;border:3px solid #4a2a14;box-shadow:0 4px 0 #8b4a12}.pillTop{flex:1;height:42px;display:flex;align-items:center;justify-content:center;background:#fff8e8;color:#4a2a14;border:3px solid #4a2a14;border-radius:15px;font-weight:1000;box-shadow:0 4px 0 #8b4a12}.panel{position:relative;z-index:2;background:#fff8e8;border:4px solid #4b2d1c;border-radius:24px;padding:10px;box-shadow:0 7px 0 #9a5b17}h1{text-align:center;margin:2px;font-size:26px;text-shadow:0 3px #fff}.sub{text-align:center;font-weight:1000;color:#7b4a1f;font-size:13px;margin-bottom:6px}select{width:100%;height:40px;border:3px solid #4b2d1c;border-radius:14px;background:#fff;font-size:17px;font-weight:900}.hud{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.box{background:#fff;border:3px solid #6b3d1d;border-radius:16px;text-align:center;padding:6px;font-weight:900;box-shadow:inset 0 -3px 0 #ffe0a0}.box small{display:block;color:#7b4a1f;font-size:11px}.box b{font-size:20px}.salesBar{height:16px;background:#4b2d1c;border-radius:999px;padding:3px;margin-top:8px}.salesFill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#38c172,#ffd54a);transition:width .2s}#shop{position:relative;margin-top:9px;width:100%;height:47vh;background:linear-gradient(#b8ecff,#fff3bd);border:5px solid #4b2d1c;border-radius:22px;overflow:hidden;box-shadow:inset 0 0 0 6px #84c7ff}.signboard{position:absolute;left:18px;right:18px;top:8px;background:#fff8e8;border:4px solid #4b2d1c;border-radius:18px;text-align:center;font-size:19px;font-weight:1000;color:#8b3f19;padding:5px;z-index:2}.eventBanner{position:absolute;left:18px;right:18px;top:52px;background:#fff;border:4px solid #4b2d1c;border-radius:18px;padding:8px;text-align:center;font-size:22px;font-weight:1000;color:#d9480f;z-index:6;display:none;box-shadow:0 5px 0 #9a5b17}.queueLine{position:absolute;left:12px;right:12px;bottom:58px;height:4px;background:#4b2d1c;border-radius:999px;opacity:.45}.counter{position:absolute;left:0;right:0;bottom:0;height:55px;background:linear-gradient(#ffc333,#ff9900);border-top:5px solid #4b2d1c;text-align:center;font-size:25px;font-weight:1000;line-height:46px}.customer{position:absolute;width:68px;height:80px;font-size:42px;text-align:center;transition:.15s;animation:walkin .25s ease}.customer.sel{transform:scale(1.16);filter:drop-shadow(0 0 10px #fff)}.customer.vip{filter:drop-shadow(0 0 10px gold)}.customer.group{filter:drop-shadow(0 0 10px #38c172)}@keyframes walkin{from{transform:translateY(20px);opacity:.2}to{transform:translateY(0);opacity:1}}.customer.ok{animation:saleOk .35s ease forwards}.customer.no{animation:saleNo .35s ease}@keyframes saleOk{to{transform:translateY(-35px) scale(.25);opacity:0}}@keyframes saleNo{25%{transform:translateX(-10px)}50%{transform:translateX(10px)}75%{transform:translateX(-8px)}}.bubble{position:absolute;left:-5px;top:-24px;background:#fff;border:3px solid #4b2d1c;border-radius:12px;padding:2px 7px;font-size:18px;font-weight:900;white-space:nowrap}.bar{position:absolute;left:6px;right:6px;bottom:0;height:8px;background:#4b2d1c;border-radius:999px;overflow:hidden}.fill{height:100%;background:#38c172;width:100%}.msg{height:32px;text-align:center;font-size:20px;font-weight:1000;color:#0c8a3d;text-shadow:0 2px #fff;margin-top:6px}.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:8px;margin-top:8px;max-height:154px;overflow:visible}.menu button{height:68px;border:0;border-radius:18px;background:linear-gradient(#ffcf62,#ff8a2d);box-shadow:0 6px 0 #9b4f00;color:#3b2413;font-size:24px;font-weight:1000;line-height:1.05}.menu button:active{transform:translateY(5px);box-shadow:0 1px 0 #9b4f00}.start{width:100%;height:50px;margin-top:7px;border:0;border-radius:18px;background:linear-gradient(#59bdff,#2575e8);color:#fff;font-size:21px;font-weight:900;box-shadow:0 6px 0 #0d4b99}.overlay{position:absolute;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:9;padding:20px}.result{background:white;border:5px solid #4b2d1c;border-radius:24px;padding:22px;text-align:center;width:100%;box-shadow:0 8px 0 #9a5b17}.stars{font-size:46px;color:#ffca28;text-shadow:0 4px #805000}.fx{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);font-size:34px;font-weight:1000;color:#fff;text-shadow:0 5px #5b2a00,0 0 12px #fff;opacity:0;z-index:5;text-align:center;pointer-events:none}.fx.show{animation:pop .75s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-10%) scale(.6)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}#shop.chicken{background:linear-gradient(#b8ecff,#fff3bd)}#shop.pig{background:linear-gradient(#ffe0ec,#ffd1a6)}#shop.cow{background:linear-gradient(#dfffd1,#fff6cf)}#shop.boss{background:linear-gradient(#d8c2ff,#35204f)}.confetti{position:absolute;pointer-events:none;font-size:22px;z-index:7;animation:conf .8s ease forwards}@keyframes conf{to{transform:translateY(-80px) rotate(180deg);opacity:0}}@media(max-height:720px){#shop{height:42vh}.menu button{height:58px}.panel{padding:8px}h1{font-size:23px}}</style></head><body><div id="app"><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="pillTop">5스테이지 · 영업판매</div><button class="icon" onclick="startGame()">▶</button></div><div class="panel"><h1 id="title">🐔 복날대란 - 영업판매</h1><div class="sub">손님을 선택하고 주문 메뉴를 눌러 판매</div><select id="stage"><option value="chicken">🐔 계육왕국</option><option value="pig">🐷 돈육왕국</option><option value="cow">🐮 우육왕국</option><option value="boss">👑 대매출전쟁</option></select><div class="hud"><div class="box"><small>목표 매출</small><b id="goal">0원</b></div><div class="box"><small>현재 매출</small><b id="money">0원</b></div><div class="box"><small>콤보</small><b id="combo">0</b></div><div class="box"><small>손님 이탈</small><b id="miss">0</b></div></div><div class="salesBar"><div class="salesFill" id="salesFill"></div></div><div id="shop"><div class="signboard" id="signboard">오늘의 행사</div><div class="eventBanner" id="banner">🔥 입소문 발생!</div><div class="queueLine"></div><div class="counter">🏪 Self Maker 판매대</div></div><div class="msg" id="msg">손님을 선택하고 주문 메뉴를 눌러 판매하세요</div><div class="menu" id="menu"></div><div class="msg" id="menuInfo" style="font-size:13px;height:18px;color:#6b3d1d"></div><button class="start" id="start">게임 시작</button></div><div class="fx" id="fx">판매 성공!</div></div><div class="overlay" id="overlay"><div class="result"><h2>영업판매</h2><div class="stars">☆☆☆</div><p>손님 주문을 보고 맞는 메뉴를 빠르게 판매하세요.</p><button class="start" onclick="startGame()">시작</button><button class="start" onclick="location.href='../../index.html'">월드맵</button></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id);const cfg={chicken:{cls:'chicken',title:'🐔 복날대란 - 영업판매',goal:30000,theme:'#9bdcff',menus:[['🍗','후라이드'],['🌶️','양념'],['🐔','순살']],spawn:1350,max:4,event:'복날 치킨 행사'},pig:{cls:'pig',title:'🐷 추석대란 - 영업판매',goal:50000,theme:'#ffb6c1',menus:[['🥓','삼겹'],['🍖','목살'],['🐷','갈비'],['🍲','보쌈']],spawn:1150,max:5,event:'추석 고기 선물세트'},cow:{cls:'cow',title:'🐮 설날대란 - 영업판매',goal:70000,theme:'#a8e68e',menus:[['🥩','등심'],['🍖','안심'],['🐮','채끝'],['🍲','갈비'],['✨','육회']],spawn:980,max:6,event:'설날 프리미엄 한우전'},boss:{cls:'boss',title:'👑 대매출전쟁 - 영업판매',goal:100000,theme:'#8b5cf6',menus:[['🍗','치킨'],['🥓','삼겹'],['🥩','등심'],['❄️','특송'],['✨','VIP']],spawn:820,max:7,event:'전국 통합 대행사'}};let st,customers=[],money=0,combo=0,bestCombo=0,miss=0,sel=null,run=false,lastSpawn=0,raf=0,perfect=true,eventT=0,buzzT=0,rushT=0,sold=0;function apply(){st=cfg[stage.value];title.textContent=st.title;app.style.background='linear-gradient('+st.theme+',#ffe28a)';shop.className=st.cls;signboard.textContent=st.event;goal.textContent=st.goal.toLocaleString()+'원';renderMenu();update()}function renderMenu(){let m=menu;m.innerHTML='';st.menus.forEach((a,i)=>{let b=document.createElement('button');b.innerHTML=a[0]+'<br><span style="font-size:12px">'+a[1]+'</span>';b.onclick=()=>sell(i);m.appendChild(b)});menuInfo.textContent='판매 가능 상품 '+st.menus.length+'종 · 없는 메뉴 주문은 등장하지 않음'}function startGame(){overlay.style.display='none';apply();customers.forEach(c=>c.el.remove());customers=[];money=0;combo=0;bestCombo=0;miss=0;sold=0;sel=null;run=true;lastSpawn=0;perfect=true;eventT=0;buzzT=0;rushT=0;hideBanner();update();showBanner(st.event+' 시작!');cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}function showBanner(t){banner.textContent=t;banner.style.display='block';setTimeout(hideBanner,1600)}function hideBanner(){banner.style.display='none'}function spawn(type='normal'){if(customers.length>=st.max)return;let i=Math.floor(Math.random()*st.menus.length);let el=document.createElement('div');let isVip=type==='vip'||Math.random()<0.08;let isGroup=type==='group'||Math.random()<0.11;el.className='customer'+(isVip?' vip':'')+(isGroup?' group':'');let idx=customers.length;let x=22+(idx%4)*82+Math.random()*8;let y=82+Math.floor(idx/4)*80+Math.random()*10;el.style.left=x+'px';el.style.top=y+'px';let face=isVip?'🤑':isGroup?'👨‍👩‍👧':'😀';let orderText=isGroup?st.menus[i][0]+'x3':st.menus[i][0];el.innerHTML=face+'<div class="bubble">'+orderText+'</div><div class="bar"><div class="fill"></div></div>';let c={el,order:i,life:isVip?1.25:1,isVip,isGroup};el.onclick=()=>{if(sel)sel.el.classList.remove('sel');sel=c;el.classList.add('sel');msg.textContent=(isVip?'VIP ':'')+(isGroup?'단체 ':'')+'주문: '+st.menus[i][1]};shop.appendChild(el);customers.push(c)}function loop(ts){if(!run)return;if(!lastSpawn)lastSpawn=ts;eventT+=16;if(buzzT>0)buzzT-=16;if(rushT>0)rushT-=16;let spawnGap=rushT>0?Math.max(430,st.spawn*.55):st.spawn;if(ts-lastSpawn>spawnGap){spawn();lastSpawn=ts}if(eventT>8500){randomEvent();eventT=0}customers.forEach(c=>{c.life-=0.00255*(st.max/4)*(c.isVip?0.7:1);let f=c.el.querySelector('.fill');if(f)f.style.width=Math.max(0,c.life*100)+'%'});customers.filter(c=>c.life<=0).forEach(c=>{miss++;perfect=false;if(sel===c)sel=null;c.el.remove();msg.textContent='손님 이탈!'});customers=customers.filter(c=>c.life>0);reflowCustomers();update();if(money>=st.goal){end(true);return}raf=requestAnimationFrame(loop)}function reflowCustomers(){customers.forEach((c,idx)=>{c.el.style.left=(22+(idx%4)*82)+'px';c.el.style.top=(82+Math.floor(idx/4)*80)+'px'})}function randomEvent(){let r=Math.random();if(r<0.34){buzzT=5000;showBanner('🔥 입소문 발생! 매출 x2')}else if(r<0.67){rushT=5000;showBanner('🏃 손님 러시!');spawn('group');spawn('group')}else{showBanner('👑 VIP 방문!');spawn('vip')}}function sell(i){if(!run||!sel)return;if(sel.order===i){combo++;bestCombo=Math.max(bestCombo,combo);sold++;let qty=sel.isGroup?3:1;let earn=(5000+combo*500)*qty;if(sel.isVip)earn*=3;if(buzzT>0)earn*=2;money+=earn;pop(sel.isVip?'👑 VIP 대량주문!':sel.isGroup?'👨‍👩‍👧 단체예약 성공!':combo>=5?'🔥 입소문 x2!':'판매 성공!');sel.el.classList.add('ok');confetti();let target=sel;setTimeout(()=>target.el.remove(),220);customers=customers.filter(c=>c!==sel);sel=null;msg.textContent='매출 +'+earn.toLocaleString()+'원';if(navigator.vibrate)navigator.vibrate(18)}else{combo=0;miss++;perfect=false;if(sel){sel.el.classList.add('no');setTimeout(()=>sel&&sel.el.classList.remove('no'),300)}msg.textContent='주문 오류'}update()}function update(){moneyEl=money;document.getElementById('money').textContent=money.toLocaleString()+'원';document.getElementById('combo').textContent=combo;document.getElementById('miss').textContent=miss;salesFill.style.width=Math.min(100,money/st.goal*100)+'%'}function end(clear){run=false;cancelAnimationFrame(raf);let stars=clear?1:0;if(clear&&miss<=2)stars=2;if(clear&&perfect)stars=3;let bonus=perfect?1000:0;money+=bonus;try{clearStage('sales',stars)}catch(e){}let n=typeof nextStageOf==='function'?nextStageOf('sales'):null;overlay.innerHTML='<div class="result"><h2>영업판매 정산</h2><div class="stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div><p>'+st.title+'<br>최종 매출 '+money.toLocaleString()+' / '+st.goal.toLocaleString()+'원<br>판매 '+sold+'건 / 최고콤보 '+bestCombo+'<br>손님 이탈 '+miss+(perfect?'<br>Perfect Sales +1000':'')+'</p><button class="start" id="nextBtn">'+(n?'다음 스테이지':'월드맵')+'</button><button class="start" id="mapBtn">월드맵</button><button class="start" onclick="startGame()">다시 판매</button></div>';overlay.style.display='flex';mapBtn.onclick=()=>location.href='../../index.html';nextBtn.onclick=()=>{if(n)location.href='../../'+n.url.replace('./','')+'?stage='+n.id;else location.href='../../index.html'}}function confetti(){for(let i=0;i<10;i++){let d=document.createElement('div');d.className='confetti';d.textContent=['🎉','✨','💰','🔥'][i%4];d.style.left=(50+Math.random()*340)+'px';d.style.top=(120+Math.random()*200)+'px';shop.appendChild(d);setTimeout(()=>d.remove(),850)}}function pop(t){fx.textContent=t;fx.classList.remove('show');void fx.offsetWidth;fx.classList.add('show')}stage.onchange=()=>apply();start.onclick=startGame;apply();update();</script></body></html>
