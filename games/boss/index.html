<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>보스전</title><link rel="stylesheet" href="../../css/common.css"><style>.arena{height:62vh;position:relative;overflow:hidden;background:radial-gradient(circle,#5b2fb8,#15051f);border:5px solid #4b2d1c;border-radius:24px;color:white}.player,.enemy,.boss{position:absolute;transform:translate(-50%,-50%);font-size:38px}.boss{font-size:72px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}.box{background:#fff;border:3px solid #4b2d1c;border-radius:14px;padding:8px;text-align:center;font-weight:900}.joy{position:absolute;left:24px;bottom:24px;width:110px;height:110px;border-radius:50%;background:#ffffff33;border:4px solid #ffffff66}.stick{position:absolute;left:35px;top:35px;width:40px;height:40px;border-radius:50%;background:#ffffff88}</style></head><body><div class="shin-app"><header class="shin-topbar"><button class="shin-icon" onclick="location.href='../../index.html'">🏠</button><div class="shin-currency">보스전</div><div class="shin-currency">조이스틱</div><button class="shin-icon" onclick="start()">▶</button></header><section class="shin-panel"><div class="hud"><div class="box">HP <span id="hp">100</span></div><div class="box">처치 <span id="kill">0</span>/20</div><div class="box">보스 <span id="bhp">100</span></div></div><div class="arena" id="arena"><div class="player" id="pl">👨‍🍳</div><div class="boss" id="bo">👑🐥</div><div class="joy"><div class="stick"></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px"><button class="shin-btn" onclick="bomb()">💣 전체공격(E)</button><button class="shin-btn" onclick="heal()">❤ 회복(Q)</button></div></section></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>var x=50,y=70,h=100,k=0,b=100,en=[],run=false,keys={};function start(){x=50;y=70;h=100;k=0;b=100;en.forEach(e=>e.remove());en=[];run=true;loop();spawnLoop()}function draw(){pl.style.left=x+'%';pl.style.top=y+'%';bo.style.left='50%';bo.style.top='22%';hp.textContent=Math.round(h);kill.textContent=k;bhp.textContent=Math.max(0,Math.round(b))}function spawn(){var e=document.createElement('div');e.className='enemy';e.textContent=['🐥','🐷','🐮'][Math.random()*3|0];e.x=Math.random()*100;e.y=100;arena.appendChild(e);en.push(e)}function spawnLoop(){if(!run)return;spawn();setTimeout(spawnLoop,900)}function loop(){if(!run)return;if(keys.a||keys.ArrowLeft)x-=1.4;if(keys.d||keys.ArrowRight)x+=1.4;if(keys.w||keys.ArrowUp)y-=1.4;if(keys.s||keys.ArrowDown)y+=1.4;x=Math.max(5,Math.min(95,x));y=Math.max(18,Math.min(92,y));en.forEach(e=>{var dx=x-e.x,dy=y-e.y,dist=Math.hypot(dx,dy)||1;e.x+=dx/dist*.45;e.y+=dy/dist*.45;e.style.left=e.x+'%';e.style.top=e.y+'%';if(dist<5){h-=.25}});b-=.04;if(b<=0){run=false;ShinResult.complete('boss',h>70?3:2);return}if(h<=0){run=false;alert('패배! 다시 도전하세요.');return}draw();requestAnimationFrame(loop)}function bomb(){en.forEach(e=>e.remove());k+=en.length;en=[];b-=10;draw()}function heal(){h=Math.min(100,h+20);draw()}window.onkeydown=e=>{keys[e.key]=true;if(e.key==='e')bomb();if(e.key==='q')heal()};window.onkeyup=e=>{keys[e.key]=false};start();</script></body></html>
