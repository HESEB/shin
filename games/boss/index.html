<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>보스전 v0.3 원본복원</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#151515;font-family:Arial,'Noto Sans KR',sans-serif;color:#fff}#app{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 35%,#ffe88a,#e98724 60%,#5b2208)}#arena{position:absolute;inset:0;overflow:hidden;touch-action:none}.top{position:absolute;left:8px;right:8px;top:6px;z-index:30;display:flex;gap:7px;align-items:center}.icon{width:38px!important;height:38px!important;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-size:20px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stagePill{flex:1;height:38px;display:flex;align-items:center;justify-content:center;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stageSelect{position:absolute;right:8px;top:50px;z-index:31;width:136px;height:31px;border:2px solid #4b2d1c;border-radius:12px;background:#fff8e8;color:#3a2418;font-size:13px;font-weight:1000}.hud{position:absolute;left:8px;right:150px;top:50px;z-index:30;display:grid;grid-template-columns:repeat(3,1fr);gap:3px}.chip{height:31px;background:#fff8e8;color:#3a2418;border:2px solid #4b2d1c;border-radius:10px;font-weight:1000;text-align:center;font-size:11px;display:flex;align-items:center;justify-content:center;gap:1px;box-shadow:0 2px 0 #0003}.chip b{font-size:13px}.bars{position:absolute;left:8px;right:8px;top:85px;z-index:29;display:grid;gap:4px}.bar{height:12px;background:#4b2d1c;border-radius:999px;padding:3px}.fill{height:100%;background:linear-gradient(90deg,#38c172,#ffd54a);border-radius:999px;width:0}.bossFill{background:linear-gradient(90deg,#ff5b5b,#ffd54a)}.player,.enemy,.bullet,.xp,.boss{position:absolute;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);will-change:left,top}.player{font-size:40px;z-index:5;filter:drop-shadow(0 4px 0 #0008)}.enemy{font-size:30px;z-index:3}.boss{font-size:78px;z-index:4;filter:drop-shadow(0 6px 0 #0008)}.bullet{font-size:24px;z-index:4}.xp{font-size:18px;z-index:2}.skills{position:absolute;left:8px;right:8px;bottom:max(6px,env(safe-area-inset-bottom));z-index:30;display:grid;grid-template-columns:1fr 1fr;gap:7px}.skill{height:58px;border:0;border-radius:18px;background:linear-gradient(#ffbd37,#ff8b00);color:#fff;font-size:21px;font-weight:900;box-shadow:0 6px 0 #9b4f00}.skill:active{transform:translateY(4px);box-shadow:0 2px 0 #9b4f00}.joy{position:absolute;width:118px;height:118px;border-radius:50%;background:#ffffff22;border:4px solid #ffffff66;z-index:25;display:none;pointer-events:none;transform:translate(-50%,-50%)}.stick{position:absolute;left:35px;top:35px;width:40px;height:40px;border-radius:50%;background:#ffffff99;border:3px solid #fff;box-shadow:0 3px 0 #0005}.fx{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);font-size:34px;font-weight:1000;text-align:center;text-shadow:0 5px #4b2d1c;opacity:0;z-index:40;pointer-events:none}.fx.show{animation:pop .8s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-10%) scale(.6)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}.overlay{position:absolute;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}.card{background:#fff8e8;color:#3b2413;border:5px solid #4b2d1c;border-radius:22px;padding:18px;text-align:center;width:100%;max-width:350px;box-shadow:0 8px 0 #8b4a12}.card h1{margin:0 0 8px;font-size:28px}.start,.up{width:100%;min-height:44px;border:0;border-radius:16px;background:linear-gradient(#ffbd37,#ff8b00);font-size:19px;font-weight:900;color:#fff;box-shadow:0 5px 0 #9b4f00;margin-top:7px}.upgrid{display:grid;gap:8px}.up{background:#fff;color:#3b2413;border:4px solid #4b2d1c;box-shadow:0 4px 0 #8b4a12}.stars{font-size:42px;color:#ffca28;text-shadow:0 4px #805000}.hint{position:absolute;left:8px;right:8px;bottom:72px;text-align:center;z-index:20;font-size:12px;font-weight:1000;text-shadow:0 2px #000;pointer-events:none}@media(max-height:700px){.stageSelect{top:46px;height:29px}.hud{top:46px}.chip{height:29px;font-size:10px}.chip b{font-size:12px}.bars{top:79px}.skill{height:52px;font-size:18px}.hint{display:none}.boss{font-size:68px}.joy{width:104px;height:104px}.stick{left:30px;top:30px;width:36px;height:36px}.card{padding:14px}.start,.up{min-height:40px}}</style></head><body><div id="app"><div id="arena"></div><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="stagePill">6스테이지 · 보스전</div><button class="icon" onclick="startGame()">▶</button></div><select id="stage" class="stageSelect"><option value="chicken">🐔 병아리킹</option><option value="pig">🐷 돼지왕</option><option value="cow">🐮 황소장군</option><option value="demon">👑 연속 보스</option></select><div class="hud"><div class="chip">Lv<b id="lv">1</b></div><div class="chip">처치<b id="kill">0</b></div><div class="chip">HP<b id="hp">100</b></div></div><div class="bars"><div class="bar"><div class="fill" id="exp"></div></div><div class="bar"><div class="fill bossFill" id="bossHp"></div></div></div><div class="skills"><button class="skill" id="active">🚁 전체공격</button><button class="skill" id="heal">💊 회복</button></div><div class="hint">화면 아무 곳이나 터치 후 드래그하면 투명 조이스틱 이동</div><div class="joy" id="joy"><div class="stick" id="stick"></div></div><div class="fx" id="fx">LEVEL UP!</div><div class="overlay" id="overlay"><div class="card"><h1>👑 보스전 v0.3</h1><p>일반몹을 처치하고 경험치를 모아 업그레이드하세요.<br>필요 처치 수 달성 후 보스가 등장합니다.</p><button class="start" onclick="startGame()">전투 시작</button><button class="start" onclick="location.href='../../index.html'">월드맵</button></div></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id),arena=$('arena'),overlay=$('overlay'),app=$('app'),joy=$('joy'),stick=$('stick');const STAGES={chicken:{bg:'radial-gradient(circle at 50% 35%,#ffe88a,#e98724 60%,#5b2208)',mobs:['🐥','🐔','🥚'],bosses:[{icon:'👑🐥',name:'병아리킹',hp:600}],need:70},pig:{bg:'radial-gradient(circle at 50% 35%,#ffd1df,#d65a78 60%,#581425)',mobs:['🐷','🐖','🥩'],bosses:[{icon:'👑🐷',name:'돼지왕',hp:760}],need:85},cow:{bg:'radial-gradient(circle at 50% 35%,#c9ffb0,#5fa14e 60%,#173b18)',mobs:['🐄','🐂','📦'],bosses:[{icon:'👑🐂',name:'황소장군',hp:920}],need:100},demon:{bg:'radial-gradient(circle at 50% 35%,#c6a3ff,#5b2fb8 55%,#12051f)',mobs:['🐥','🐔','🐷','🐖','🐄','🐂','📦'],bosses:[{icon:'👑🐥',name:'병아리킹',hp:500},{icon:'👑🐷',name:'돼지왕',hp:650},{icon:'👑🐂',name:'황소장군',hp:800},{icon:'👑😈',name:'구매대마왕',hp:1100}],need:70}};let stageConf,W=480,H=800,p,enemies=[],bullets=[],xps=[],boss=null,bossIndex=0,run=false,last=0,spawnT=0,shootT=0,activeT=0;let joyOn=false,baseX=0,baseY=0,keys={l:false,r:false,u:false,d:false},stats,upgradePause=false;function make(cls,txt,x,y){let e=document.createElement('div');e.className=cls;e.textContent=txt;e.style.left=x+'px';e.style.top=y+'px';arena.appendChild(e);return e}function init(){stageConf=STAGES[stage.value];app.style.background=stageConf.bg;W=arena.clientWidth;H=arena.clientHeight;p={x:W/2,y:H/2,hp:100,el:make('player','👨‍🍳',W/2,H/2)};stats={lv:1,exp:0,need:10,kill:0,atk:12,spd:1,def:0,shots:1,weapon:'🔪'};enemies=[];bullets=[];xps=[];boss=null;bossIndex=0;spawnT=0;shootT=0;activeT=0;last=0}function startGame(){arena.innerHTML='';overlay.style.display='none';init();run=true;upgradePause=false;requestAnimationFrame(loop);pop('일반몹 웨이브 시작!')}function spawnEnemy(){let side=Math.random()*4|0,x=side==0?0:side==1?W:Math.random()*W,y=side==2?0:side==3?H:Math.random()*H;let hp=24+stats.lv*5,icon=stageConf.mobs[Math.floor(Math.random()*stageConf.mobs.length)];enemies.push({x,y,hp,spd:.75+Math.random()*.5,el:make('enemy',icon,x,y),dmg:8})}function spawnBoss(){if(boss)return;let b=stageConf.bosses[bossIndex];boss={x:W/2,y:120,hp:b.hp,max:b.hp,t:0,name:b.name,el:make('boss',b.icon,W/2,120)};pop('👑 '+b.name+' 등장!')}function shoot(){let targets=[...enemies];if(boss)targets.push(boss);if(!targets.length)return;targets.sort((a,b)=>dist(p,a)-dist(p,b));for(let i=0;i<stats.shots&&i<targets.length;i++){let t=targets[i],d=dist(p,t)||1,vx=(t.x-p.x)/d*6,vy=(t.y-p.y)/d*6;bullets.push({x:p.x,y:p.y,vx,vy,dmg:stats.atk,life:65,el:make('bullet',stats.weapon,p.x,p.y)})}}function loop(ts){if(!run||upgradePause)return;if(!last)last=ts;let dt=Math.min((ts-last)/16.67,2);last=ts;let speed=3.6*dt;if(keys.l)p.x-=speed;if(keys.r)p.x+=speed;if(keys.u)p.y-=speed;if(keys.d)p.y+=speed;p.x=Math.max(20,Math.min(W-20,p.x));p.y=Math.max(78,Math.min(H-24,p.y));p.el.style.left=p.x+'px';p.el.style.top=p.y+'px';spawnT+=dt;shootT+=dt;activeT+=dt;if(!boss&&stats.kill<stageConf.need&&spawnT>28/Math.min(2.4,stats.lv*.18+1)){spawnEnemy();spawnT=0}if(!boss&&stats.kill>=stageConf.need)spawnBoss();if(shootT>26/stats.spd){shoot();shootT=0}moveEnemies(dt);moveBoss(dt);moveBullets(dt);collectXp();if(activeT>1800){activeT=0;activeAttack()}updateHud();if(p.hp<=0)end(false);else requestAnimationFrame(loop)}function moveEnemies(dt){enemies.forEach(e=>{let d=dist(p,e)||1;e.x+=(p.x-e.x)/d*e.spd*dt;e.y+=(p.y-e.y)/d*e.spd*dt;e.el.style.left=e.x+'px';e.el.style.top=e.y+'px';if(d<24)p.hp-=Math.max(1,e.dmg-stats.def)*.035*dt})}function moveBoss(dt){if(!boss)return;boss.t+=dt;boss.x=W/2+Math.sin(boss.t/35)*130;boss.y=120+Math.sin(boss.t/55)*35;boss.el.style.left=boss.x+'px';boss.el.style.top=boss.y+'px';if(Math.random()<.018)for(let i=0;i<6;i++){let a=i*Math.PI/3+boss.t/30;enemies.push({x:boss.x+Math.cos(a)*40,y:boss.y+Math.sin(a)*40,hp:22,spd:1.25,el:make('enemy',stageConf.mobs[i%stageConf.mobs.length],boss.x,boss.y),dmg:10})}if(dist(p,boss)<62)p.hp-=.2*dt;if(boss.hp<=0){boss.el.remove();boss=null;bossIndex++;if(bossIndex>=stageConf.bosses.length)end(true);else{stats.kill=0;pop('다음 페이즈! 일반몹 등장!')}}}function moveBullets(dt){bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;b.el.style.left=b.x+'px';b.el.style.top=b.y+'px';enemies.forEach(e=>{if(e.hp>0&&Math.hypot(b.x-e.x,b.y-e.y)<24){e.hp-=b.dmg;b.life=0;if(e.hp<=0)killEnemy(e)}});if(boss&&Math.hypot(b.x-boss.x,b.y-boss.y)<52){boss.hp-=b.dmg;b.life=0}});bullets=bullets.filter(b=>{let ok=b.life>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20;if(!ok)b.el.remove();return ok});enemies=enemies.filter(e=>{let ok=e.hp>0;if(!ok)e.el.remove();return ok})}function killEnemy(e){stats.kill++;xps.push({x:e.x,y:e.y,el:make('xp','⭐',e.x,e.y)})}function collectXp(){xps.forEach(x=>{let d=Math.hypot(p.x-x.x,p.y-x.y)||1;x.x+=(p.x-x.x)/d*3;x.y+=(p.y-x.y)/d*3;x.el.style.left=x.x+'px';x.el.style.top=x.y+'px';if(d<24){x.take=true;stats.exp++;if(stats.exp>=stats.need)levelUp()}});xps=xps.filter(x=>{if(x.take){x.el.remove();return false}return true})}function levelUp(){stats.lv++;stats.exp=0;stats.need+=6;upgradePause=true;showUpgrade()}function showUpgrade(){overlay.style.display='flex';overlay.innerHTML='<div class="card"><h1>LEVEL UP</h1><div class="upgrid"><button class="up" onclick="upgrade(\'atk\')">⚔ 공격력 +15%</button><button class="up" onclick="upgrade(\'def\')">🛡 방어력 +2</button><button class="up" onclick="upgrade(\'weapon\')">🛠 무기 강화</button></div></div>'}function upgrade(t){if(t=='atk')stats.atk=Math.round(stats.atk*1.15);if(t=='def')stats.def+=2;if(t=='weapon'){stats.shots++;stats.spd+=.12;stats.weapon=stats.shots>=4?'⚙️':stats.shots>=3?'🪚':'🔪'}overlay.style.display='none';upgradePause=false;last=0;pop('업그레이드 완료!');requestAnimationFrame(loop)}function activeAttack(){pop('🚁 전체공격!');enemies.forEach(e=>e.hp-=80);if(boss)boss.hp-=70}function end(clear){run=false;let stars=clear?(p.hp>70?3:p.hp>35?2:1):1;if(clear)try{clearStage('boss',stars)}catch(e){}overlay.style.display='flex';overlay.innerHTML='<div class="card"><h1>'+(clear?'🎉 승리!':'💀 패배')+'</h1><div class="stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div><p>단계: '+stage.selectedOptions[0].text+'<br>레벨 '+stats.lv+' · 처치 '+stats.kill+'<br>획득 포인트 '+(clear?50+stats.lv*5:stats.lv*5)+'P</p><button class="start" onclick="startGame()">다시 전투</button><button class="start" onclick="location.href=\'../../index.html\'">월드맵</button></div>'}function updateHud(){lv.textContent=stats.lv;kill.textContent=stats.kill;hp.textContent=Math.max(0,Math.round(p.hp));exp.style.width=Math.min(100,stats.exp/stats.need*100)+'%';bossHp.style.width=boss?Math.max(0,boss.hp/boss.max*100)+'%':'0%'}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function pop(t){fx.textContent=t;fx.classList.remove('show');void fx.offsetWidth;fx.classList.add('show')}function setStick(dx,dy){let d=Math.hypot(dx,dy)||1,m=Math.min(d,38),nx=d>8?dx/d:0,ny=d>8?dy/d:0;keys.l=nx<-.25;keys.r=nx>.25;keys.u=ny<-.25;keys.d=ny>.25;stick.style.left=(35+nx*m)+'px';stick.style.top=(35+ny*m)+'px'}function joyStart(e){if(!run||upgradePause)return;if(e.target.closest('.top,.stageSelect,.skills,.overlay'))return;let pnt=e.touches?e.touches[0]:e;baseX=pnt.clientX;baseY=pnt.clientY;joy.style.left=baseX+'px';joy.style.top=baseY+'px';joy.style.display='block';joyOn=true;setStick(0,0);e.preventDefault()}function joyMove(e){if(!joyOn)return;let pnt=e.touches?e.touches[0]:e;setStick(pnt.clientX-baseX,pnt.clientY-baseY);e.preventDefault()}function joyEnd(){joyOn=false;joy.style.display='none';keys={l:false,r:false,u:false,d:false};stick.style.left='35px';stick.style.top='35px'}arena.addEventListener('pointerdown',joyStart);arena.addEventListener('pointermove',joyMove);window.addEventListener('pointerup',joyEnd);arena.addEventListener('touchstart',joyStart,{passive:false});arena.addEventListener('touchmove',joyMove,{passive:false});window.addEventListener('touchend',joyEnd);active.onclick=activeAttack;heal.onclick=()=>{if(p){p.hp=Math.min(100,p.hp+15);pop('응급지원 +HP')}};document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.l=true;if(e.key==='ArrowRight'||e.key==='d')keys.r=true;if(e.key==='ArrowUp'||e.key==='w')keys.u=true;if(e.key==='ArrowDown'||e.key==='s')keys.d=true;if(e.key==='q')heal.onclick();if(e.key==='e')activeAttack()});document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.l=false;if(e.key==='ArrowRight'||e.key==='d')keys.r=false;if(e.key==='ArrowUp'||e.key==='w')keys.u=false;if(e.key==='ArrowDown'||e.key==='s')keys.d=false});stage.onchange=()=>{if(run)startGame()};window.onresize=()=>{W=arena.clientWidth;H=arena.clientHeight};</script></body></html>
