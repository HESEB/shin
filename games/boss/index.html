<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>보스전 v2 MVP</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,'Noto Sans KR',sans-serif;color:#fff}#game{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 22%,#7b4fd9 0,#2b1042 52%,#0b0310 100%)}#arena{position:absolute;inset:0;overflow:hidden;touch-action:none}.top{position:absolute;left:8px;right:8px;top:6px;z-index:40;display:flex;gap:7px;align-items:center}.icon{width:38px!important;height:38px!important;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-size:20px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stagePill{flex:1;height:38px;display:flex;align-items:center;justify-content:center;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stageSelect{position:absolute;right:8px;top:50px;z-index:41;width:128px;height:31px;border:2px solid #4b2d1c;border-radius:12px;background:#fff8e8;color:#3a2418;font-size:13px;font-weight:1000}.hud{position:absolute;left:8px;right:144px;top:50px;z-index:40;display:grid;grid-template-columns:repeat(4,1fr);gap:3px}.chip{height:31px;background:#fff8e8;color:#3a2418;border:2px solid #4b2d1c;border-radius:10px;font-weight:1000;text-align:center;font-size:11px;display:flex;align-items:center;justify-content:center;gap:1px;box-shadow:0 2px 0 #0003}.chip b{font-size:13px}.bossBar{position:absolute;left:8px;right:8px;top:85px;z-index:39;height:15px;background:#2b0d0d;border:3px solid #4b2d1c;border-radius:999px;overflow:hidden}.bossFill{height:100%;width:100%;background:linear-gradient(90deg,#ff4d4d,#ffd54a);border-radius:999px}.player,.enemy,.boss,.bullet,.xp{position:absolute;transform:translate(-50%,-50%);will-change:transform,left,top}.player{font-size:38px;z-index:10;filter:drop-shadow(0 5px 0 #0008)}.boss{font-size:76px;z-index:5;filter:drop-shadow(0 8px 0 #0008)}.enemy{font-size:34px;z-index:6;filter:drop-shadow(0 4px 0 #0007)}.bullet{width:13px;height:13px;background:#fff35a;border:3px solid #7b4a00;border-radius:50%;box-shadow:0 0 12px #fff35a;z-index:8}.xp{font-size:20px;z-index:7}.float{position:absolute;z-index:50;color:#fff;font-size:24px;font-weight:1000;text-shadow:0 3px #000;animation:float .7s ease forwards;pointer-events:none}@keyframes float{to{opacity:0;transform:translateY(-48px) scale(1.2)}}.joy{position:absolute;left:22px;bottom:92px;width:116px;height:116px;border-radius:50%;background:#ffffff22;border:4px solid #ffffff55;z-index:30;touch-action:none}.stick{position:absolute;left:36px;top:36px;width:40px;height:40px;border-radius:50%;background:#ffffff99;border:3px solid #fff;box-shadow:0 3px 0 #0005}.skills{position:absolute;left:8px;right:8px;bottom:max(6px,env(safe-area-inset-bottom));z-index:32;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.skill{height:62px;border:0;border-radius:20px;background:linear-gradient(#ffcf62,#ff8a2d);box-shadow:0 6px 0 #9b4f00;color:#3b2413;font-size:19px;font-weight:1000}.skill:disabled{filter:grayscale(.8);opacity:.65}.skill:active{transform:translateY(4px);box-shadow:0 2px 0 #9b4f00}.toast{position:absolute;left:8px;right:8px;top:105px;z-index:35;text-align:center;font-size:18px;font-weight:1000;color:#fff;text-shadow:0 3px #000;pointer-events:none}.overlay{position:absolute;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:70;padding:16px}.card{background:#fff8ee;color:#3a2418;border:5px solid #4b2d1c;border-radius:22px;padding:16px;text-align:center;width:100%;max-width:340px;box-shadow:0 8px 0 #0005}.card h1{font-size:28px;margin:0 0 8px}.sub{font-weight:900;line-height:1.4;color:#7b4a1f}.stars{font-size:42px;color:#ffca28;text-shadow:0 4px #805000}.btn{width:100%;height:42px;margin-top:7px;border:0;border-radius:16px;background:linear-gradient(#59bdff,#2575e8);color:#fff;font-size:19px;font-weight:1000;box-shadow:0 5px 0 #0d4b99}.btn.orange{background:linear-gradient(#ffbd37,#ff8b00);box-shadow:0 5px 0 #9b4f00}.danger{animation:danger .28s linear 2}@keyframes danger{50%{filter:brightness(1.5) saturate(1.4)}}@media(max-height:700px){.stageSelect{top:46px;height:29px}.hud{top:46px}.chip{height:29px;font-size:10px}.chip b{font-size:12px}.bossBar{top:79px}.joy{width:100px;height:100px;bottom:78px}.stick{left:30px;top:30px;width:36px;height:36px}.skill{height:54px;font-size:17px}.boss{font-size:68px}.toast{top:96px;font-size:15px}}</style></head><body><div id="game"><div id="arena"></div><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="stagePill">6스테이지 · 보스전</div><button class="icon" onclick="startGame()">▶</button></div><select id="stage" class="stageSelect"><option value="chicken">🐔 병아리킹</option><option value="pig">🐷 돈육왕</option><option value="cow">🐮 황소장군</option><option value="final">👑 구매마왕</option></select><div class="hud"><div class="chip">❤️<b id="hp">100</b></div><div class="chip">💎<b id="lv">1</b></div><div class="chip">⚔️<b id="pow">1</b></div><div class="chip">처치<b id="kill">0</b></div></div><div class="bossBar"><div class="bossFill" id="bossFill"></div></div><div class="toast" id="toast">투명 조이스틱으로 이동 · 자동공격</div><div class="joy" id="joy"><div class="stick" id="stick"></div></div><div class="skills"><button class="skill" id="bombBtn" onclick="bomb()">💣 폭탄</button><button class="skill" id="healBtn" onclick="heal()">❤️ 회복</button><button class="skill" id="upBtn" onclick="upgrade()">⚔️ 강화</button></div></div><div class="overlay" id="overlay"><div class="card"><h1>최종 보스전</h1><div class="sub">조이스틱으로 피하고 자동공격으로 적을 처치하세요.<br>스킬을 써서 보스를 격파하면 클리어!</div><button class="btn orange" onclick="startGame()">게임 시작</button><button class="btn" onclick="location.href='../../index.html'">월드맵</button></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id),arena=$('arena'),game=$('game');const CFG={chicken:{bg:'radial-gradient(circle at 50% 22%,#9be7ff 0,#61b6ff 52%,#153a64 100%)',boss:'👑🐥',enemy:['🐥','🐤'],bhp:220,spawn:850,speed:.45},pig:{bg:'radial-gradient(circle at 50% 22%,#ffd2e1 0,#b44b70 52%,#3a1120 100%)',boss:'👑🐷',enemy:['🐷','🐽'],bhp:300,spawn:720,speed:.55},cow:{bg:'radial-gradient(circle at 50% 22%,#d8ffd0 0,#5a9b47 52%,#143414 100%)',boss:'👑🐮',enemy:['🐮','🐂'],bhp:380,spawn:620,speed:.65},final:{bg:'radial-gradient(circle at 50% 22%,#c4a4ff 0,#5b2fb8 52%,#12051f 100%)',boss:'👑😈',enemy:['🐥','🐷','🐮','💀'],bhp:520,spawn:520,speed:.75}};let cfg,run=false,px=50,py=70,h=100,k=0,level=1,power=1,bhp=300,enemies=[],bullets=[],xp=[],last=0,spawnT=0,shotT=0,joyOn=false,jx=0,jy=0,bombCd=0,healCd=0,upCost=6,bossEl,playerEl;function show(t){toast.textContent=t;clearTimeout(show.t);show.t=setTimeout(()=>toast.textContent='투명 조이스틱으로 이동 · 자동공격',1200)}function clearAll(){[...enemies,...bullets,...xp].forEach(o=>o.el&&o.el.remove());enemies=[];bullets=[];xp=[];if(bossEl)bossEl.remove();if(playerEl)playerEl.remove()}function startGame(){clearAll();cfg=CFG[stage.value];game.style.background=cfg.bg;px=50;py=72;h=100;k=0;level=1;power=1;bhp=cfg.bhp;last=0;spawnT=0;shotT=0;bombCd=0;healCd=0;upCost=6;run=true;overlay.style.display='none';bossEl=document.createElement('div');bossEl.className='boss';bossEl.textContent=cfg.boss;arena.appendChild(bossEl);playerEl=document.createElement('div');playerEl.className='player';playerEl.textContent='👨‍🍳';arena.appendChild(playerEl);update();requestAnimationFrame(loop)}function spawnEnemy(){let el=document.createElement('div');el.className='enemy';el.textContent=cfg.enemy[Math.random()*cfg.enemy.length|0];let side=Math.random()*4|0,x,y;if(side===0){x=-5;y=Math.random()*100}else if(side===1){x=105;y=Math.random()*100}else if(side===2){x=Math.random()*100;y=-5}else{x=Math.random()*100;y=105}arena.appendChild(el);enemies.push({el,x,y,hp:2+level*.45,spd:cfg.speed+Math.random()*.25})}function shoot(){let target=enemies[0]||{x:50,y:18};let best=1e9;enemies.forEach(e=>{let d=(e.x-px)**2+(e.y-py)**2;if(d<best){best=d;target=e}});let dx=target.x-px,dy=target.y-py,d=Math.hypot(dx,dy)||1;let el=document.createElement('div');el.className='bullet';arena.appendChild(el);bullets.push({el,x:px,y:py,vx:dx/d*1.8,vy:dy/d*1.8,dmg:power})}function loop(ts){if(!run)return;if(!last)last=ts;let dt=Math.min((ts-last)/16.7,2);last=ts;spawnT+=dt*16.7;shotT+=dt*16.7;bombCd=Math.max(0,bombCd-dt*16.7);healCd=Math.max(0,healCd-dt*16.7);if(spawnT>cfg.spawn){spawnEnemy();spawnT=0}if(shotT>Math.max(260,650-power*45)){shoot();shotT=0}px+=jx*1.05*dt;py+=jy*1.05*dt;px=Math.max(5,Math.min(95,px));py=Math.max(14,Math.min(92,py));enemies.forEach(e=>{let dx=px-e.x,dy=py-e.y,d=Math.hypot(dx,dy)||1;e.x+=dx/d*e.spd*dt;e.y+=dy/d*e.spd*dt;if(d<5){h-=.22*dt;e.x-=dx/d*1.5;e.y-=dy/d*1.5;game.classList.add('danger');setTimeout(()=>game.classList.remove('danger'),90)}});bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt});bullets=bullets.filter(b=>{let hit=false;enemies.forEach(e=>{if(!hit&&Math.hypot(e.x-b.x,e.y-b.y)<5){e.hp-=b.dmg;hit=true;if(e.hp<=0)dieEnemy(e)}});if(!hit&&Math.hypot(50-b.x,18-b.y)<9){bhp-=b.dmg*.7;hit=true;float('-'+Math.round(b.dmg),50,18)}if(hit||b.x<-10||b.x>110||b.y<-10||b.y>110){b.el.remove();return false}return true});enemies=enemies.filter(e=>e.hp>0);bhp-=0.003*power*dt;drawObjects();update();if(h<=0)finish(false);else if(bhp<=0)finish(true);else requestAnimationFrame(loop)}function dieEnemy(e){e.hp=0;k++;float('+1',e.x,e.y);if(k%6===0){level++;power++;show('⚔️ 자동 강화!')}}function drawObjects(){playerEl.style.left=px+'%';playerEl.style.top=py+'%';bossEl.style.left='50%';bossEl.style.top='18%';enemies.forEach(e=>{e.el.style.left=e.x+'%';e.el.style.top=e.y+'%'});bullets.forEach(b=>{b.el.style.left=b.x+'%';b.el.style.top=b.y+'%'})}function update(){hp.textContent=Math.max(0,Math.round(h));kill.textContent=k;lv.textContent=level;pow.textContent=power;bossFill.style.width=Math.max(0,bhp/cfg.bhp*100)+'%';bombBtn.disabled=bombCd>0;healBtn.disabled=healCd>0;upBtn.textContent='⚔️ 강화 '+upCost}function bomb(){if(!run||bombCd>0)return;enemies.forEach(e=>{e.el.remove();k++});enemies=[];bhp-=22*power;bombCd=5000;show('💣 전체공격!');update()}function heal(){if(!run||healCd>0)return;h=Math.min(100,h+32);healCd=6500;show('❤️ 회복!');update()}function upgrade(){if(!run||k<upCost)return;level++;power++;k-=upCost;upCost+=4;show('⚔️ 공격 강화!');update()}function float(t,x,y){let el=document.createElement('div');el.className='float';el.textContent=t;el.style.left=x+'%';el.style.top=y+'%';arena.appendChild(el);setTimeout(()=>el.remove(),700)}function finish(win){if(!run)return;run=false;let stars=win?(h>70?3:h>35?2:1):1;if(win)try{clearStage('boss',stars)}catch(e){}overlay.innerHTML='<div class="card"><h1>'+(win?'보스 격파!':'전투 실패')+'</h1><div class="stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div><div class="sub">HP '+Math.round(h)+' · 처치 '+k+' · 공격 '+power+'</div><button class="btn orange" onclick="startGame()">다시 도전</button><button class="btn" onclick="location.href=\'../../index.html\'">월드맵</button></div>';overlay.style.display='flex'}function aim(e){let r=joy.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,p=e.touches?e.touches[0]:e,dx=p.clientX-cx,dy=p.clientY-cy,d=Math.hypot(dx,dy)||1,m=Math.min(d,38);jx=d>8?dx/d:0;jy=d>8?dy/d:0;stick.style.left=(36+jx*m)+'px';stick.style.top=(36+jy*m)+'px'}function joyEnd(){joyOn=false;jx=0;jy=0;stick.style.left='36px';stick.style.top='36px'}joy.addEventListener('pointerdown',e=>{joyOn=true;joy.setPointerCapture(e.pointerId);aim(e)});joy.addEventListener('pointermove',e=>{if(joyOn)aim(e)});joy.addEventListener('pointerup',joyEnd);joy.addEventListener('pointercancel',joyEnd);document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')jx=-1;if(e.key==='ArrowRight'||e.key==='d')jx=1;if(e.key==='ArrowUp'||e.key==='w')jy=-1;if(e.key==='ArrowDown'||e.key==='s')jy=1;if(e.key==='q')heal();if(e.key==='e')bomb();if(e.key==='r')upgrade()});document.addEventListener('keyup',e=>{if(['ArrowLeft','a','ArrowRight','d'].includes(e.key))jx=0;if(['ArrowUp','w','ArrowDown','s'].includes(e.key))jy=0});stage.onchange=()=>{if(run)startGame()};startGame();</script></body></html>
