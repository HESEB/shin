<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>도축정형</title><link rel="stylesheet" href="../../css/common.css"><style>.area{height:60vh;position:relative;overflow:hidden;background:linear-gradient(#51301f,#21140e);border:5px solid #4b2d1c;border-radius:24px}.meat{position:absolute;font-size:42px;filter:drop-shadow(0 4px #0008)}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}.box{background:#fff;border:3px solid #4b2d1c;border-radius:14px;padding:8px;text-align:center;font-weight:900}</style></head><body><div class="shin-app"><header class="shin-topbar"><button class="shin-icon" onclick="location.href='../../index.html'">🏠</button><div class="shin-currency">3. 도축정형</div><div class="shin-currency">Fruit Slice</div><button class="shin-icon" onclick="start()">▶</button></header><section class="shin-panel"><div class="hud"><div class="box">정형 <span id="score">0</span>/25</div><div class="box">콤보 <span id="combo">0</span></div><div class="box">시간 <span id="time">30</span></div></div><div class="area" id="area"></div><p class="center strong">날아오는 고기를 터치/클릭해서 정형하세요.</p></section></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>var sc=0,co=0,t=30,timer=null,spawner=null;function start(){sc=0;co=0;t=30;area.innerHTML='';draw();clearInterval(timer);clearInterval(spawner);timer=setInterval(function(){t--;draw();if(t<=0)finish()},1000);spawner=setInterval(spawn,550)}function draw(){score.textContent=sc;combo.textContent=co;time.textContent=t}function spawn(){var e=document.createElement('div');e.className='meat';e.textContent=['🥩','🍖','🥓'][Math.random()*3|0];var x=Math.random()*85,y=15+Math.random()*70;e.style.left=x+'%';e.style.top=y+'%';e.onclick=function(){sc++;co++;e.remove();draw();if(sc>=25)finish()};area.appendChild(e);setTimeout(function(){if(e.parentNode){e.remove();co=0;draw()}},1600)}function finish(){clearInterval(timer);clearInterval(spawner);ShinResult.complete('butcher',sc>=25&&co>=8?3:sc>=20?2:1)}start();</script></body></html>
