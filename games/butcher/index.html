<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>도축정형 v2 게임우선</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,'Noto Sans KR',sans-serif;color:#fff}#game{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 18%,#fff3c9 0,#ffbd55 52%,#814314 100%)}#game.theme-pig{background:radial-gradient(circle at 50% 18%,#ffe4ef 0,#ff95bb 52%,#9e3350 100%)}#game.theme-cow{background:radial-gradient(circle at 50% 18%,#f0ffe4 0,#87cf67 52%,#255720 100%)}#game.theme-boss{background:radial-gradient(circle at 50% 18%,#c4a4ff 0,#5b2fb8 52%,#12051f 100%)}#game.fever{filter:saturate(1.35) brightness(1.08)}#arena{position:absolute;inset:0;overflow:hidden;touch-action:none;cursor:crosshair}.nav{position:absolute;left:8px;right:8px;top:6px;z-index:30;display:flex;gap:7px;align-items:center}.icon{width:38px;height:38px;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-size:20px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stagePill{flex:1;height:38px;display:flex;align-items:center;justify-content:center;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.selectMini{position:absolute;right:8px;top:50px;z-index:30;width:130px;height:31px;border:2px solid #4b2d1c;border-radius:12px;background:#fff8e8;color:#3a2418;font-size:13px;font-weight:1000}.hud{position:absolute;left:8px;top:50px;z-index:30;display:flex;gap:4px;flex-wrap:wrap;max-width:calc(100% - 150px)}.chip{min-width:49px;padding:4px 6px;background:#fff8e8;color:#3a2418;border:2px solid #4b2d1c;border-radius:12px;font-weight:1000;text-align:center;font-size:12px;box-shadow:0 2px 0 #0003}.chip b{font-size:16px;display:block;line-height:1}.orders{position:absolute;left:8px;right:8px;top:86px;z-index:29;display:flex;gap:5px;align-items:center;pointer-events:none}.orderLabel{background:#4b2d1ccc;border:2px solid #fff8;border-radius:12px;padding:5px 7px;font-weight:1000;font-size:12px}.tag{background:#fff8e8;color:#3a2418;border:2px solid #4b2d1c;border-radius:13px;padding:5px 8px;font-weight:1000;font-size:13px;box-shadow:0 2px 0 #0003}.tag.done{background:#d9ffd5;color:#167a26;text-decoration:line-through}.floor{position:absolute;left:0;right:0;bottom:0;height:22%;background:linear-gradient(#9c5b27,#4b2410);border-top:6px solid #3a1d0d;z-index:0;opacity:.9}.meat{position:absolute;width:74px;height:58px;border:4px solid #4b2d1c;border-radius:40% 45% 38% 43%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:1000;box-shadow:0 6px 0 #0003;transform-origin:center;will-change:transform;z-index:3}.meat.cut{animation:cut .18s ease forwards}@keyframes cut{to{transform:translate(-50%,-50%) scale(1.45) rotate(25deg);opacity:0}}.chickenA{background:linear-gradient(#fff6e8,#ffd1b0)}.chickenB{background:linear-gradient(#ffcf8a,#f38637);border-radius:50% 45% 55% 35%}.chickenC{background:linear-gradient(#ffe1ef,#ff99c4);width:82px;height:46px}.pigA{background:linear-gradient(#ffd4df,#ff7fa6)}.pigB{background:linear-gradient(#ffc1aa,#f06e5a)}.pigC{background:linear-gradient(#ffe0bd,#c87543)}.cowA{background:linear-gradient(#ffd7bd,#b75b3e)}.cowB{background:linear-gradient(#ffe9c8,#d98954)}.cowC{background:linear-gradient(#fff4da,#cc7a44)}.cowD{background:linear-gradient(#ffe0e0,#b94b4b)}.gold{background:linear-gradient(#fff6a8,#ffc400);box-shadow:0 0 18px #fff35a,0 6px 0 #0003}.bad{background:linear-gradient(#a8d76c,#5aa832);color:#213f14}.trap{background:linear-gradient(#6f6f6f,#252525);color:#fff;border-radius:50%;width:64px;height:64px}.sliceLine{position:absolute;height:8px;background:#fff;border-radius:999px;box-shadow:0 0 18px #fff,0 0 26px #ffe45c;transform-origin:left center;z-index:20;pointer-events:none}.spark{position:absolute;width:26px;height:26px;border-radius:50%;background:radial-gradient(#fff,#ffd54a 45%,transparent 70%);z-index:22;pointer-events:none;animation:spark .32s ease forwards}@keyframes spark{to{transform:scale(2.4);opacity:0}}.floatText{position:absolute;z-index:30;font-weight:1000;font-size:28px;text-shadow:0 3px 0 #0004;animation:float .7s ease-out forwards;pointer-events:none}@keyframes float{to{opacity:0;transform:translateY(-55px) scale(1.25)}}.bottom{position:absolute;left:12px;right:12px;bottom:8px;z-index:30}.barWrap{height:18px;background:#4b2d1c;border-radius:999px;padding:3px;box-shadow:0 4px 0 #0003}.bar{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#ffd54a,#ff7a2f)}.hint{text-align:center;color:#fff;font-weight:1000;text-shadow:0 2px #000;font-size:12px;margin-top:4px}.feverText{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:40;font-size:54px;font-weight:1000;color:#fff;text-shadow:0 5px 0 #a64d00,0 0 24px #ffd54a;pointer-events:none;animation:pulse .35s infinite alternate}#game.fever .feverText{display:flex}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}.shake{animation:shake .22s linear 2}@keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}.centerOverlay{position:absolute;inset:0;z-index:50;background:#0009;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}.card{background:#fff8ee;border:5px solid #4b2d1c;border-radius:28px;padding:22px 16px;box-shadow:0 9px 0 #0004;max-width:360px;width:100%;color:#3a2418}h1{margin:0 0 8px;font-size:30px}.sub{font-weight:800;color:#8b3f19;margin-bottom:12px;line-height:1.45}.btn{display:block;width:100%;border:4px solid #4b2d1c;border-radius:20px;background:linear-gradient(#ffcf62,#ff8a2d);padding:12px;font-size:20px;font-weight:1000;color:#3a2418;box-shadow:0 6px 0 #0004;margin-top:8px}.btn.blue{background:linear-gradient(#59bdff,#2575e8);color:#fff}.stars{font-size:44px;color:#ffca28;text-shadow:0 4px 0 #8b5a00}@media(max-height:700px){.selectMini{top:46px;height:28px}.hud{top:46px}.orders{top:78px}.chip{font-size:10px;padding:3px 5px}.chip b{font-size:14px}.tag{font-size:12px;padding:4px 6px}.hint{display:none}.bottom{bottom:5px}.barWrap{height:15px}.meat{width:66px;height:50px;font-size:25px}.trap{width:58px;height:58px}}</style></head><body><div id="game" class="theme-chicken"><div id="arena"></div><div class="floor"></div><div class="nav"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="stagePill">3스테이지 · 도축정형</div><button class="icon" id="quickStart">▶</button></div><select id="stage" class="selectMini"><option value="chicken">🐔 계육</option><option value="pig">🐷 돈육</option><option value="cow">🐮 우육</option><option value="boss">👑 최종</option></select><div class="hud"><div class="chip">🎯<b id="goal">20</b></div><div class="chip">✅<b id="done">0</b></div><div class="chip">❌<b id="miss">0</b></div><div class="chip">🔥<b id="combo">0</b></div><div class="chip">⭐<b id="score">0</b></div></div><div class="orders"><div class="orderLabel">📋 주문</div><div id="orderItems" class="ordersList" style="display:flex;gap:5px"></div></div><div id="feverText" class="feverText">FEVER!</div><div class="bottom"><div class="barWrap"><div id="feverBar" class="bar"></div></div><div class="hint">화면 전체를 스와이프해서 필요한 부위만 정형</div></div><div id="overlay" class="centerOverlay"><div class="card"><h1>도축정형</h1><div class="sub">플레이 화면을 넓힌 v2 레이아웃<br>주문 아이콘만 보고 빠르게 스와이프하세요.</div><button id="startBtn" class="btn">게임 시작</button><button class="btn blue" onclick="location.href='../../index.html'">월드맵</button></div></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>(()=>{const $=id=>document.getElementById(id);const game=$('game'),arena=$('arena'),overlay=$('overlay'),startBtn=$('startBtn'),stageSel=$('stage'),quick=$('quickStart');const scoreEl=$('score'),comboEl=$('combo'),missEl=$('miss'),doneEl=$('done'),goalEl=$('goal'),feverBar=$('feverBar'),orderItemsEl=$('orderItems');const CONFIG={chicken:{theme:'theme-chicken',goal:20,spawn:760,speed:.92,orders:['chickenA','chickenB'],types:['chickenA','chickenB','chickenC','gold','bad'],max:8,trapRate:0},pig:{theme:'theme-pig',goal:24,spawn:620,speed:1.07,orders:['pigA','pigB','pigC'],types:['pigA','pigB','pigC','gold','bad','trap'],max:10,trapRate:.10},cow:{theme:'theme-cow',goal:28,spawn:520,speed:1.25,orders:['cowA','cowB','cowC','cowD'],types:['cowA','cowB','cowC','cowD','gold','bad','trap'],max:12,trapRate:.16},boss:{theme:'theme-boss',goal:34,spawn:420,speed:1.48,orders:['chickenA','pigA','cowA','cowB','cowD'],types:['chickenA','chickenB','pigA','pigB','cowA','cowB','cowC','cowD','gold','bad','trap'],max:14,trapRate:.22}};const TYPES={chickenA:{label:'닭가슴',icon:'🍗',cls:'chickenA',points:100},chickenB:{label:'닭다리',icon:'🍖',cls:'chickenB',points:120},chickenC:{label:'닭안심',icon:'🥩',cls:'chickenC',points:130},pigA:{label:'돈후지',icon:'🥓',cls:'pigA',points:130},pigB:{label:'돈등심',icon:'🍖',cls:'pigB',points:140},pigC:{label:'삼겹',icon:'🥩',cls:'pigC',points:150},cowA:{label:'한우정육',icon:'🥩',cls:'cowA',points:150},cowB:{label:'우갈비',icon:'🍖',cls:'cowB',points:160},cowC:{label:'우둔',icon:'🥓',cls:'cowC',points:150},cowD:{label:'특수부위',icon:'🍖',cls:'cowD',points:180},gold:{label:'황금부위',icon:'✨',cls:'gold',points:420,special:true},bad:{label:'로스부위',icon:'⚠️',cls:'bad',points:-180,bad:true},trap:{label:'주의품',icon:'⛔',cls:'trap',trap:true}};let cfg,running=false,meats=[],score=0,combo=0,maxCombo=0,miss=0,done=0,fever=0,feverMode=false,last=0,spawnAcc=0,pointerActive=false,trail=[],sliced=0,good=0,bad=0,startAt=0,ended=false;function setStage(){cfg=CONFIG[stageSel.value];game.className=cfg.theme;goalEl.textContent=cfg.goal;renderOrders()}stageSel.onchange=()=>{setStage();if(running)startGame()};setStage();function renderOrders(){orderItemsEl.innerHTML='';cfg.orders.forEach(k=>{const t=TYPES[k],el=document.createElement('div');el.className='tag';el.id='order-'+k;el.textContent=t.icon+' '+t.label;orderItemsEl.appendChild(el)})}function reset(){meats.forEach(m=>m.el.remove());meats=[];score=0;combo=0;maxCombo=0;miss=0;done=0;fever=0;feverMode=false;last=0;spawnAcc=0;trail=[];sliced=0;good=0;bad=0;ended=false;startAt=Date.now();game.classList.remove('fever');updateHud();renderOrders()}function startGame(){reset();running=true;overlay.style.display='none';for(let i=0;i<3;i++)setTimeout(spawnMeat,i*180);requestAnimationFrame(loop)}startBtn.onclick=startGame;quick.onclick=startGame;function updateHud(){scoreEl.textContent=Math.max(0,Math.round(score));comboEl.textContent=combo;missEl.textContent=miss;doneEl.textContent=done;feverBar.style.width=Math.min(100,fever)+'%';cfg.orders.forEach(k=>{const el=$('order-'+k);if(el)el.classList.toggle('done',done>=Math.ceil(cfg.goal*(cfg.orders.indexOf(k)+1)/cfg.orders.length))})}function chooseType(){if(Math.random()<cfg.trapRate)return 'trap';let pool=cfg.types.slice();if(Math.random()<.74)pool=pool.concat(cfg.orders,cfg.orders,cfg.orders);return pool[Math.floor(Math.random()*pool.length)]}function spawnMeat(){if(!running||meats.length>=cfg.max)return;const W=arena.clientWidth,H=arena.clientHeight,side=Math.floor(Math.random()*5);let x,y,vx,vy;if(side===0){x=-90;y=H*(.25+Math.random()*.55);vx=3.6+Math.random()*2.3;vy=-4-Math.random()*3.4}else if(side===1){x=W+90;y=H*(.25+Math.random()*.55);vx=-3.6-Math.random()*2.3;vy=-4-Math.random()*3.4}else if(side===2){x=W*(.12+Math.random()*.76);y=H+90;vx=(Math.random()-.5)*4.5;vy=-7.2-Math.random()*4.5}else if(side===3){x=W*(.12+Math.random()*.76);y=-90;vx=(Math.random()-.5)*4.5;vy=5.2+Math.random()*3.2}else{x=Math.random()<.5?-90:W+90;y=H*(.18+Math.random()*.42);vx=(x<0?1:-1)*(5+Math.random()*3);vy=-1.2-Math.random()*3.2}vx*=cfg.speed;vy*=cfg.speed;if(feverMode){vx*=1.08;vy*=1.08}const key=chooseType(),type=TYPES[key],el=document.createElement('div');el.className='meat '+type.cls;el.textContent=type.icon;arena.appendChild(el);meats.push({key,type,el,x,y,vx,vy,rot:Math.random()*360,vr:(Math.random()-.5)*14,hit:false})}function loop(ts){if(!running)return;if(!last)last=ts;const dt=Math.min((ts-last)/16.7,2);last=ts;spawnAcc+=dt*16.7;if(spawnAcc>=cfg.spawn*(feverMode?.72:1)){spawnMeat();spawnAcc=0}meats.forEach(m=>{m.vy+=0.18*dt;m.x+=m.vx*dt;m.y+=m.vy*dt;m.rot+=m.vr*dt;m.el.style.transform='translate(-50%,-50%) rotate('+m.rot+'deg)';m.el.style.left=m.x+'px';m.el.style.top=m.y+'px'});const W=arena.clientWidth,H=arena.clientHeight;meats=meats.filter(m=>{const out=m.y>H+130||m.x<-150||m.x>W+150||m.y<-150;if(out){m.el.remove();return false}return true});updateHud();requestAnimationFrame(loop)}function sliceLine(a,b){const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy);if(len<6)return;const line=document.createElement('div');line.className='sliceLine';line.style.left=a.x+'px';line.style.top=a.y+'px';line.style.width=len+'px';line.style.transform='rotate('+Math.atan2(dy,dx)+'rad)';arena.appendChild(line);setTimeout(()=>line.remove(),120)}function spark(x,y){const el=document.createElement('div');el.className='spark';el.style.left=(x-13)+'px';el.style.top=(y-13)+'px';arena.appendChild(el);setTimeout(()=>el.remove(),320)}function distToSegment(p,a,b){const vx=b.x-a.x,vy=b.y-a.y,wx=p.x-a.x,wy=p.y-a.y,c1=vx*wx+vy*wy,c2=vx*vx+vy*vy,t=Math.max(0,Math.min(1,c1/(c2||1)));return Math.hypot(p.x-(a.x+t*vx),p.y-(a.y+t*vy))}function trySlice(a,b){const sp=Math.hypot(b.x-a.x,b.y-a.y);if(sp<7)return;sliceLine(a,b);let hits=0;meats.slice().forEach(m=>{if(m.hit)return;const r=m.el.getBoundingClientRect(),ar=arena.getBoundingClientRect(),center={x:r.left-ar.left+r.width/2,y:r.top-ar.top+r.height/2},radius=Math.max(r.width,r.height)*.56;if(distToSegment(center,a,b)<=radius){m.hit=true;hits++;handleHit(m,center)}});if(hits>1)float('MULTI x'+hits,b.x,b.y,'#ffd54a')}function handleHit(m,pos){m.el.classList.add('cut');setTimeout(()=>m.el.remove(),160);meats=meats.filter(x=>x!==m);sliced++;spark(pos.x,pos.y);if(navigator.vibrate)navigator.vibrate(18);if(m.type.trap){bad++;combo=0;miss+=2;fever=Math.max(0,fever-35);shake();float('주의!',pos.x,pos.y,'#ff5b5b');if(miss>=5)finish();return}if(m.type.bad){bad++;combo=0;miss++;score=Math.max(0,score-140);fever=Math.max(0,fever-20);float('LOSS',pos.x,pos.y,'#ff5b5b');if(miss>=5)finish();return}good++;combo++;maxCombo=Math.max(maxCombo,combo);let point=m.type.points+(combo*10);if(feverMode)point*=2;if(m.type.special){point+=250;fever=Math.min(100,fever+25)}score+=point;done++;fever=Math.min(100,fever+9+(combo>=6?5:0));float(combo>=12?'CRITICAL!':combo>=8?'EXCELLENT!':'SLICE!',pos.x,pos.y,combo>=8?'#ffd54a':'#fff');if(fever>=100&&!feverMode)activateFever();if(done>=cfg.goal)finish()}function activateFever(){feverMode=true;game.classList.add('fever');float('FEVER x2!',arena.clientWidth/2,arena.clientHeight*.46,'#ffd54a');setTimeout(()=>{feverMode=false;fever=0;game.classList.remove('fever')},3200)}function float(txt,x,y,color){const el=document.createElement('div');el.className='floatText';el.textContent=txt;el.style.left=x+'px';el.style.top=y+'px';el.style.color=color||'#fff';arena.appendChild(el);setTimeout(()=>el.remove(),700)}function shake(){game.classList.remove('shake');void game.offsetWidth;game.classList.add('shake')}function pointFrom(e){const r=arena.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top,t:performance.now()}}function down(e){if(!running)return;pointerActive=true;trail=[pointFrom(e)]}function move(e){if(!pointerActive||!running)return;e.preventDefault();const p=pointFrom(e),prev=trail[trail.length-1];if(prev)trySlice(prev,p);trail.push(p);if(trail.length>8)trail.shift()}function up(){pointerActive=false;trail=[]}arena.addEventListener('pointerdown',down);arena.addEventListener('pointermove',move);window.addEventListener('pointerup',up);arena.addEventListener('touchstart',down,{passive:false});arena.addEventListener('touchmove',move,{passive:false});window.addEventListener('touchend',up);function finish(){if(ended)return;ended=true;running=false;const elapsed=Math.max(1,Math.round((Date.now()-startAt)/1000)),accuracy=sliced?Math.round(good/sliced*100):0;let stars=1;if(miss===0&&maxCombo>=12&&accuracy>=90)stars=3;else if(miss<=2&&accuracy>=75)stars=2;showResult(stars,elapsed,accuracy)}function showResult(stars,elapsed,accuracy){try{clearStage('butcher',stars)}catch(e){}const next=typeof nextStageOf==='function'?nextStageOf('butcher'):null;overlay.innerHTML='<div class="card"><h1>도축정형 완료</h1><div class="stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div><div class="sub">점수 '+Math.round(score).toLocaleString()+'점<br>최고 콤보 '+maxCombo+'<br>정확도 '+accuracy+'% · 로스 '+miss+'<br>소요 '+elapsed+'초</div><button class="btn" id="nextBtn">'+(next?'다음 스테이지':'월드맵')+'</button><button class="btn blue" id="mapBtn">월드맵</button><button class="btn" id="retryBtn">다시 정형</button></div>';overlay.style.display='flex';document.getElementById('mapBtn').onclick=()=>location.href='../../index.html';document.getElementById('retryBtn').onclick=startGame;document.getElementById('nextBtn').onclick=()=>{if(next)location.href='../../'+next.url.replace('./','')+'?stage='+next.id;else location.href='../../index.html'}}})();</script></body></html>
