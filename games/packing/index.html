<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>출하패킹 v2.3</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,'Noto Sans KR',sans-serif}#app{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:linear-gradient(#85ddff 0 32%,#ffe99f 32% 75%,#6c3518 75%);color:#3b2413}.top{position:absolute;left:8px;right:8px;top:6px;z-index:40;display:flex;gap:7px;align-items:center}.icon{width:38px!important;height:38px!important;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;font-size:20px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stagePill{flex:1;height:38px;display:flex;align-items:center;justify-content:center;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stageSelect{position:absolute;right:8px;top:50px;z-index:40;width:128px;height:31px;border:2px solid #4b2d1c;border-radius:12px;background:#fff8e8;font-size:13px;font-weight:1000}.hud{position:absolute;left:8px;right:144px;top:50px;z-index:40;display:grid!important;grid-template-columns:repeat(5,1fr)!important;gap:3px!important}.chip{min-width:0!important;padding:3px 2px!important;background:#fff8e8;border:2px solid #4b2d1c;border-radius:10px;font-weight:1000;text-align:center;font-size:10px;box-shadow:0 2px 0 #0003}.chip b{font-size:13px;display:block;line-height:1}.shipBar{position:absolute;left:8px;right:8px;top:84px;height:12px;background:#4b2d1c;border-radius:999px;padding:3px;z-index:39}.shipFill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#38c172,#ffd54a)}.nextLine{position:absolute;left:8px!important;right:8px!important;top:99px!important;width:auto!important;z-index:39;display:flex;justify-content:space-between;align-items:center;gap:4px}.nextBox,.mission{background:#fff8e8;border:2px solid #4b2d1c;border-radius:10px;padding:3px 6px;font-weight:1000;font-size:12px;box-shadow:0 2px 0 #0003;white-space:nowrap}.mission{display:none;color:#6b3d1d}.yard{position:absolute!important;left:8px;right:8px;top:124px!important;bottom:80px!important;height:auto!important;background:linear-gradient(#b8ecff,#e6f5ff 52%,#d5ecff 52%);border:5px solid #4b2d1c;border-radius:20px;overflow:hidden;box-shadow:inset 0 0 0 5px #ffffff55}.yard:before{content:"물류센터";position:absolute;left:10px;top:7px;background:#fff8e8;border:2px solid #4b2d1c;border-radius:10px;padding:2px 7px;font-weight:1000;font-size:11px;z-index:2}.cargo{position:absolute;left:8%;right:8%;top:32px;bottom:46px;background:#e9f8ff;border:4px solid #4b2d1c;border-radius:14px;overflow:hidden;box-shadow:0 5px 0 #0002,inset 0 0 0 4px #ffffff88}.grid{position:absolute;left:8px;right:8px;top:8px;bottom:8px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(8,1fr);gap:3px}.cell{background:#fff;border:2px solid #8a6a40;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}.pkg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:22px;border:2px solid #7a4b20;box-shadow:inset 0 -5px #8b541c;color:#fff;text-shadow:0 2px #4a2a14}.chicken{background:linear-gradient(#ffd465,#d98b21)}.pig{background:linear-gradient(#ff99b9,#d8567e)}.cow{background:linear-gradient(#c58b55,#7b4a2b)}.freeze{background:linear-gradient(#8ee7ff,#3aa4d8)}.ob{background:#4c4036;color:#fff}.fall{position:absolute;top:8px;width:54px;height:42px;text-align:center;z-index:5;transition:left .08s}.fall .pkg{height:42px;width:54px}.fall.drop{animation:dropAnim linear forwards}@keyframes dropAnim{from{top:8px}to{top:var(--endTop,200px)}}.dock{position:absolute;left:0;right:0;bottom:0;height:46px;background:linear-gradient(#9a6a37,#6b3d1d);border-top:4px solid #4b2d1c}.base{position:absolute;left:7%;right:7%;bottom:0;height:41px;background:linear-gradient(#ffca32,#ff9900);border:4px solid #4b2d1c;border-radius:0 0 18px 18px;text-align:center;font-size:20px;font-weight:900;line-height:32px;z-index:1}.controls{position:absolute!important;left:8px;right:8px;bottom:max(6px,env(safe-area-inset-bottom))!important;z-index:40;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.btn{height:62px!important;border:0;border-radius:20px;background:linear-gradient(#59bdff,#2575e8);color:#fff;font-size:32px;font-weight:900;box-shadow:0 6px 0 #0d4b99}.trash{background:linear-gradient(#ff8c7a,#e64335);font-size:18px!important;box-shadow:0 6px 0 #9b2419}.msg{display:none!important}.overlay{position:absolute;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:60;padding:16px}.result{background:#fff;border:5px solid #4b2d1c;border-radius:22px;padding:14px;text-align:center;width:100%;box-shadow:0 8px 0 #9a5b17}.stars{font-size:40px;color:#ffca28;text-shadow:0 4px #805000}.start{width:100%;height:40px;margin-top:5px;border:0;border-radius:15px;background:linear-gradient(#ffbd37,#ff8b00);color:#fff;font-size:18px;font-weight:900;box-shadow:0 5px 0 #9b4f00}.fx{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);font-size:31px;font-weight:1000;color:#fff;text-shadow:0 5px #5b2a00,0 0 12px #fff;opacity:0;z-index:50;pointer-events:none}.fx.show{animation:pop .75s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-10%) scale(.6)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}@media(max-height:700px){.stageSelect{top:46px;height:28px}.hud{top:46px}.shipBar{top:78px}.nextLine{top:93px!important}.yard{top:116px!important;bottom:72px!important}.btn{height:56px!important}.pkg{font-size:20px}.chip b{font-size:12px}.nextBox,.mission{font-size:11px;padding:2px 5px}}</style></head><body><div id="app"><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="stagePill">4스테이지 · 출하패킹</div><button class="icon" onclick="startGame()">▶</button></div><select id="stage" class="stageSelect"><option value="chicken">🐔 계육</option><option value="pig">🐷 돈육</option><option value="cow">🐮 우육</option><option value="final">👑 최종</option></select><div class="hud"><div class="chip">🚚<b id="goal">0/10</b></div><div class="chip">🗑️<b id="trash">10</b></div><div class="chip">⭐<b id="score">0</b></div><div class="chip">🔥<b id="combo">0</b></div><div class="chip">열<b id="col">1</b></div></div><div class="shipBar"><div class="shipFill" id="shipFill"></div></div><div class="nextLine"><div class="nextBox">NEXT <span id="next">-</span></div><div class="mission" id="mission">특송 2×2 +2</div></div><div class="yard" id="yard"><div class="fall" id="fall"></div><div class="cargo" id="cargo"><div class="grid" id="grid"></div></div><div class="dock"></div><div class="base" id="truckBase">🚚 냉장 물류차</div></div><div class="controls"><button class="btn" id="left">◀</button><button class="btn trash" id="drop">폐기</button><button class="btn" id="right">▶</button></div><div class="fx" id="fx">🚚 출차!</div></div><div class="overlay" id="overlay"><div class="result"><h2>출하패킹</h2><div class="stars">☆☆☆</div><p>같은 박스 3개를 연결해 출차하세요.</p><button class="start" onclick="startGame()">시작</button><button class="start" onclick="location.href='../../index.html'">월드맵</button></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id),W=4,H=8;const icon={chicken:['🐔','chicken'],pig:['🐷','pig'],cow:['🐮','cow'],freeze:['📦','freeze']};const cfgs={chicken:{types:['chicken','pig'],goal:10,trash:10,obs:0,mission:false,drop:3000},pig:{types:['chicken','pig','cow'],goal:15,trash:10,obs:1,mission:false,drop:2800},cow:{types:['chicken','pig','cow'],goal:20,trash:9,obs:2,mission:true,drop:2600},final:{types:['chicken','pig','cow','freeze'],goal:30,trash:8,obs:3,mission:true,drop:2400}};let cfg,g,c=1,cur,nq=[],sent=0,tr=10,sc=0,co=0,run=false,tick=null,perfect=true;function setStage(){cfg=cfgs[stage.value];mission.style.display=cfg.mission?'block':'none'}stage.onchange=()=>startGame();function empty(){g=Array.from({length:H},()=>Array(W).fill(null));let made=0,tries=0;while(made<cfg.obs&&tries<100){tries++;let x=Math.floor(Math.random()*W),y=Math.floor(Math.random()*(H-2));if(g[y][x])continue;g[y][x]='ob';made++}}function pick(){return cfg.types[Math.random()*cfg.types.length|0]}function landRow(){for(let y=H-1;y>=0;y--)if(!g[y][c])return y;return -1}function positionFall(){let cr=cargo.getBoundingClientRect(),gr=grid.getBoundingClientRect(),yr=yard.getBoundingClientRect();let cellW=gr.width/W,cellH=gr.height/H,row=landRow();let left=(gr.left-yr.left)+cellW*c+cellW/2-27;let top=row<0?(gr.top-yr.top):(gr.top-yr.top)+cellH*row+cellH/2-21;fall.style.left=left+'px';fall.style.setProperty('--endTop',Math.max(8,top)+'px')}function restartFall(){fall.classList.remove('drop');void fall.offsetWidth;positionFall();fall.style.animationDuration=cfg.drop+'ms';fall.classList.add('drop')}function startGame(){clearInterval(tick);setStage();empty();c=1;sent=0;tr=cfg.trash;sc=0;co=0;perfect=true;run=true;nq=[pick(),pick(),pick()];cur=nq.shift();nq.push(pick());overlay.style.display='none';draw();restartFall();tick=setInterval(place,cfg.drop)}function html(t){return '<div class="pkg '+icon[t][1]+'">'+icon[t][0]+'</div>'}function draw(){grid.innerHTML='';for(let y=0;y<H;y++)for(let x=0;x<W;x++){let d=document.createElement('div');d.className='cell';let v=g[y][x];if(v==='ob'){d.classList.add('ob');d.textContent='■'}else if(v)d.innerHTML=html(v);grid.appendChild(d)}fall.innerHTML=html(cur);goal.textContent=sent+'/'+cfg.goal;trash.textContent=tr;next.textContent=nq.map(t=>icon[t][0]).join(' ');score.textContent=sc;combo.textContent=co;col.textContent=c+1;shipFill.style.width=Math.min(100,sent/cfg.goal*100)+'%';positionFall()}function move(d){if(!run)return;c=Math.max(0,Math.min(W-1,c+d));draw();restartFall()}function place(){if(!run)return;fall.classList.remove('drop');let y=landRow();if(y<0){finish(false);return}g[y][c]=cur;cur=nq.shift();nq.push(pick());resolve();draw();if(sent>=cfg.goal)finish(true);else restartFall()}function discard(){if(!run||tr<=0)return;tr--;perfect=false;cur=nq.shift();nq.push(pick());draw();restartFall()}function resolve(){let chain=0;while(true){let rm=findMatches(),m=cfg.mission?findMission():[];m.forEach(k=>rm.add(k));if(!rm.size)break;chain++;let n=rm.size;rm.forEach(k=>{let a=k.split(',').map(Number);g[a[1]][a[0]]=null});gravity();let add=n>=5?3:n>=4?2:1;if(m.length)add+=2;sent+=add;sc+=100*add+(chain>1?200*chain:0)+(m.length?300:0);co=chain;fx((m.length?'특송 ':'')+'🚚 +'+add+(chain>1?' x'+chain:''))}if(!chain)co=0}function findMatches(){let rm=new Set();for(let y=0;y<H;y++)for(let x=0;x<W;x++){let v=g[y][x];if(!v||v==='ob')continue;let r=[];for(let xx=x;xx<W&&g[y][xx]===v;xx++)r.push(xx+','+y);if(r.length>=3)r.forEach(k=>rm.add(k));r=[];for(let yy=y;yy<H&&g[yy][x]===v;yy++)r.push(x+','+yy);if(r.length>=3)r.forEach(k=>rm.add(k))}return rm}function findMission(){let out=[];for(let y=0;y<H-1;y++)for(let x=0;x<W-1;x++){let v=g[y][x];if(v&&v!=='ob'&&g[y][x+1]===v&&g[y+1][x]===v&&g[y+1][x+1]===v)out=[x+','+y,(x+1)+','+y,x+','+(y+1),(x+1)+','+(y+1)]}return out}function gravity(){for(let x=0;x<W;x++){let arr=[];for(let y=H-1;y>=0;y--)if(g[y][x]&&g[y][x]!=='ob')arr.push(g[y][x]);for(let y=H-1;y>=0;y--){if(g[y][x]==='ob')continue;g[y][x]=arr.shift()||null}}}function fx(t){let e=$('fx');e.textContent=t;e.classList.remove('show');void e.offsetWidth;e.classList.add('show');if(navigator.vibrate)navigator.vibrate(18)}function finish(clear){if(!run)return;run=false;clearInterval(tick);fall.classList.remove('drop');let stars=clear?(perfect?3:tr>=Math.ceil(cfg.trash*.5)?2:1):1;if(clear)try{clearStage('packing',stars)}catch(e){}let n=typeof nextStageOf==='function'?nextStageOf('packing'):null;overlay.innerHTML='<div class="result"><h2>'+(clear?'출하 완료':'적재 실패')+'</h2><div class="stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div><p>출차 '+sent+'/'+cfg.goal+'대 · 점수 '+sc+'점<br>폐기 '+tr+'/'+cfg.trash+'</p><button class="start" id="nextBtn">'+(n?'다음 스테이지':'월드맵')+'</button><button class="start" id="mapBtn">월드맵</button><button class="start" onclick="startGame()">다시 패킹</button></div>';overlay.style.display='flex';mapBtn.onclick=()=>location.href='../../index.html';nextBtn.onclick=()=>{if(n)location.href='../../'+n.url.replace('./','')+'?stage='+n.id;else location.href='../../index.html'}}left.onclick=()=>move(-1);right.onclick=()=>move(1);drop.onclick=discard;window.onresize=()=>draw();window.onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')move(-1);if(e.key==='ArrowRight'||e.key==='d')move(1);if(e.key===' '||e.key==='ArrowDown')place();if(e.key==='q')discard()};startGame();</script></body></html>
