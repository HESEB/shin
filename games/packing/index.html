<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>출하패킹 v2 게임우선</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,'Noto Sans KR',sans-serif;color:#3b2413}#app{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:linear-gradient(#8bdfff 0 36%,#ffe8a4 36% 72%,#7b4a25 72%)}.top{position:absolute;left:8px;right:8px;top:6px;z-index:30;display:flex;gap:7px;align-items:center}.icon{width:38px;height:38px;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-size:20px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stagePill{flex:1;height:38px;display:flex;align-items:center;justify-content:center;border:3px solid #4b2d1c;border-radius:13px;background:#fff8e8;color:#4a2a14;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.stageSelect{position:absolute;right:8px;top:50px;z-index:30;width:128px;height:31px;border:2px solid #4b2d1c;border-radius:12px;background:#fff8e8;color:#3a2418;font-size:13px;font-weight:1000}.hud{position:absolute;left:8px;right:142px;top:50px;z-index:30;display:flex;gap:4px;flex-wrap:wrap}.chip{min-width:52px;padding:4px 6px;background:#fff8e8;color:#3a2418;border:2px solid #4b2d1c;border-radius:12px;font-weight:1000;text-align:center;font-size:11px;box-shadow:0 2px 0 #0003}.chip b{font-size:15px;display:block;line-height:1}.shipBar{position:absolute;left:8px;right:8px;top:85px;height:13px;background:#4b2d1c;border-radius:999px;padding:3px;z-index:30}.shipFill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#38c172,#ffd54a)}.nextLine{position:absolute;left:8px;right:8px;top:103px;z-index:30;display:flex;gap:6px;align-items:center}.nextBox{background:#fff8e8;border:2px solid #4b2d1c;border-radius:12px;padding:4px 8px;font-weight:1000;font-size:13px;box-shadow:0 2px 0 #0003}.mission{display:none;background:#fff8e8;border:2px solid #4b2d1c;border-radius:12px;padding:4px 8px;font-weight:1000;font-size:12px;color:#6b3d1d}.yard{position:absolute;left:8px;right:8px;top:132px;bottom:92px;background:linear-gradient(#b8ecff,#e6f5ff 50%,#d5ecff 50%);border:5px solid #4b2d1c;border-radius:22px;overflow:hidden;box-shadow:inset 0 0 0 5px #ffffff55}.yard:before{content:"냉장 물류센터";position:absolute;left:12px;top:8px;background:#fff8e8;border:2px solid #4b2d1c;border-radius:12px;padding:3px 8px;font-weight:1000;font-size:12px;z-index:2}.dock{position:absolute;left:0;right:0;bottom:0;height:50px;background:linear-gradient(#9a6a37,#6b3d1d);border-top:4px solid #4b2d1c;z-index:0}.cargo{position:absolute;left:8%;right:8%;top:34px;bottom:50px;background:#e9f8ff;border:4px solid #4b2d1c;border-radius:16px;overflow:hidden;box-shadow:0 6px 0 #0002,inset 0 0 0 4px #ffffff88}.grid{position:absolute;left:9px;right:9px;top:9px;bottom:9px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(8,1fr);gap:3px}.cell{background:#fff;border:2px solid #8a6a40;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}.pkg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:22px;border:2px solid #7a4b20;box-shadow:inset 0 -5px #8b541c;color:#fff;text-shadow:0 2px #4a2a14}.chicken{background:linear-gradient(#ffd465,#d98b21)}.pig{background:linear-gradient(#ff99b9,#d8567e)}.cow{background:linear-gradient(#c58b55,#7b4a2b)}.freeze{background:linear-gradient(#8ee7ff,#3aa4d8)}.ob{background:#4c4036;color:#fff}.fall{position:absolute;top:8px;width:25%;text-align:center;z-index:4;transition:left .08s}.fall .pkg{height:42px;width:52px;margin:auto}.fall.drop{animation:dropAnim linear forwards}@keyframes dropAnim{from{top:8px}to{top:calc(100% - 96px)}}.base{position:absolute;left:7%;right:7%;bottom:0;height:45px;background:linear-gradient(#ffca32,#ff9900);border:4px solid #4b2d1c;border-radius:0 0 20px 20px;text-align:center;font-size:21px;font-weight:900;line-height:35px;z-index:1}.base:before{content:"";position:absolute;left:20px;bottom:-12px;width:24px;height:24px;background:#222;border:5px solid #fff;border-radius:50%;box-shadow:250px 0 0 -5px #222,250px 0 0 0 #fff}.controls{position:absolute;left:8px;right:8px;bottom:8px;z-index:30;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.btn{height:76px;border:0;border-radius:22px;background:linear-gradient(#59bdff,#2575e8);color:white;font-size:38px;font-weight:900;box-shadow:0 7px 0 #0d4b99}.btn:active{transform:translateY(5px);box-shadow:0 2px 0 #0d4b99}.trash{background:linear-gradient(#ff8c7a,#e64335);font-size:20px;box-shadow:0 7px 0 #9b2419}.msg{position:absolute;left:8px;right:8px;bottom:88px;z-index:30;height:22px;text-align:center;font-size:16px;font-weight:1000;color:#0c8a3d;text-shadow:0 2px #fff}.overlay{position:absolute;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}.result{background:#fff;border:5px solid #4b2d1c;border-radius:24px;padding:18px;text-align:center;width:100%;box-shadow:0 8px 0 #9a5b17}.stars{font-size:42px;color:#ffca28;text-shadow:0 4px #805000}.start{width:100%;height:46px;margin-top:6px;border:0;border-radius:16px;background:linear-gradient(#ffbd37,#ff8b00);color:#fff;font-size:19px;font-weight:900;box-shadow:0 5px 0 #9b4f00}.fx{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);font-size:32px;font-weight:1000;color:#fff;text-shadow:0 5px #5b2a00,0 0 12px #fff;opacity:0;z-index:40;text-align:center;pointer-events:none}.fx.show{animation:pop .75s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-10%) scale(.6)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}.drive{animation:drive .45s ease}@keyframes drive{45%{transform:translateX(16px)}70%{transform:translateX(-8px)}100%{transform:translateX(0)}}@media(max-height:700px){.stageSelect{top:46px;height:28px}.hud{top:46px}.shipBar{top:79px}.nextLine{top:96px}.yard{top:122px;bottom:82px}.controls{bottom:6px}.btn{height:64px;font-size:32px}.trash{font-size:17px}.msg{bottom:74px;font-size:14px}.chip{font-size:10px;padding:3px 5px}.chip b{font-size:14px}.base{height:38px;line-height:29px}.cell{font-size:18px}.pkg{font-size:20px}}</style></head><body><div id="app"><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="stagePill">4스테이지 · 출하패킹</div><button class="icon" onclick="startGame()">▶</button></div><select id="stage" class="stageSelect"><option value="chicken">🐔 계육</option><option value="pig">🐷 돈육</option><option value="cow">🐮 우육</option><option value="final">👑 최종</option></select><div class="hud"><div class="chip">🚚<b id="goal">0/10</b></div><div class="chip">🗑️<b id="trash">10</b></div><div class="chip">⭐<b id="score">0</b></div><div class="chip">🔥<b id="combo">0</b></div><div class="chip">열<b id="col">1</b></div></div><div class="shipBar"><div class="shipFill" id="shipFill"></div></div><div class="nextLine"><div class="nextBox">NEXT <span id="next">-</span></div><div class="mission" id="mission">특송 2×2 +2🚚</div></div><div class="yard" id="yard"><div class="fall" id="fall"></div><div class="cargo"><div class="grid" id="grid"></div></div><div class="dock"></div><div class="base" id="truckBase">🚚 냉장 물류차</div></div><div class="msg" id="msg">좌우 이동으로 위치를 맞추고 폐기로 다음 박스</div><div class="controls"><button class="btn" id="left">◀</button><button class="btn trash" id="drop">폐기</button><button class="btn" id="right">▶</button></div><div class="fx" id="fx">🚚 출차!</div></div><div class="overlay" id="overlay"><div class="result"><h2>출하패킹</h2><div class="stars">☆☆☆</div><p>같은 박스 3개를 연결해 출차하세요.</p><button class="start" onclick="startGame()">시작</button><button class="start" onclick="location.href='../../index.html'">월드맵</button></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id),W=4,H=8;const icon={chicken:['🐔','chicken'],pig:['🐷','pig'],cow:['🐮','cow'],freeze:['📦','freeze']};const cfgs={chicken:{types:['chicken','pig'],goal:10,trash:10,obs:0,mission:false,drop:3000},pig:{types:['chicken','pig','cow'],goal:15,trash:10,obs:1,mission:false,drop:2800},cow:{types:['chicken','pig','cow'],goal:20,trash:9,obs:2,mission:true,drop:2600},final:{types:['chicken','pig','cow','freeze'],goal:30,trash:8,obs:3,mission:true,drop:2400}};let cfg,g,c=1,cur,nq=[],sent=0,tr=10,sc=0,co=0,run=false,tick=null,perfect=true;function setStage(){cfg=cfgs[stage.value];mission.style.display=cfg.mission?'block':'none'}stage.onchange=()=>startGame();function empty(){g=Array.from({length:H},()=>Array(W).fill(null));let made=0,tries=0;while(made<cfg.obs&&tries<80){tries++;let x=Math.floor(Math.random()*W),y=Math.floor(Math.random()*(H-2));if(g[y][x])continue;let near=false;for(let yy=Math.max(0,y-1);yy<=Math.min(H-3,y+1);yy++)for(let xx=Math.max(0,x-1);xx<=Math.min(W-1,x+1);xx++)if(g[yy][xx]==='ob')near=true;if(!near){g[y][x]='ob';made++}}}function pick(){return cfg.types[Math.random()*cfg.types.length|0]}function restartFall(){fall.classList.remove('drop');void fall.offsetWidth;fall.style.animationDuration=cfg.drop+'ms';fall.classList.add('drop')}function startGame(){clearInterval(tick);setStage();empty();c=1;sent=0;tr=cfg.trash;sc=0;co=0;perfect=true;run=true;nq=[pick(),pick(),pick()];cur=nq.shift();nq.push(pick());overlay.style.display='none';draw();restartFall();tick=setInterval(place,cfg.drop)}function html(t){return '<div class="pkg '+icon[t][1]+'">'+icon[t][0]+'</div>'}function draw(){grid.innerHTML='';for(let y=0;y<H;y++)for(let x=0;x<W;x++){let d=document.createElement('div');d.className='cell';let v=g[y][x];if(v==='ob'){d.classList.add('ob');d.textContent='■'}else if(v)d.innerHTML=html(v);grid.appendChild(d)}fall.style.left=(c*25)+'%';fall.innerHTML=html(cur);goal.textContent=sent+'/'+cfg.goal;trash.textContent=tr;next.textContent=nq.map(t=>icon[t][0]).join(' ');score.textContent=sc;combo.textContent=co;col.textContent=c+1;shipFill.style.width=Math.min(100,sent/cfg.goal*100)+'%'}function move(d){if(!run)return;c=Math.max(0,Math.min(W-1,c+d));draw()}function place(){if(!run)return;fall.classList.remove('drop');for(let y=H-1;y>=0;y--){if(!g[y][c]){g[y][c]=cur;cur=nq.shift();nq.push(pick());resolve();draw();if(sent>=cfg.goal)finish(true);else restartFall();return}}finish(false)}function discard(){if(!run||tr<=0)return;tr--;perfect=false;cur=nq.shift();nq.push(pick());draw();restartFall()}function resolve(){let chain=0;while(true){let rm=findMatches(),m=cfg.mission?findMission():[];m.forEach(k=>rm.add(k));if(!rm.size)break;chain++;let n=rm.size;rm.forEach(k=>{let a=k.split(',').map(Number);g[a[1]][a[0]]=null});gravity();let add=n>=5?3:n>=4?2:1;if(m.length)add+=2;sent+=add;sc+=100*add+(chain>1?200*chain:0)+(m.length?300:0);co=chain;fx((m.length?'특송 ':'')+'🚚 +'+add+(chain>1?' x'+chain:''));truckBase.classList.remove('drive');void truckBase.offsetWidth;truckBase.classList.add('drive')}if(!chain)co=0}function findMatches(){let rm=new Set();for(let y=0;y<H;y++)for(let x=0;x<W;x++){let v=g[y][x];if(!v||v==='ob')continue;let r=[];for(let xx=x;xx<W&&g[y][xx]===v;xx++)r.push(xx+','+y);if(r.length>=3)r.forEach(k=>rm.add(k));r=[];for(let yy=y;yy<H&&g[yy][x]===v;yy++)r.push(x+','+yy);if(r.length>=3)r.forEach(k=>rm.add(k))}return rm}function findMission(){let out=[];for(let y=0;y<H-1;y++)for(let x=0;x<W-1;x++){let v=g[y][x];if(v&&v!=='ob'&&g[y][x+1]===v&&g[y+1][x]===v&&g[y+1][x+1]===v)out=[x+','+y,(x+1)+','+y,x+','+(y+1),(x+1)+','+(y+1)]}return out}function gravity(){for(let x=0;x<W;x++){let a=[];for(let y=H-1;y>=0;y--)if(g[y][x]&&g[y][x]!=='ob')a.push(g[y][x]);for(let y=H-1;y>=0;y--){if(g[y][x]==='ob')continue;g[y][x]=a.shift()||null}}}function fx(t){let e=fxEl||$('fx');e.textContent=t;e.classList.remove('show');void e.offsetWidth;e.classList.add('show');msg.textContent=t;if(navigator.vibrate)navigator.vibrate(18)}const fxEl=$('fx');function finish(clear){if(!run)return;run=false;clearInterval(tick);fall.classList.remove('drop');let stars=clear?(perfect?3:tr>=Math.ceil(cfg.trash*.5)?2:1):1;if(clear)try{clearStage('packing',stars)}catch(e){}let n=typeof nextStageOf==='function'?nextStageOf('packing'):null;overlay.innerHTML='<div class="result"><h2>'+(clear?'출하 완료':'적재 실패')+'</h2><div class="stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div><p>출차 '+sent+'/'+cfg.goal+'대 · 점수 '+sc+'점<br>폐기 '+tr+'/'+cfg.trash+'</p><button class="start" id="nextBtn">'+(n?'다음 스테이지':'월드맵')+'</button><button class="start" id="mapBtn">월드맵</button><button class="start" onclick="startGame()">다시 패킹</button></div>';overlay.style.display='flex';mapBtn.onclick=()=>location.href='../../index.html';nextBtn.onclick=()=>{if(n)location.href='../../'+n.url.replace('./','')+'?stage='+n.id;else location.href='../../index.html'}}left.onclick=()=>move(-1);right.onclick=()=>move(1);drop.onclick=discard;window.onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')move(-1);if(e.key==='ArrowRight'||e.key==='d')move(1);if(e.key===' '||e.key==='ArrowDown')place();if(e.key==='q')discard()};startGame();</script></body></html>
