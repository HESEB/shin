<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>출하패킹</title><link rel="stylesheet" href="../../css/common.css"><style>.board{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(7,42px);gap:4px;background:#4b2d1c;padding:8px;border-radius:18px}.cell{background:#fff8e8;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}.box{background:#fff;border:3px solid #4b2d1c;border-radius:14px;padding:8px;text-align:center;font-weight:900}.pick{font-size:42px;text-align:center}</style></head><body><div class="shin-app"><header class="shin-topbar"><button class="shin-icon" onclick="location.href='../../index.html'">🏠</button><div class="shin-currency">4. 출하패킹</div><div class="shin-currency">99브릭스</div><button class="shin-icon" onclick="start()">▶</button></header><section class="shin-panel"><div class="hud"><div class="box">출차 <span id="sent">0</span>/10</div><div class="box">폐기 <span id="trash">10</span></div><div class="box">열 <span id="col">1</span></div></div><div class="pick" id="cur">🐔</div><div class="board" id="board"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px"><button class="shin-btn" onclick="move(-1)">◀</button><button class="shin-btn" onclick="place()">적재</button><button class="shin-btn" onclick="move(1)">▶</button></div><button class="shin-btn" style="width:100%;height:48px;margin-top:8px" onclick="discard()">폐기(Q)</button></section></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>var W=4,H=7,g=[],c=1,s=0,tr=10,items=['🐔','🐷','🐮'],now='🐔';function start(){g=Array.from({length:H},()=>Array(W).fill(''));c=1;s=0;tr=10;next();draw()}function next(){now=items[Math.random()*items.length|0];cur.textContent=now}function draw(){board.innerHTML='';for(var y=0;y<H;y++)for(var x=0;x<W;x++){var d=document.createElement('div');d.className='cell';d.textContent=g[y][x];board.appendChild(d)}sent.textContent=s;trash.textContent=tr;col.textContent=c+1}function move(d){c=Math.max(0,Math.min(W-1,c+d));draw()}function place(){for(var y=H-1;y>=0;y--){if(!g[y][c]){g[y][c]=now;resolve();next();draw();if(s>=10)ShinResult.complete('packing',tr>=8?3:2);return}}alert('적재 실패!')}function discard(){if(tr>0){tr--;next();draw()}}function resolve(){var rm={};for(var y=0;y<H;y++)for(var x=0;x<W;x++){var v=g[y][x];if(!v)continue;var r=[[x,y]];for(var xx=x+1;xx<W&&g[y][xx]==v;xx++)r.push([xx,y]);if(r.length>=3)r.forEach(p=>rm[p]=1);r=[[x,y]];for(var yy=y+1;yy<H&&g[yy][x]==v;yy++)r.push([x,yy]);if(r.length>=3)r.forEach(p=>rm[p]=1)}var n=Object.keys(rm).length;if(n){Object.keys(rm).forEach(k=>{var a=k.split(',');g[a[1]][a[0]]=''});s+=n>=5?3:n>=4?2:1;gravity()}}function gravity(){for(var x=0;x<W;x++){var a=[];for(var y=H-1;y>=0;y--)if(g[y][x])a.push(g[y][x]);for(var y=H-1;y>=0;y--)g[y][x]=a.shift()||''}}window.onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')move(-1);if(e.key==='ArrowRight'||e.key==='d')move(1);if(e.key===' '||e.key==='ArrowDown')place();if(e.key==='q')discard()};start();</script></body></html>
