<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>출하패킹 v1.0.4d</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}body{margin:0;background:#111;font-family:Arial,'Noto Sans KR',sans-serif;color:#3b2413;overflow:hidden}#app{max-width:480px;height:100dvh;margin:0 auto;padding:10px;background:linear-gradient(#9bdcff,#ffe28a);position:relative}.panel{background:#fff8e8;border:4px solid #4b2d1c;border-radius:24px;padding:10px;box-shadow:0 7px 0 #9a5b17}h1{text-align:center;margin:2px;font-size:24px}select{width:100%;height:38px;border:3px solid #4b2d1c;border-radius:14px;background:#fff;font-weight:900}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:7px}.box{background:#fff;border:3px solid #6b3d1d;border-radius:16px;text-align:center;padding:5px;font-weight:900}.box small{display:block;color:#7b4a1f;font-size:11px}.box b{font-size:18px}.mission{display:none;text-align:center;font-weight:1000;margin-top:5px;color:#6b3d1d;font-size:13px}.yard{position:relative;margin-top:8px;width:100%;height:53vh;background:linear-gradient(#b8ecff,#e6f5ff);border:5px solid #4b2d1c;border-radius:22px;overflow:hidden}.cargo{position:absolute;left:8%;right:8%;top:20px;bottom:50px;background:#e9f8ff;border:5px solid #4b2d1c;border-radius:18px;overflow:hidden}.grid{position:absolute;left:10px;right:10px;top:10px;bottom:10px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(8,1fr);gap:3px}.cell{background:#fff;border:2px solid #8a6a40;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:21px;overflow:hidden}.pkg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:23px;border:2px solid #7a4b20;box-shadow:inset 0 -5px #8b541c;color:#fff;text-shadow:0 2px #4a2a14}.chicken{background:linear-gradient(#ffd465,#d98b21)}.pig{background:linear-gradient(#ff99b9,#d8567e)}.cow{background:linear-gradient(#c58b55,#7b4a2b)}.freeze{background:linear-gradient(#8ee7ff,#3aa4d8)}.ob{background:#4c4036;color:#fff}.fall{position:absolute;top:8px;width:25%;text-align:center;z-index:4;transition:left .08s}.fall .pkg{height:44px;width:54px;margin:auto}.fall.drop{animation:dropAnim linear forwards}@keyframes dropAnim{from{top:8px}to{top:calc(100% - 112px)}}.base{position:absolute;left:7%;right:7%;bottom:0;height:52px;background:#ffb000;border:5px solid #4b2d1c;border-radius:0 0 22px 22px;text-align:center;font-size:24px;font-weight:900;line-height:40px}.msg{height:30px;text-align:center;font-size:18px;font-weight:1000;color:#0c8a3d;text-shadow:0 2px #fff;margin-top:5px}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}.btn{height:70px;border:0;border-radius:22px;background:linear-gradient(#59bdff,#2575e8);color:white;font-size:34px;font-weight:900;box-shadow:0 7px 0 #0d4b99}.trash{background:linear-gradient(#ff8c7a,#e64335);font-size:22px}.start{width:100%;height:50px;margin-top:7px;border:0;border-radius:18px;background:linear-gradient(#ffbd37,#ff8b00);color:#fff;font-size:21px;font-weight:900;box-shadow:0 6px 0 #9b4f00}.overlay{position:absolute;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;z-index:9;padding:20px}.result{background:white;border:5px solid #4b2d1c;border-radius:24px;padding:22px;text-align:center;width:100%;box-shadow:0 8px 0 #9a5b17}.stars{font-size:46px;color:#ffca28;text-shadow:0 4px #805000}.fx{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);font-size:34px;font-weight:1000;color:#fff;text-shadow:0 5px #5b2a00;opacity:0;z-index:5;text-align:center}.fx.show{animation:pop .8s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-10%) scale(.6)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}</style></head><body><div id="app"><div class="panel"><h1 id="title">🐔 계육왕국 - 출하패킹</h1><select id="stage"><option value="chicken">🐔 계육왕국</option><option value="pig">🐷 돈육왕국</option><option value="cow">🐮 우육왕국</option><option value="final">👑 최종 물류센터</option></select><div class="hud"><div class="box"><small>목표 출차</small><b id="goal">0/10🚚</b></div><div class="box"><small>폐기</small><b id="trash">10/10</b></div><div class="box"><small>NEXT</small><b id="next">-</b></div><div class="box"><small>점수</small><b id="score">0</b></div><div class="box"><small>콤보</small><b id="combo">0</b></div><div class="box"><small>열</small><b id="col">1</b></div></div><div class="mission" id="mission">오늘의 특송: 2×2 같은 박스 완성 시 +2🚚</div><div class="yard"><div class="fall" id="fall"></div><div class="cargo"><div class="grid" id="grid"></div></div><div class="base">🚚 냉장 물류차</div></div><div class="msg" id="msg">좌우 이동만으로 박스를 적재하세요</div><div class="controls"><button class="btn" id="left">◀</button><button class="btn trash" id="drop">폐기</button><button class="btn" id="right">▶</button></div><button class="start" id="start">게임 시작</button></div><div class="fx" id="fx">🚚 출차!</div></div><div class="overlay" id="overlay"><div class="result"><h2>출하패킹 99브릭스</h2><div class="stars">☆☆☆</div><p>같은 박스 3개를 가로/세로로 연결해 출차하세요.</p><button class="start" onclick="startGame()">시작</button></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id),W=4,H=8;const icon={chicken:['🐔','chicken'],pig:['🐷','pig'],cow:['🐮','cow'],freeze:['📦','freeze']};const cfgs={chicken:{title:'🐔 계육왕국 - 출하패킹',types:['chicken','pig'],goal:10,trash:10,obs:0,mission:false,drop:3000},pig:{title:'🐷 돈육왕국 - 출하패킹',types:['chicken','pig','cow'],goal:15,trash:10,obs:1,mission:false,drop:2800},cow:{title:'🐮 우육왕국 - 출하패킹',types:['chicken','pig','cow'],goal:20,trash:9,obs:2,mission:true,drop:2600},final:{title:'👑 최종 물류센터 - 출하패킹',types:['chicken','pig','cow','freeze'],goal:30,trash:8,obs:3,mission:true,drop:2400}};let cfg,g,c=1,cur,nq=[],sent=0,tr=10,sc=0,co=0,run=false,tick=null,perfect=true;function setStage(){cfg=cfgs[$('stage').value];$('title').textContent=cfg.title;$('mission').style.display=cfg.mission?'block':'none'}$('stage').onchange=()=>startGame();function empty(){g=Array.from({length:H},()=>Array(W).fill(null));let made=0,tries=0;while(made<cfg.obs&&tries<80){tries++;let x=Math.floor(Math.random()*W),y=Math.floor(Math.random()*(H-2));if(g[y][x])continue;let near=false;for(let yy=Math.max(0,y-1);yy<=Math.min(H-3,y+1);yy++){for(let xx=Math.max(0,x-1);xx<=Math.min(W-1,x+1);xx++){if(g[yy][xx]==='ob')near=true}}if(!near){g[y][x]='ob';made++}}}function pick(){return cfg.types[Math.random()*cfg.types.length|0]}function restartFall(){fall.classList.remove('drop');void fall.offsetWidth;fall.style.animationDuration=cfg.drop+'ms';fall.classList.add('drop')}function startGame(){clearInterval(tick);setStage();empty();c=1;sent=0;tr=cfg.trash;sc=0;co=0;perfect=true;run=true;nq=[pick(),pick(),pick()];cur=nq.shift();nq.push(pick());$('overlay').style.display='none';draw();restartFall();tick=setInterval(place,cfg.drop)}function html(t){return '<div class="pkg '+icon[t][1]+'">'+icon[t][0]+'</div>'}function draw(){grid.innerHTML='';for(let y=0;y<H;y++)for(let x=0;x<W;x++){let d=document.createElement('div');d.className='cell';let v=g[y][x];if(v==='ob'){d.classList.add('ob');d.textContent='■'}else if(v)d.innerHTML=html(v);grid.appendChild(d)}fall.style.left=(c*25)+'%';fall.innerHTML=html(cur);goal.textContent=sent+'/'+cfg.goal+'🚚';trash.textContent=tr+'/'+cfg.trash;next.textContent=nq.map(t=>icon[t][0]).join(' ');score.textContent=sc;combo.textContent=co;col.textContent=c+1}function move(d){if(!run)return;c=Math.max(0,Math.min(W-1,c+d));draw()}function place(){if(!run)return;fall.classList.remove('drop');for(let y=H-1;y>=0;y--){if(!g[y][c]){g[y][c]=cur;cur=nq.shift();nq.push(pick());resolve();draw();if(sent>=cfg.goal)finish(true);else restartFall();return}}finish(false)}function discard(){if(!run||tr<=0)return;tr--;perfect=false;cur=nq.shift();nq.push(pick());draw();restartFall()}function resolve(){let chain=0;while(true){let rm=findMatches(),m=cfg.mission?findMission():[];m.forEach(k=>rm.add(k));if(!rm.size)break;chain++;let n=rm.size;rm.forEach(k=>{let a=k.split(',').map(Number);g[a[1]][a[0]]=null});gravity();let add=n>=5?3:n>=4?2:1;if(m.length)add+=2;sent+=add;sc+=100*add+(chain>1?200*chain:0)+(m.length?300:0);co=chain;fx((m.length?'특송 ':'')+'🚚 +'+add+(chain>1?' x'+chain:''))}if(!chain)co=0}function findMatches(){let rm=new Set();for(let y=0;y<H;y++)for(let x=0;x<W;x++){let v=g[y][x];if(!v||v==='ob')continue;let r=[];for(let xx=x;xx<W&&g[y][xx]===v;xx++)r.push(xx+','+y);if(r.length>=3)r.forEach(k=>rm.add(k));r=[];for(let yy=y;yy<H&&g[yy][x]===v;yy++)r.push(x+','+yy);if(r.length>=3)r.forEach(k=>rm.add(k))}return rm}function findMission(){let out=[];for(let y=0;y<H-1;y++)for(let x=0;x<W-1;x++){let v=g[y][x];if(v&&v!=='ob'&&g[y][x+1]===v&&g[y+1][x]===v&&g[y+1][x+1]===v)out=[x+','+y,(x+1)+','+y,x+','+(y+1),(x+1)+','+(y+1)]}return out}function gravity(){for(let x=0;x<W;x++){let a=[];for(let y=H-1;y>=0;y--)if(g[y][x]&&g[y][x]!=='ob')a.push(g[y][x]);for(let y=H-1;y>=0;y--){if(g[y][x]==='ob')continue;g[y][x]=a.shift()||null}}}function fx(t){let e=$('fx');e.textContent=t;e.classList.remove('show');void e.offsetWidth;e.classList.add('show');msg.textContent=t;if(navigator.vibrate)navigator.vibrate(18)}function finish(clear){if(!run)return;run=false;clearInterval(tick);fall.classList.remove('drop');let stars=clear?(perfect?3:tr>=Math.ceil(cfg.trash*.5)?2:1):1;if(clear)try{clearStage('packing',stars)}catch(e){}let n=typeof nextStageOf==='function'?nextStageOf('packing'):null;overlay.innerHTML='<div class="result"><h2>'+(clear?'출하 완료!':'적재 실패')+'</h2><div class="stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div><p>출차 '+sent+'/'+cfg.goal+'대<br>점수 '+sc+'점<br>폐기 '+tr+'/'+cfg.trash+'<br>'+(perfect?'Perfect Loading!':'')+'</p><button class="start" id="nextBtn">'+(n?'다음 스테이지':'월드맵')+'</button><button class="start" id="mapBtn">월드맵</button><button class="start" onclick="startGame()">다시 패킹</button></div>';overlay.style.display='flex';mapBtn.onclick=()=>location.href='../../index.html';nextBtn.onclick=()=>{if(n)location.href='../../'+n.url.replace('./','')+'?stage='+n.id;else location.href='../../index.html'}}left.onclick=()=>move(-1);right.onclick=()=>move(1);drop.onclick=discard;start.onclick=startGame;window.onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')move(-1);if(e.key==='ArrowRight'||e.key==='d')move(1);if(e.key===' '||e.key==='ArrowDown')place();if(e.key==='q')discard()};startGame();</script></body></html>
