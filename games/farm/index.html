<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>농장출하</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}body{margin:0;background:#7ac66a;font-family:Arial,'Noto Sans KR',sans-serif;overflow:hidden}.app{max-width:480px;height:100dvh;margin:0 auto;padding:10px;background:linear-gradient(#9be7ff 0 30%,#9bd66f 30%);color:#3b2512}.card{background:#fff7d2;border:4px solid #5b3518;border-radius:22px;padding:10px;box-shadow:0 7px 0 #9b6a22}h1{text-align:center;margin:4px;font-size:28px}select{width:100%;height:42px;border:3px solid #5b3518;border-radius:14px;background:#fff;font-size:18px;font-weight:900}.hud{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.box{background:#fff;border:3px solid #7b4a1f;border-radius:14px;text-align:center;padding:6px;font-weight:900}.box small{display:block;color:#806040}.board{position:relative;width:100%;aspect-ratio:1/1;background:#b9e889;border:5px solid #5b3518;border-radius:22px;margin-top:10px;overflow:hidden;touch-action:none;box-shadow:inset 0 0 0 6px #8fcf60}.goal{position:absolute;right:0;top:32%;width:58px;height:36%;background:#ffb000;border-left:5px solid #7b4a1f;border-top:5px solid #7b4a1f;border-bottom:5px solid #7b4a1f;border-radius:18px 0 0 18px;display:flex;align-items:center;justify-content:center;font-size:34px;z-index:1}.player{position:absolute;width:42px;height:42px;font-size:34px;z-index:5;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 4px 0 #0004)}.unit{position:absolute;width:36px;height:36px;font-size:31px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 3px 0 #0003)}.wall{position:absolute;background:#76502b;border-radius:8px;opacity:.75}.msg{text-align:center;height:28px;font-size:20px;font-weight:900;color:#d9480f;margin-top:7px}.start{width:100%;height:54px;border:0;border-radius:18px;background:#ff9500;color:white;font-size:22px;font-weight:900;box-shadow:0 6px 0 #9b4f00;margin-top:8px}.overlay{position:absolute;inset:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:9;padding:20px}.result{background:#fff;border:5px solid #5b3518;border-radius:24px;padding:20px;text-align:center;width:100%;box-shadow:0 8px 0 #9b6a22}.stars{font-size:46px;color:#ffca28;text-shadow:0 4px #7a4a00}.tip{font-size:12px;text-align:center;margin-top:5px;color:#6b4a20;font-weight:900}</style></head><body><div class="app"><div class="card"><h1 id="title">🐔 농장출하</h1><select id="stage"><option value="chicken">🐔 계육왕국</option><option value="pig">🐷 돈육왕국</option><option value="cow">🐮 우육왕국</option><option value="mix">👑 구매대전쟁</option></select><div class="hud"><div class="box"><small>출하 목표</small><span id="target">15마리</span></div><div class="box"><small>출하 완료</small><span id="score">0마리</span></div><div class="box"><small>소요 시간</small><span id="time">0.0초</span></div><div class="box"><small>난이도</small><span id="level">쉬움</span></div></div><div class="board" id="board"><div class="goal">🚚</div><div class="player" id="player">👨</div></div><div class="msg" id="msg">드래그해서 트럭 방향으로 몰아보세요</div><button class="start" onclick="startGame()">게임 시작</button><div class="tip">터치한 위치로 플레이어가 이동하고, 가축은 플레이어를 피해 움직입니다.</div></div></div><div class="overlay" id="overlay"><div class="result"><h2>출하 결과</h2><div class="stars" id="stars">★★★</div><p id="resultText"></p><button class="start" onclick="startGame()">다시 출하</button></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id),board=$('board'),player=$('player');const cfgs={chicken:{title:'🐔 계육왕국',icon:'🐔',target:15,count:22,speed:1.25,push:260,area:70,level:'쉬움',walls:0},pig:{title:'🐷 돈육왕국',icon:'🐷',target:12,count:18,speed:.95,push:215,area:65,level:'보통',walls:1},cow:{title:'🐮 우육왕국',icon:'🐮',target:9,count:14,speed:.72,push:180,area:62,level:'어려움',walls:2},mix:{title:'👑 구매대전쟁',icon:'mix',target:18,count:28,speed:.95,push:230,area:68,level:'최종',walls:3}};let cfg,units=[],walls=[],px=100,py=180,tx=100,ty=180,run=false,last=0,t=0,done=0,raf=0,drag=false;function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function theme(){cfg=cfgs[stage.value];title.textContent=cfg.title+' · 농장출하';target.textContent=cfg.target+'마리';level.textContent=cfg.level}stage.onchange=theme;theme();function clearAll(){units.forEach(a=>a.el.remove());walls.forEach(w=>w.el.remove());units=[];walls=[]}function addWall(x,y,w,h){let el=document.createElement('div');el.className='wall';el.style.left=x+'px';el.style.top=y+'px';el.style.width=w+'px';el.style.height=h+'px';board.appendChild(el);walls.push({x,y,w,h,el})}function block(x,y){return walls.some(w=>x+30>w.x&&x<w.x+w.w&&y+30>w.y&&y<w.y+w.h)}function makeUnits(){let bw=board.clientWidth,bh=board.clientHeight;if(cfg.walls>=1)addWall(bw*.40,bh*.18,22,bh*.38);if(cfg.walls>=2)addWall(bw*.62,bh*.48,22,bh*.34);if(cfg.walls>=3)addWall(bw*.24,bh*.58,bw*.28,20);for(let i=0;i<cfg.count;i++){let el=document.createElement('div');el.className='unit';let ic=cfg.icon==='mix'?['🐔','🐷','🐮'][i%3]:cfg.icon;el.textContent=ic;let x,y,k=0;do{x=rnd(20,bw-120);y=rnd(25,bh-65);k++}while(block(x,y)&&k<40);board.appendChild(el);units.push({el,x,y,vx:rnd(-.4,.4),vy:rnd(-.4,.4),ok:false})}}function inGoal(a){let bw=board.clientWidth,bh=board.clientHeight;return a.x>bw-68&&a.y>bh*.32&&a.y<bh*.68}function ui(){score.textContent=done+'마리';time.textContent=t.toFixed(1)+'초';player.style.left=px+'px';player.style.top=py+'px'}function loop(ts){if(!run)return;if(!last)last=ts;let dt=Math.min((ts-last)/1000,.035);last=ts;t+=dt;let dx=tx-px,dy=ty-py,d=Math.hypot(dx,dy)||1,m=520*dt;if(d>2){px+=dx/d*Math.min(m,d);py+=dy/d*Math.min(m,d)}px=clamp(px,0,board.clientWidth-42);py=clamp(py,0,board.clientHeight-42);for(const a of units){if(a.ok)continue;let ax=a.x+18,ay=a.y+18,px2=px+21,py2=py+21,dx=ax-px2,dy=ay-py2,dd=Math.hypot(dx,dy)||1;if(dd<cfg.area){a.vx+=dx/dd*cfg.push*dt;a.vy+=dy/dd*cfg.push*dt}a.vx+=(board.clientWidth*.48-ax)*.08*dt;a.vy+=(board.clientHeight*.5-ay)*.08*dt;a.vx*=.91;a.vy*=.91;let nx=a.x+a.vx*cfg.speed*dt*60,ny=a.y+a.vy*cfg.speed*dt*60;if(block(nx,ny)){a.vx*=-.9;a.vy*=-.9;nx=a.x+a.vx;ny=a.y+a.vy}if(nx<4){nx=4;a.vx=Math.abs(a.vx)+1.8}if(ny<4){ny=4;a.vy=Math.abs(a.vy)+1.8}if(nx>board.clientWidth-38){nx=board.clientWidth-38;a.vx=-Math.abs(a.vx)-1.8}if(ny>board.clientHeight-38){ny=board.clientHeight-38;a.vy=-Math.abs(a.vy)-1.8}a.x=nx;a.y=ny;a.el.style.left=a.x+'px';a.el.style.top=a.y+'px';if(inGoal(a)){a.ok=true;a.el.remove();done++;msg.textContent=done>=cfg.target?'출하 완료!':'출하 성공!'}}ui();if(done>=cfg.target){end();return}raf=requestAnimationFrame(loop)}function startGame(){overlay.style.display='none';clearAll();theme();done=0;t=0;last=0;run=true;px=board.clientWidth*.26;py=board.clientHeight*.55;tx=px;ty=py;makeUnits();ui();cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}function end(){run=false;cancelAnimationFrame(raf);let s=1;if(t<=28)s=2;if(t<=20)s=3;try{clearStage('farm',s)}catch(e){}stars.textContent='★'.repeat(s)+'☆'.repeat(3-s);resultText.innerHTML=cfg.title+'<br>출하 '+done+'/'+cfg.target+'마리<br>소요시간 '+t.toFixed(1)+'초';overlay.style.display='flex'}board.addEventListener('pointerdown',e=>{drag=true;board.setPointerCapture(e.pointerId);aim(e)});board.addEventListener('pointermove',e=>{if(drag)aim(e)});board.addEventListener('pointerup',()=>drag=false);board.addEventListener('pointercancel',()=>drag=false);function aim(e){let r=board.getBoundingClientRect();tx=clamp(e.clientX-r.left-21,0,board.clientWidth-42);ty=clamp(e.clientY-r.top-21,0,board.clientHeight-42)}startGame();</script></body></html>
