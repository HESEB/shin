<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>농장출하 모바일 패치</title><link rel="stylesheet" href="../../css/common.css"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,'Noto Sans KR',sans-serif}.app{max-width:480px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:linear-gradient(#88dcff 0 29%,#a5de76 29% 74%,#6b3b1d 74%);color:#3b2512;padding:6px}.app.pig{background:linear-gradient(#ffd2e1 0 29%,#f2b06f 29% 74%,#7a3d22 74%)}.app.cow{background:linear-gradient(#9be7ff 0 29%,#9bd66f 29% 74%,#426b2b 74%)}.app.mix{background:linear-gradient(#331650 0 29%,#7350a4 29% 74%,#16081f 74%);color:#fff}.top{height:44px;display:flex;gap:7px;align-items:center}.icon{width:40px;height:40px;border:3px solid #4b2d1c;border-radius:14px;background:#fff8e8;font-size:21px;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.pill{flex:1;height:40px;display:flex;align-items:center;justify-content:center;border:3px solid #4b2d1c;border-radius:14px;background:#fff8e8;color:#4a2a14;font-weight:1000;box-shadow:0 3px 0 #8b4a12}.card{height:calc(100dvh - 56px);background:#fff7d2;border:4px solid #5b3518;border-radius:22px;padding:7px;box-shadow:0 6px 0 #9b6a22;display:flex;flex-direction:column;min-height:0}.app.mix .card{background:#fff7d2;color:#3b2512}h1{text-align:center;margin:0;font-size:23px;text-shadow:0 3px #fff}.sub{text-align:center;font-weight:1000;color:#7b4a1f;font-size:12px;margin:1px 0 5px}.toprow{display:grid;grid-template-columns:1fr 88px;gap:6px}select{width:100%;height:36px;border:3px solid #5b3518;border-radius:13px;background:#fff;font-size:16px;font-weight:900}.badge{height:36px;border:3px solid #5b3518;border-radius:13px;background:#ffe3a4;display:flex;align-items:center;justify-content:center;font-weight:1000}.hud{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-top:6px}.box{background:#fff;border:2px solid #7b4a1f;border-radius:12px;text-align:center;padding:4px;font-weight:900;font-size:12px;box-shadow:inset 0 -2px 0 #ffe0a0}.box small{display:block;color:#806040;font-size:10px}.bar{height:13px;margin-top:5px;background:#4b2d1c;border-radius:999px;padding:3px}.fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#38c172,#ffd54a)}.board{position:relative;width:100%;flex:1;min-height:250px;background:linear-gradient(#b9e889,#8fd060);border:4px solid #5b3518;border-radius:20px;margin-top:6px;overflow:hidden;touch-action:none;box-shadow:inset 0 0 0 5px #78bd4f}.board.pig{background:linear-gradient(#ffd7e3,#eca063)}.board.cow{background:linear-gradient(#d8ffd0,#8ed060)}.board.mix{background:linear-gradient(#d8c2ff,#5b2fb8)}.board:before{content:"";position:absolute;inset:0;background-image:linear-gradient(90deg,#ffffff22 1px,transparent 1px),linear-gradient(#ffffff22 1px,transparent 1px);background-size:42px 42px}.sign{position:absolute;left:8px;top:8px;background:#fff8e8;border:2px solid #5b3518;border-radius:12px;padding:3px 8px;font-size:12px;font-weight:1000;z-index:2}.goal{position:absolute;right:0;top:31%;width:62px;height:38%;background:linear-gradient(#ffcb36,#ff9900);border-left:4px solid #7b4a1f;border-top:4px solid #7b4a1f;border-bottom:4px solid #7b4a1f;border-radius:18px 0 0 18px;display:flex;align-items:center;justify-content:center;font-size:36px;z-index:1}.goal:before{content:"출하";position:absolute;top:5px;font-size:11px;font-weight:1000;color:#5b3518}.player{position:absolute;width:42px;height:42px;font-size:34px;z-index:5;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 5px 0 #0004)}.player.active{filter:drop-shadow(0 0 10px #fff) drop-shadow(0 5px 0 #0004)}.unit{position:absolute;width:36px;height:36px;font-size:31px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 3px 0 #0003)}.unit.pop{animation:popOut .25s ease forwards}@keyframes popOut{to{transform:translateY(-24px) scale(.2);opacity:0}}.wall{position:absolute;background:linear-gradient(#8a6034,#5b3518);border:2px solid #4b2d1c;border-radius:8px;opacity:.9}.msg{text-align:center;height:24px;font-size:16px;font-weight:1000;color:#d9480f;margin-top:5px;text-shadow:0 2px #fff}.start{width:100%;height:42px;border:0;border-radius:15px;background:linear-gradient(#ffbd37,#ff8b00);color:white;font-size:18px;font-weight:1000;box-shadow:0 5px 0 #9b4f00;margin-top:5px}.tip{font-size:11px;text-align:center;margin-top:3px;color:#6b4a20;font-weight:900}.overlay{position:absolute;inset:0;background:#0009;display:none;align-items:center;justify-content:center;z-index:9;padding:16px}.result{background:#fff;border:5px solid #5b3518;border-radius:24px;padding:18px;text-align:center;width:100%;box-shadow:0 8px 0 #9b6a22}.stars{font-size:42px;color:#ffca28;text-shadow:0 4px #7a4a00}.fx{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);font-size:31px;font-weight:1000;color:#fff;text-shadow:0 5px #4b2d1c,0 0 12px #fff;opacity:0;z-index:8;pointer-events:none}.fx.show{animation:fx .75s ease}@keyframes fx{0%{opacity:0;transform:translate(-50%,-10%) scale(.6)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.18)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}.ring{position:absolute;width:50px;height:50px;border:4px solid #fff;border-radius:50%;pointer-events:none;z-index:4;opacity:0;transform:translate(-50%,-50%)}.ring.show{animation:ring .35s ease}@keyframes ring{0%{opacity:.9;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}@media(max-height:700px){h1{font-size:20px}.sub,.tip{display:none}.hud{grid-template-columns:1fr 1fr 1fr 1fr}.box{padding:2px}.start{height:38px}.msg{font-size:14px;height:20px}}</style></head><body><div class="app" id="app"><div class="top"><button class="icon" onclick="location.href='../../index.html'">🏠</button><div class="pill">1스테이지 · 농장출하</div><button class="icon" onclick="startGame()">▶</button></div><div class="card"><h1 id="title">🐔 농장출하</h1><div class="sub">드래그로 몰아서 트럭에 출하</div><div class="toprow"><select id="stage"><option value="chicken">🐔 계육왕국</option><option value="pig">🐷 돈육왕국</option><option value="cow">🐮 우육왕국</option><option value="mix">👑 구매대전쟁</option></select><div class="badge" id="stageBadge">계육</div></div><div class="hud"><div class="box"><small>목표</small><span id="target">15마리</span></div><div class="box"><small>완료</small><span id="score">0마리</span></div><div class="box"><small>시간</small><span id="time">0.0초</span></div><div class="box"><small>난이도</small><span id="level">쉬움</span></div></div><div class="bar"><div class="fill" id="fill"></div></div><div class="board" id="board"><div class="sign" id="sign">오늘의 출하장</div><div class="goal">🚚</div><div class="player" id="player">👨</div><div class="ring" id="ring"></div></div><div class="msg" id="msg">터치한 곳으로 이동해 가축의 방향을 바꾸세요</div><button class="start" onclick="startGame()">게임 시작</button><div class="tip">가축은 플레이어를 피해 움직입니다. 트럭 입구 쪽으로 길을 만들어 주세요.</div></div><div class="fx" id="fx">출하 성공!</div></div><div class="overlay" id="overlay"><div class="result"><h2>출하 결과</h2><div class="stars" id="stars">★★★</div><p id="resultText"></p><button class="start" onclick="startGame()">다시 출하</button><button class="start" onclick="location.href='../../index.html'">월드맵</button></div></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>const $=id=>document.getElementById(id),board=$('board'),player=$('player'),app=$('app'),fx=$('fx'),ring=$('ring');const cfgs={chicken:{cls:'chicken',badge:'계육',title:'🐔 계육왕국',icon:'🐔',target:15,count:22,speed:1.25,push:260,area:70,level:'쉬움',walls:0,sign:'계육 출하장'},pig:{cls:'pig',badge:'돈육',title:'🐷 돈육왕국',icon:'🐷',target:12,count:18,speed:.95,push:215,area:65,level:'보통',walls:1,sign:'돈육 출하장'},cow:{cls:'cow',badge:'우육',title:'🐮 우육왕국',icon:'🐮',target:9,count:14,speed:.72,push:180,area:62,level:'어려움',walls:2,sign:'우육 출하장'},mix:{cls:'mix',badge:'최종',title:'👑 구매대전쟁',icon:'mix',target:18,count:28,speed:.95,push:230,area:68,level:'최종',walls:3,sign:'통합 출하장'}};let cfg,units=[],walls=[],px=100,py=180,tx=100,ty=180,run=false,last=0,t=0,done=0,raf=0,drag=false;function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function theme(){cfg=cfgs[stage.value];app.className='app '+cfg.cls;board.className='board '+cfg.cls;title.textContent=cfg.title+' · 농장출하';target.textContent=cfg.target+'마리';level.textContent=cfg.level;sign.textContent=cfg.sign;stageBadge.textContent=cfg.badge}stage.onchange=()=>{theme();if(run)startGame()};theme();function clearAll(){units.forEach(a=>a.el.remove());walls.forEach(w=>w.el.remove());units=[];walls=[]}function addWall(x,y,w,h){let el=document.createElement('div');el.className='wall';el.style.left=x+'px';el.style.top=y+'px';el.style.width=w+'px';el.style.height=h+'px';board.appendChild(el);walls.push({x,y,w,h,el})}function block(x,y){return walls.some(w=>x+30>w.x&&x<w.x+w.w&&y+30>w.y&&y<w.y+w.h)}function makeUnits(){let bw=board.clientWidth,bh=board.clientHeight;if(cfg.walls>=1)addWall(bw*.40,bh*.18,22,bh*.38);if(cfg.walls>=2)addWall(bw*.62,bh*.48,22,bh*.34);if(cfg.walls>=3)addWall(bw*.24,bh*.58,bw*.28,20);for(let i=0;i<cfg.count;i++){let el=document.createElement('div');el.className='unit';let ic=cfg.icon==='mix'?['🐔','🐷','🐮'][i%3]:cfg.icon;el.textContent=ic;let x,y,k=0;do{x=rnd(20,bw-120);y=rnd(25,bh-65);k++}while(block(x,y)&&k<40);board.appendChild(el);units.push({el,x,y,vx:rnd(-.4,.4),vy:rnd(-.4,.4),ok:false})}}function inGoal(a){let bw=board.clientWidth,bh=board.clientHeight;return a.x>bw-68&&a.y>bh*.32&&a.y<bh*.68}function ui(){score.textContent=done+'마리';time.textContent=t.toFixed(1)+'초';fill.style.width=Math.min(100,done/cfg.target*100)+'%';player.style.left=px+'px';player.style.top=py+'px'}function pop(t){fx.textContent=t;fx.classList.remove('show');void fx.offsetWidth;fx.classList.add('show')}function tapFx(x,y){ring.style.left=x+'px';ring.style.top=y+'px';ring.classList.remove('show');void ring.offsetWidth;ring.classList.add('show')}function loop(ts){if(!run)return;if(!last)last=ts;let dt=Math.min((ts-last)/1000,.035);last=ts;t+=dt;let dx=tx-px,dy=ty-py,d=Math.hypot(dx,dy)||1,m=520*dt;player.classList.toggle('active',d>8);if(d>2){px+=dx/d*Math.min(m,d);py+=dy/d*Math.min(m,d)}px=clamp(px,0,board.clientWidth-42);py=clamp(py,0,board.clientHeight-42);for(const a of units){if(a.ok)continue;let ax=a.x+18,ay=a.y+18,px2=px+21,py2=py+21,dx=ax-px2,dy=ay-py2,dd=Math.hypot(dx,dy)||1;if(dd<cfg.area){a.vx+=dx/dd*cfg.push*dt;a.vy+=dy/dd*cfg.push*dt}a.vx+=(board.clientWidth*.48-ax)*.08*dt;a.vy+=(board.clientHeight*.5-ay)*.08*dt;a.vx*=.91;a.vy*=.91;let nx=a.x+a.vx*cfg.speed*dt*60,ny=a.y+a.vy*cfg.speed*dt*60;if(block(nx,ny)){a.vx*=-.9;a.vy*=-.9;nx=a.x+a.vx;ny=a.y+a.vy}if(nx<4){nx=4;a.vx=Math.abs(a.vx)+1.8}if(ny<4){ny=4;a.vy=Math.abs(a.vy)+1.8}if(nx>board.clientWidth-38){nx=board.clientWidth-38;a.vx=-Math.abs(a.vx)-1.8}if(ny>board.clientHeight-38){ny=board.clientHeight-38;a.vy=-Math.abs(a.vy)-1.8}a.x=nx;a.y=ny;a.el.style.left=a.x+'px';a.el.style.top=a.y+'px';if(inGoal(a)){a.ok=true;a.el.classList.add('pop');setTimeout(()=>a.el.remove(),230);done++;msg.textContent=done>=cfg.target?'출하 완료!':'출하 성공!';pop('🚚 출하 +1');if(navigator.vibrate)navigator.vibrate(18)}}ui();if(done>=cfg.target){end();return}raf=requestAnimationFrame(loop)}function startGame(){overlay.style.display='none';clearAll();theme();done=0;t=0;last=0;run=true;px=board.clientWidth*.26;py=board.clientHeight*.55;tx=px;ty=py;makeUnits();ui();cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}function end(){run=false;cancelAnimationFrame(raf);let s=1;if(t<=28)s=2;if(t<=20)s=3;try{clearStage('farm',s)}catch(e){}let n=typeof nextStageOf==='function'?nextStageOf('farm'):null;stars.textContent='★'.repeat(s)+'☆'.repeat(3-s);resultText.innerHTML=cfg.title+'<br>출하 '+done+'/'+cfg.target+'마리<br>소요시간 '+t.toFixed(1)+'초';overlay.querySelector('.result').innerHTML='<h2>출하 결과</h2><div class="stars">'+stars.textContent+'</div><p>'+resultText.innerHTML+'</p><button class="start" id="nextBtn">'+(n?'다음 스테이지':'월드맵')+'</button><button class="start" onclick="startGame()">다시 출하</button><button class="start" onclick="location.href=\'../../index.html\'">월드맵</button>';document.getElementById('nextBtn').onclick=()=>{if(n)location.href='../../'+n.url.replace('./','')+'?stage='+n.id;else location.href='../../index.html'};overlay.style.display='flex'}board.addEventListener('pointerdown',e=>{drag=true;board.setPointerCapture(e.pointerId);aim(e)});board.addEventListener('pointermove',e=>{if(drag)aim(e)});board.addEventListener('pointerup',()=>drag=false);board.addEventListener('pointercancel',()=>drag=false);function aim(e){let r=board.getBoundingClientRect();tx=clamp(e.clientX-r.left-21,0,board.clientWidth-42);ty=clamp(e.clientY-r.top-21,0,board.clientHeight-42);tapFx(tx+21,ty+21)}startGame();</script></body></html>
