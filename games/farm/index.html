<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>농장출하</title><link rel="stylesheet" href="../../css/common.css"><style>.play{height:60vh;position:relative;overflow:hidden;background:linear-gradient(#a7e8ff,#8ed66c);border:5px solid #4b2d1c;border-radius:24px}.animal{position:absolute;font-size:36px}.truck{position:absolute;right:8px;bottom:40%;font-size:54px}.hud{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.box{background:#fff;border:3px solid #4b2d1c;border-radius:14px;padding:8px;text-align:center;font-weight:900}</style></head><body><div class="shin-app"><header class="shin-topbar"><button class="shin-icon" onclick="location.href='../../index.html'">🏠</button><div class="shin-currency">1. 농장출하</div><div class="shin-currency">목표 10</div><button class="shin-icon" onclick="start()">▶</button></header><section class="shin-panel"><div class="hud"><div class="box">출하 <span id="score">0</span>/10</div><div class="box">시간 <span id="time">30</span></div></div><div class="play" id="field"><div class="truck">🚚</div></div><p class="center strong">동물을 터치해서 트럭으로 출하하세요.</p></section></div><script src="../../js/save.js"></script><script src="../../js/result.js"></script><script>var score=0,t=30,timer=null,field=document.getElementById('field');function spawn(){var a=document.createElement('div');a.className='animal';a.textContent=['🐔','🐥','🥚'][Math.random()*3|0];a.style.left=Math.random()*70+'%';a.style.top=(20+Math.random()*55)+'%';a.onclick=function(){score++;scoreEl();a.remove();if(score>=10)ShinResult.complete('farm',score>=10&&t>15?3:2)};field.appendChild(a)}function scoreEl(){score=document.getElementById('score').textContent=score}function start(){score=0;t=30;field.querySelectorAll('.animal').forEach(e=>e.remove());for(var i=0;i<12;i++)spawn();clearInterval(timer);timer=setInterval(function(){t--;time.textContent=t;if(t<=0){clearInterval(timer);if(score>=10)ShinResult.complete('farm',2);else alert('실패! 다시 도전하세요.')}},1000)}start();</script></body></html>
